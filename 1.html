<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#010103">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>彌陀淨土 ． 梵音擊鼓</title>
    <style>
        :root { 
            --bg-deep: #020203; 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
        }
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-touch-callout: none; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
            outline: none; 
        }
        html, body { 
            width: 100%; 
            height: 100%; 
            overscroll-behavior: none; 
            background: radial-gradient(circle at 50% 50%, #15111a 0%, var(--bg-deep) 100%);
            color: #fff; 
            font-family: "Songti TC", "PMingLiU", "Noto Serif TC", serif; 
            overflow: hidden;
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        /* 頂部導航區域 */
        .nav-top { 
            position: absolute; 
            top: max(20px, env(safe-area-inset-top)); 
            left: 20px; 
            z-index: 1000; 
        }
        .nav-btn { 
            color: var(--gold); 
            background: rgba(0,0,0,0.5); 
            padding: 8px 18px; 
            border-radius: 20px; 
            border: 1px solid rgba(212,175,55,0.3); 
            backdrop-filter: blur(5px); 
            font-size: 0.8rem; 
            letter-spacing: 2px; 
            cursor: pointer; 
            transition: 0.3s; 
            text-decoration: none;
            display: inline-block;
        }
        .nav-btn:active { 
            transform: scale(0.95); 
            background: rgba(212,175,55,0.15);
        }

        /* 主互動中樞 */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        /* 擊鼓向量概念按鈕 */
        .drum-trigger-btn {
            background: linear-gradient(135deg, rgba(212,175,55,0.05) 0%, rgba(10,10,10,0.8) 100%); 
            border: 1px solid rgba(212,175,55,0.4); 
            color: var(--gold); 
            width: 140px;
            height: 140px;
            border-radius: 50%;
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 6px; 
            padding-left: 6px; /* 修正因文字間距產生的視覺微幅偏右 */
            cursor: pointer; 
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
            box-shadow: 0 0 20px rgba(0,0,0,0.6), inset 0 0 15px rgba(212,175,55,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: drum-breathe 4s ease-in-out infinite alternate;
        }
        .drum-trigger-btn:active {
            transform: scale(0.93);
            border-color: var(--solid-gold);
            box-shadow: 0 0 35px rgba(243,229,171,0.4);
        }
        @keyframes drum-breathe {
            0% { box-shadow: 0 0 15px rgba(243,229,171,0.15); filter: brightness(0.9); }
            100% { box-shadow: 0 0 30px rgba(243,229,171,0.35); filter: brightness(1.1); }
        }

        /* 能量條幾何軌跡容器 (初始隱藏，擊鼓後展現) */
        .energy-gauge-container {
            width: 260px;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 3px;
            margin-top: 45px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .energy-gauge-container.active {
            opacity: 1;
            pointer-events: auto;
        }
        .energy-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--cyan) 0%, var(--gold) 100%);
            box-shadow: 0 0 8px var(--gold);
        }

        /* 打擊確認按鈕 */
        .strike-action-btn {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 10px 28px;
            border-radius: 20px;
            font-size: 0.85rem;
            letter-spacing: 4px;
            padding-left: 32px; /* 平衡字距 */
            cursor: pointer;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            transition: opacity 0.4s, transform 0.4s, background 0.3s, color 0.3s;
        }
        .strike-action-btn.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .strike-action-btn:active {
            background: var(--cyan);
            color: var(--bg-deep);
        }

        /* 雙軌系統標準化玻璃化彈框體系 */
        .glass-modal { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(15px); 
            z-index: 9999; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            opacity: 0; 
            pointer-events: none; 
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }
        .glass-modal.show { 
            opacity: 1; 
            pointer-events: auto; 
        }
        .glass-content { 
            width: 90%; 
            max-width: 400px; 
            max-height: 80vh; 
            background: linear-gradient(135deg, rgba(20,25,30,0.96), rgba(5,10,15,0.98)); 
            border: 1px solid rgba(212,175,55,0.4); 
            border-radius: 20px; 
            padding: 35px 24px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.95); 
            position: relative; 
            transform: scale(0.95);
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .glass-modal.show .glass-content {
            transform: scale(1);
        }
        
        .modal-header { 
            text-align: center; 
            color: var(--gold); 
            font-size: 1.15rem; 
            letter-spacing: 4px; 
            font-weight: bold; 
            margin-bottom: 20px; 
            border-bottom: 1px dashed rgba(212,175,55,0.2); 
            padding-bottom: 15px; 
            width: 100%; 
        }
        .modal-body {
            color: #ccc;
            font-size: 0.9rem;
            line-height: 1.8;
            text-align: justify;
            letter-spacing: 1px;
            margin-bottom: 25px;
            overflow-y: auto;
            width: 100%;
        }
        
        .agree-btn { 
            -webkit-appearance: none; 
            appearance: none;
            background: linear-gradient(135deg, rgba(212,175,55,0.1) 0%, rgba(5,5,5,0.8) 100%); 
            border: 1px solid rgba(212,175,55,0.4); 
            color: var(--gold); 
            padding: 11px 36px; 
            border-radius: 30px; 
            text-align: center; 
            font-weight: bold; 
            letter-spacing: 3px; 
            padding-left: 39px;
            cursor: pointer; 
            transition: 0.3s; 
            font-family: inherit;
            font-size: 0.85rem;
        }
        .agree-btn:active { 
            transform: scale(0.96); 
            background: rgba(212,175,55,0.25); 
            border-color: var(--solid-gold); 
        }
    </style>
</head>
<body>

    <div class="nav-top">
        <a href="index.html" class="nav-btn">回道場</a>
    </div>

    <div class="main-container">
        <button class="drum-trigger-btn" id="init-drum-btn" onclick="startRitual()">擊鼓</button>
        
        <div class="energy-gauge-container" id="energy-gauge-wrap">
            <div class="energy-bar" id="energy-bar-fluid"></div>
        </div>

        <button class="strike-action-btn" id="strike-act-btn" onclick="performStrikeTap()">正念落槌</button>
    </div>

    <div id="result-modal" class="glass-modal">
        <div class="glass-content">
            <div class="modal-header" id="modal-title">梵音功德 ． 說明</div>
            <div class="modal-body" id="modal-text">
                此處為擊鼓修持之正念空間。當能量條運行至右側圓滿處，至心落槌，可與淨土梵音深度共鳴。所有修持資糧將完美匯入主系統中。
            </div>
            <button class="agree-btn" onclick="closeModal()">我已了知</button>
        </div>
    </div>

    <script>
        /**
         * ════ 狀態安全防護機制（已註解） ════
         * 遵照要求，已將自動剔除、檢查並跳轉回 index.html 的邏輯完全註解。
         * 如此一來，系統不會再反覆將妳送出，便於直接在本地調試與觀看。
         */
        // if (localStorage.getItem('ritual_completed') || !localStorage.getItem('pureland_user')) {
        //     window.location.href = 'index.html';
        // }

        // DOM 節點宣告
        const energyGaugeWrap = document.getElementById('energy-gauge-wrap');
        const energyBarFluid = document.getElementById('energy-bar-fluid');
        const strikeActBtn = document.getElementById('strike-act-btn');
        const initDrumBtn = document.getElementById('init-drum-btn');
        const resultModal = document.getElementById('result-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalText = document.getElementById('modal-text');

        // 動態幾何控制核心變數
        let isGathering = false;
        let energyValue = 0;
        let energyDirection = 1;
        let energySpeed = 1.8;
        let energyRafId = null;

        /**
         * 觸發擊鼓修持流程
         */
        function startRitual() {
            if (isGathering) return;
            isGathering = true;

            // 淡入展示修持幾何條與控制鍵
            energyGaugeWrap.classList.add('active');
            strikeActBtn.classList.add('show');
            initDrumBtn.style.pointerEvents = 'none';
            initDrumBtn.style.opacity = '0.4';

            // 參數歸零並啟動高幀率心流動畫
            energyValue = 0;
            energyDirection = 1;
            runEnergyLoop();
        }

        /**
         * 高幀率物理反彈循環（RequestAnimationFrame）
         */
        function runEnergyLoop() {
            if (!isGathering) return;

            energyValue += energySpeed * energyDirection;

            // 端點反彈控制
            if (energyValue >= 100) {
                energyValue = 100;
                energyDirection = -1;
            } else if (energyValue <= 0) {
                energyValue = 0;
                energyDirection = 1;
            }

            // 動態更新向量線條
            energyBarFluid.style.width = energyValue + '%';
            energyRafId = requestAnimationFrame(runEnergyLoop);
        }

        /**
         * 正念打擊落槌判定
         */
        function performStrikeTap() {
            if (!isGathering) return;
            
            // 立即攔截並中止動態循環，鎖定精準數據
            cancelAnimationFrame(energyRafId);
            isGathering = false;

            const accuracy = Math.round(energyValue);
            triggerDharmaSound(accuracy);

            // 依據落點生成對應的內核評價，所有文字均以高階彈框包裝呈現
            let ratingTitle = "梵音清淨 ． 圓滿";
            let ratingDesc = `落槌精準度：${accuracy}%<br><br>心神合一，大鼓梵音普震法界。此功德至心迴向西方安樂土，利樂有情。`;

            if (accuracy >= 90) {
                ratingTitle = "✦ 上品圓滿 ． 妙音普震 ✦";
                ratingDesc = `落槌精準度：${accuracy}%（極致正念）<br><br>擊鼓圓滿，定慧等持。法音清淨無礙，徹照十方流傳。`;
            } else if (accuracy < 50) {
                ratingTitle = "梵音結緣 ． 賡續精進";
                ratingDesc = `落槌精準度：${accuracy}%<br><br>落槌之時心微動。請收攝六根，淨念相繼，再次至誠修持。`;
            }

            // 開啟規範內之幾何彈框
            showModal(ratingTitle, ratingDesc);
        }

        /**
         * 音訊合成系統（純Web Audio API，絕無外部檔案版權爭議，安全乾淨）
         */
        function triggerDharmaSound(score) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                // 大鼓深沉基音合成
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                const baseFreq = 65 + (score * 0.1);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(baseFreq, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.8);
                
                gain.gain.setValueAtTime(0.8, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.8);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 1.8);
            } catch(e) {
                console.log("Audio pipeline secure.");
            }
        }

        function showModal(title, text) {
            modalTitle.innerHTML = title;
            modalText.innerHTML = text;
            resultModal.classList.add('show');
        }

        function closeModal() {
            resultModal.classList.remove('show');
            
            // 彈框關閉後，主畫面立即復原為最純粹的「只有擊鼓」狀態
            energyGaugeWrap.classList.remove('active');
            strikeActBtn.classList.remove('show');
            energyBarFluid.style.width = '0%';
            initDrumBtn.style.pointerEvents = 'auto';
            initDrumBtn.style.opacity = '1';
        }
    </script>
</body>
</html>
