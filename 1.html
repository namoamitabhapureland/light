    <title>阿弥陀仏浄土システム ． 七重行願</title>
    <style>
        :root {
            --bg-deep: #020203; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; 
            --gold-light: #f3e5ab; 
            --text-gold: #f3e5ab;
        }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, var(--bg-deep) 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100dvh;
            display: flex; justify-content: center; align-items: center; color: #fff;
        }

        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #vignette { position: absolute; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(circle at 50% 30%, transparent 10%, rgba(1, 1, 3, 0.95) 100%); }

        #mist-layer { position: absolute; bottom: -10%; left: -10%; width: 120%; height: 60%; z-index: 5; pointer-events: none; mix-blend-mode: screen; overflow: hidden; }
        .mist-cloud { 
            position: absolute; border-radius: 50%; 
            animation: drift-mist 15s infinite alternate ease-in-out; 
            will-change: transform, opacity; 
            transform: translateZ(0); 
        }

        .mist-1 { width: 1000px; height: 500px; left: -10%; bottom: -50px; background: radial-gradient(ellipse, rgba(212,175,55,0.25) 0%, transparent 70%); animation-duration: 18s; }
        .mist-2 { width: 1200px; height: 600px; right: -15%; bottom: -100px; background: radial-gradient(ellipse, rgba(196,113,237,0.2) 0%, transparent 70%); animation-duration: 22s; animation-delay: -5s; }
        .mist-3 { width: 900px; height: 450px; left: 15%; bottom: 0px; background: radial-gradient(ellipse, rgba(0,242,254,0.2) 0%, transparent 70%); animation-duration: 16s; animation-delay: -2s; }
        .mist-4 { width: 1100px; height: 550px; right: 10%; bottom: -80px; background: radial-gradient(ellipse, rgba(255,126,179,0.2) 0%, transparent 70%); animation-duration: 20s; animation-delay: -8s; }
        .mist-5 { width: 800px; height: 400px; left: 35%; bottom: -40px; background: radial-gradient(ellipse, rgba(255,255,255,0.25) 0%, transparent 70%); animation-duration: 14s; animation-delay: -10s; }
        @keyframes drift-mist { 0% { transform: translateX(-40px) translateY(10px) scale(1); opacity: 0.6; } 100% { transform: translateX(40px) translateY(-10px) scale(1.1); opacity: 1; } }
        #flash-overlay { position: fixed; inset: 0; background: radial-gradient(circle, #fff 0%, #f3e5ab 50%, transparent 100%); opacity: 0; z-index: 9999; pointer-events: none; transition: opacity 0.8s; mix-blend-mode: screen; }

        #page-1 { position: absolute; inset: 0; z-index: 10; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        #ui-layer-p1 { position: absolute; top: 12%; width: 100%; text-align: center; z-index: 20; transition: opacity 0.5s; pointer-events: none; }
        .main-title-p1 { color: var(--gold); font-size: 1.3rem; letter-spacing: 8px; font-weight: bold; text-shadow: 0 0 20px rgba(212,175,55,0.6); margin-bottom: 12px; }
        .sub-title-p1 { color: var(--cyan); font-size: 0.85rem; letter-spacing: 5px; transition: 0.5s; }

        #warp-container { position: absolute; inset: 0; z-index: 10; display: flex; justify-content: center; align-items: center; perspective: 1200px; }
        .warp-inner { position: relative; width: 100%; max-width: 600px; height: 100%; max-height: 900px; transform-origin: 59.1% 28.8%; transition: transform 2.2s cubic-bezier(0.6, 0.05, 0.1, 1), opacity 1.8s ease-in; }
        .warp-inner.warp-drive { transform: scale(25) translateY(10%); opacity: 0; pointer-events: none; }

        #stair-svg { width: 100%; height: 100%; overflow: visible; filter: drop-shadow(0 0 30px rgba(212,175,55,0.1)); }
        .stair-step { stroke-linejoin: round; transition: opacity 0.8s ease-in-out; opacity: 1; }
        .step-hidden { opacity: 0 !important; pointer-events: none; } 
        .step-lit { animation: breathe-gold-wireframe 3s infinite alternate ease-in-out; cursor: pointer; }
        .step-lit .step-top { fill-opacity: 0.85; stroke: #fff; stroke-width: 2px; }
        .step-lit .step-front { fill-opacity: 0.75; stroke: #f3e5ab; stroke-width: 1.5px; }
        .step-lit .step-side { fill-opacity: 0.6; stroke: #d4af37; stroke-width: 1.5px; }
        .stair-step:hover { filter: drop-shadow(0 0 25px rgba(255,255,255,0.6)) brightness(1.3) !important; }
        @keyframes breathe-gold-wireframe { 0% { filter: drop-shadow(0 0 10px rgba(212,175,55,0.6)) brightness(1); } 100% { filter: drop-shadow(0 0 25px rgba(243,229,171,0.9)) drop-shadow(0 0 10px #fff) brightness(1.25); } }

        #immortal-seed { position: absolute; left: 59.1%; top: 28.8%; transform: translate(-50%, -50%) scale(1); width: 32px; height: 32px; border-radius: 50%; background: radial-gradient(circle, #fff 10%, #ffe 30%, var(--gold) 60%, var(--solid-gold) 100%); box-shadow: 0 0 var(--seed-glow) var(--solid-gold); opacity: 1; z-index: 100; transition: all 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .seed-heartbeat { animation: hb-pulse 1.5s infinite cubic-bezier(0.2, 0.8, 0.4, 1); }
        @keyframes hb-pulse { 0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 var(--seed-glow) var(--gold); } 50% { transform: translate(-50%, -50%) scale(1.3); box-shadow: 0 0 calc(var(--seed-glow)*2) var(--gold), 0 0 calc(var(--seed-glow)*3) #fff; } 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 var(--seed-glow) var(--gold); } }

        #page-2 { position: absolute; inset: 0; z-index: 10; display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; }
        .neon-flow { background: linear-gradient(90deg, #FDF5D3, #D4AF37, #E5989B, #89CFF0, #C9A0DC, #D4AF37, #FDF5D3); background-size: 200% 100%; animation: energyFlow 4s linear infinite; }
        .nav-top { width: 90%; max-width: 480px; z-index: 20; display: flex; justify-content: space-between; align-items: center; margin-top: max(20px, env(safe-area-inset-top)); padding: 12px 20px; background: rgba(5, 5, 8, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(212,175,55,0.2); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .nav-btn { display: flex; align-items: center; gap: 8px; color: var(--gold-light); font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .nav-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.5; fill: none; }
        .nav-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }

        .tracker-container { z-index: 20; margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .tracker-title { color: var(--gold-light); font-size: 0.85rem; letter-spacing: 4px; text-shadow: 0 0 10px var(--gold-solid); font-weight: bold; }
        .tracker-circles { display: flex; gap: 10px; align-items: center; }
        .track-circle { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(212,175,55,0.4); display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); transition: 0.4s; }
        .track-circle svg { width: 16px; height: 16px; fill: rgba(255,255,255,0.2); transition: 0.4s; }
        .track-circle.lit { border-color: #fff; background: rgba(212,175,55,0.25); box-shadow: 0 0 10px var(--gold-solid), inset 0 0 8px var(--gold-solid); }
        .track-circle.lit svg { fill: #fff; filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 10px var(--gold-solid)); }

        .task-container { 
    position: relative; z-index: 10; margin-top: 2vh; 
    width: 95%; max-width: 450px; 
    flex: 1; min-height: 0; /* 讓容器自動填滿剩餘高度，確保小螢幕不溢出 */
    display: flex; justify-content: center; align-items: center; 
}
.tusks-frame { 
    position: absolute; 
    top: 50%; left: 50%; transform: translate(-50%, -50%); /* 絕對置中 */
    width: 100%; height: auto; aspect-ratio: 3 / 4; /* 將象牙的比例獨立出來，保持其宏大 */
    overflow: visible; filter: drop-shadow(0 0 25px rgba(212,175,55,0.6)); 
    animation: breathe-frame 3s infinite alternate ease-in-out; 
}

         @keyframes breathe-frame { 0% { filter: drop-shadow(0 0 15px rgba(212,175,55,0.4)); } 100% { filter: drop-shadow(0 0 35px var(--gold-solid)) drop-shadow(0 0 20px #fff); } }
        .tusk-inner-line { fill: none; stroke: var(--gold-light); stroke-width: 1.5; opacity: 0.95; }

        .task-content { position: relative; z-index: 20; text-align: center; width: 75%; background: rgba(5, 5, 10, 0.85); border: 1px solid rgba(212,175,55,0.6); border-radius: 20px; padding: 25px 20px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); box-shadow: inset 0 0 30px rgba(212,175,55,0.15), 0 15px 40px rgba(0,0,0,0.9); opacity: 0; transform: scale(0.9) translateY(20px); pointer-events: none; transition: opacity 1.5s ease-out, transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .task-content.show { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
        .task-subtitle { color: var(--cyan); font-size: 0.8rem; letter-spacing: 4px; margin-bottom: 12px; }
        .task-title { color: var(--gold-light); font-size: 1.2rem; font-weight: bold; letter-spacing: 5px; text-shadow: 0 0 15px rgba(212,175,55,0.8); margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px dashed rgba(212,175,55,0.4); display: flex; justify-content: center; align-items: center; gap: 10px; }
        .tts-icon { width: 18px; height: 18px; fill: var(--cyan); cursor: pointer; transition: 0.3s; }
        .tts-icon:active { fill: #fff; transform: scale(1.1); }
        .task-desc { color: #eee; font-size: 0.9rem; line-height: 2; letter-spacing: 1px; text-align: justify; text-align-last: center; }

.action-zone { 
    z-index: 20; 
    position: relative;       /* 修改：從 absolute 改為 relative */
    margin-top: auto;         /* 新增：利用 Flex 自動將區域推至底部 */
    margin-bottom: max(5vh, 20px); /* 修改：確保與螢幕底部維持安全且舒適的距離 */
    width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; 
    opacity: 0; transition: opacity 1.5s 1s; pointer-events: none; 
}

        .action-zone.show { opacity: 1; pointer-events: auto; }
        .seal-btn { position: relative; width: 90px; height: 90px; border-radius: 50%; cursor: pointer; }

        .data-card { width: 92%; max-width: 420px; border: 1px solid rgba(212,175,55,0.42); border-radius: 20px; padding: 30px 25px; box-shadow: 0 10px 55px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.1); background: linear-gradient(180deg, rgba(20,20,20,0.95) 0%, rgba(5,5,5,0.98) 100%); }
        .data-title { color: var(--gold-solid); font-size: 1.05rem; letter-spacing: 4px; text-align: center; margin-bottom: 5px; font-weight: bold; text-shadow: 0 0 10px rgba(212,175,55,0.4); }
        .data-sub { text-align: center; font-size: 11px; color: var(--text-gold); margin-bottom: 25px; letter-spacing: 2px; opacity: 0.6; }

        .trophy-shelf { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 35px; padding-bottom: 15px; border-bottom: 1px dashed rgba(212,175,55,0.3); }
        .trophy-item { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 20%; }

        .banner-unlit { opacity: 0.15; filter: grayscale(100%); }

        .glass-energy-bar { width: 100%; margin: 8px 0 35px 0; position: relative; }

function showVowAlert(msg) {
    const alertMsg = document.getElementById('vow-alert-msg');
    const overlay = document.getElementById('vow-alert-overlay');
    if(alertMsg && overlay) {
        alertMsg.innerHTML = msg;
        overlay.style.display = 'flex';
        void overlay.offsetWidth; 
        overlay.style.opacity = '1';
        document.getElementById('vow-alert-box').style.transform = 'scale(1)';
    }
}

    }

        70: { title: "✦ 歓喜 ． 菩提契印 ✦", glow: "drop-shadow(0 0 25px rgba(233,196,106,0.8))", text: "既に七十日の普賢行願を円満す。<br>真金の宝幢が法界に初現す。<br>願わくは今生に歩歩蓮を生じ、永く退転せざらんことを。", cssVars: "--f1: #FFF8DC; --f2: #F3E5AB; --f3: #D4AF37; --bd: #AA7900; --bs: #5C4000; --rb: #FFF;" },
        700: { title: "✦ 遠行 ． 琉璃契印 ✦", glow: "drop-shadow(0 0 35px rgba(42,157,143,0.8))", text: "七百日の大願薫修を経る。<br>煩悩は漸く除かれ、青琉璃の宝幢が法界に高く懸かる。<br>願わくは身心清浄にして、内外明徹ならんことを。", cssVars: "--f1: #E0FBFC; --f2: #98C1D9; --f3: #48CAE4; --bd: #2A9D8F; --bs: #1D3557; --rb: #FFF;" },
        7000: { title: "✦ 善慧 ． 妙法契印 ✦", glow: "drop-shadow(0 0 45px rgba(193,18,31,0.8))", text: "七千日の行願、疲れず厭わず。<br>赤紅の宝幢が三昧の真火を燃やす。<br>願わくは大悲もて苦を抜き、普く一切の有情を度せんことを。", cssVars: "--f1: #F4A261; --f2: #E76F51; --f3: #C1121F; --bd: #780000; --bs: #370617; --rb: #FDFCDC;" },
        9999999: { title: "✦ 無量 ． 尽未来際 ✦", glow: "drop-shadow(0 0 60px #fff) drop-shadow(0 0 15px #E9C46A)", text: "尽未来際まで、行願は無尽なり。<br>累劫の功徳は無上の白金仏光と化す。<br>法界より授記され、十方の如来が同声に讃嘆す。", cssVars: "--f1: #FFFFFF; --f2: #FDFCDC; --f3: #E0E1DD; --bd: #F3E5AB; --bs: #D4AF37; --rb: #FFFFFF;" }
    };

    const MAIN_DB_KEY = 'PX_JP_V15.0'; 
    let mainDb = localStorage.getItem(MAIN_DB_KEY);
    
    if (!mainDb) {
        mainDb = { points: 0, puxianData: null }; 
    } else {
        mainDb = JSON.parse(mainDb);
    }

    let todayStr = new Date().toDateString();

    if (!mainDb.puxianData) {
        mainDb.puxianData = {
            startDate: new Date().setHours(0,0,0,0), 
            lastLogin: todayStr,
            weekRecord: [false, false, false, false, false, false, false],
            poolPoints: 0, 
            totalDays365: 0, 
            totalYears108: 0,
            totalPracticedDays: 0 
        };
        localStorage.setItem(MAIN_DB_KEY, JSON.stringify(mainDb));
    }

    let db = mainDb.puxianData; 

    let trueDays = (db.totalYears108 * 365) + db.totalDays365;
    if (typeof db.totalPracticedDays === 'undefined' || db.totalPracticedDays < trueDays) {
        db.totalPracticedDays = trueDays;
        localStorage.setItem(MAIN_DB_KEY, JSON.stringify(mainDb));
    }

    let nowMidnight = new Date().setHours(0,0,0,0);
    let startMidnight = new Date(db.startDate).setHours(0,0,0,0);
    let daysPassed = Math.round((nowMidnight - startMidnight) / 86400000);

    daysPassed = Math.max(0, daysPassed);

    let currentVowIndex = Math.floor(daysPassed / 7) % 10;
    let currentDayOfWeek = daysPassed % 7;


    if (db.lastLogin !== todayStr) {
        let lastLoginMidnight = db.lastLogin ? new Date(db.lastLogin).setHours(0,0,0,0) : startMidnight;
        let lastLoginWeek = Math.floor(Math.round((lastLoginMidnight - startMidnight) / 86400000) / 7);
        let currentWeek = Math.floor(daysPassed / 7);

        if (currentWeek > lastLoginWeek) {
            let successCount = db.weekRecord.filter(Boolean).length;
            db.poolPoints += (successCount === 7) ? 1000 : (successCount * 100);
            
            if (db.poolPoints >= 1000) {
                showVowAlert(`行願の資糧が千を満たしました。<br>自動的に阿弥陀仏浄土のメインシステムへ匯入します。`);
                mainDb.points = (mainDb.points || 0) + db.poolPoints; 
                db.poolPoints = 0; 
            }
            db.weekRecord = [false, false, false, false, false, false, false];
        }
        db.lastLogin = todayStr; saveDB();
    }
    function saveDB() { localStorage.setItem(MAIN_DB_KEY, JSON.stringify(mainDb)); }

    const ANCHORS = [
        { xl: 30,  xr: 370, y: 800, h: 45 }, { xl: 115, xr: 405, y: 675, h: 40 },
        { xl: 190, xr: 430, y: 570, h: 35 }, { xl: 245, xr: 445, y: 485, h: 30 },
        { xl: 285, xr: 445, y: 415, h: 25 }, { xl: 310, xr: 430, y: 360, h: 20 },
        { xl: 320, xr: 410, y: 320, h: 15 }, { xl: 322, xr: 388, y: 290, h: 0  } 
    ];

    function buildStairs() {
        let html = '';
        for (let i = 0; i < 7; i++) {
            let c = ANCHORS[i], n = ANCHORS[i+1];
            let lPts = `${c.xl},${c.y} ${c.xl},${c.y - c.h} ${n.xl},${n.y} ${n.xl},${n.y + c.h * 0.8}`;
            let rPts = `${c.xr},${c.y} ${c.xr},${c.y - c.h} ${n.xr},${n.y} ${n.xr},${n.y + c.h * 0.8}`;
            let fPts = `${c.xl},${c.y} ${c.xr},${c.y} ${c.xr},${c.y - c.h} ${c.xl},${c.y - c.h}`;
            let tPts = `${c.xl},${c.y - c.h} ${c.xr},${c.y - c.h} ${n.xr},${n.y} ${n.xl},${n.y}`;
            html += `<g class="stair-step step-hidden"><polygon class="step-side" points="${lPts}" fill="url(#g-gold)" /><polygon class="step-side" points="${lPts}" fill="url(#f-dark)" opacity="0.6"/><polygon class="step-side" points="${rPts}" fill="url(#g-gold)" /><polygon class="step-side" points="${rPts}" fill="url(#f-dark)" opacity="0.6"/><polygon class="step-front" points="${fPts}" fill="url(#g-gold)" /><polygon class="step-front" points="${fPts}" fill="url(#f-dark)" opacity="0.3"/><polygon class="step-top" points="${tPts}" fill="url(#g-gold)" /><polygon class="step-top" points="${tPts}" fill="url(#f-light)" opacity="0.8"/></g>`;
        }
        document.getElementById('steps-group').innerHTML = html;
    }

    function animateStairsSequence() {
        const steps = document.querySelectorAll('.stair-step');
        let i = 0;
        let interval = setInterval(() => {
            if (i < steps.length) { steps[i].classList.remove('step-hidden'); steps[i].classList.add('step-lit'); i++; } 
            else {
                clearInterval(interval);
                document.getElementById('day-hint').innerText = "法階円満 ． 画面を軽くタップして入陣してください";
                document.getElementById('page-1').style.cursor = 'pointer';
                document.getElementById('page-1').addEventListener('click', executeWarp, {once:true});
            }
        }, 500); 
    }

    function executeWarp() {
        warpSpeed = 40; starScale = 4; document.getElementById('ui-layer-p1').style.opacity = '0';
        const seed = document.getElementById('immortal-seed');
        seed.style.filter = "drop-shadow(0 0 80px #fff)"; seed.style.animationDuration = "0.3s";
        document.getElementById('warp-inner').classList.add('warp-drive');

        setTimeout(() => {
            document.getElementById('flash-overlay').style.opacity = '1';
            setTimeout(() => { 
                document.getElementById('page-1').style.display = 'none'; document.getElementById('page-2').style.display = 'flex';
                updatePageTwoUI(); document.getElementById('flash-overlay').style.opacity = '0';
                setTimeout(() => { 
                    document.getElementById('task-box').classList.add('show'); document.getElementById('action-zone').classList.add('show');
                    let calmInterval = setInterval(() => {
                        warpSpeed += (3 - warpSpeed) * 0.05; starScale += (0.6 - starScale) * 0.05; 
                        if (Math.abs(warpSpeed - 3) < 0.1) { warpSpeed = 3; starScale = 0.6; clearInterval(calmInterval); }
                    }, 30);
                }, 1000);
            }, 800);
        }, 1200); 
    }

    function updatePageTwoUI() {
        let vowList = VOWS_DB.regular[currentVowIndex] || VOWS_DB.regular[0]; 
        let vowData = vowList ? (vowList[currentDayOfWeek] || vowList[0]) : { title: "システム拡張中", desc: "法界の更新を静かにお待ちください。" };

        document.getElementById('ui-task-sub').innerText = `普賢十願 ． 第 ${currentVowIndex + 1} 願 ． 軌跡 ${currentDayOfWeek + 1}/7`;
        document.getElementById('ui-task-title-text').innerText = vowData.title; 
        document.getElementById('ui-task-desc').innerHTML = vowData.desc;

        let trackersHTML = '';
        for (let i = 0; i < 7; i++) {
            let isLit = db.weekRecord[i] ? 'lit' : '';
            let svgIcon = i === 6 
                ? `<svg viewBox="0 0 24 24"><path d="M12 3 C9 9 7 13 12 19 C17 13 15 9 12 3 Z M12 19 C6 17 2 11 7 9 C9 9 10 14 12 19 Z M12 19 C18 17 22 11 17 9 C15 9 14 14 12 19 Z"/><path d="M7 21 Q12 23 17 21" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`
                : `<svg viewBox="0 0 24 24"><path d="M6 19 C5 10 11 3 19 2 C13 7 10 13 10 19 Q8 20 6 19 Z"/></svg>`;
            trackersHTML += `<div class="track-circle ${isLit}">${svgIcon}</div>`;
        }
        document.getElementById('ui-trackers').innerHTML = trackersHTML;
        document.getElementById('ui-pool-text').innerText = `法界に一時保存された資糧 : ${db.poolPoints} / 1000`;
        document.getElementById('ui-pool-bar').style.width = `${(db.poolPoints / 1000) * 100}%`;

        let btnText = document.getElementById('seal-text');
        if (db.weekRecord[currentDayOfWeek]) {
            btnText.innerText = "【 今日の行願は既に円満しました 】"; btnText.style.color = "var(--gold-solid)";
            document.getElementById('progress-circle').style.strokeDashoffset = 0;
        } else {
            btnText.innerText = "長押し契印 ． 今日を円満にす"; btnText.style.color = "var(--cyan)";
            document.getElementById('progress-circle').style.strokeDashoffset = 289;
        }
    }

    function playTTS() {
        if (!('speechSynthesis' in window)) return showVowAlert("法界の返答：お使いの端末は音声読み上げに対応していません。");
        window.speechSynthesis.cancel(); 
        let title = document.getElementById('ui-task-title-text').innerText;
        let desc = document.getElementById('ui-task-desc').innerText; 
        let utterance = new SpeechSynthesisUtterance(title + "。" + desc);
        utterance.lang = 'ja-JP'; 
        
        const voices = window.speechSynthesis.getVoices();
        const jpVoice = voices.find(voice => voice.lang === 'ja-JP' || voice.lang === 'ja_JP' || voice.lang.includes('ja'));
        if (jpVoice) {
            utterance.voice = jpVoice;
        }
        
        utterance.rate = 0.9; 
        window.speechSynthesis.speak(utterance);
    }

    function updateDataModal() {
        document.getElementById('ui-txt-365').innerText = db.totalDays365; 
        document.getElementById('ui-txt-108').innerText = db.totalYears108;
        setTimeout(() => { 
            document.getElementById('ui-bar-365').style.width = (Math.min(db.totalDays365 / 365, 1) * 100) + '%'; 
            document.getElementById('ui-bar-108').style.width = (Math.min(db.totalYears108 / 108, 1) * 100) + '%'; 
        }, 100);

        let days = db.totalPracticedDays;
        toggleJewel('banner-7', days >= 7);
        toggleJewel('banner-70', days >= 70);
        toggleJewel('banner-700', days >= 700);
        toggleJewel('banner-7000', days >= 7000);
        toggleJewel('banner-9999999', days >= 9999999);
    }

    function toggleJewel(id, isLit) {
        const el = document.getElementById(id);
        if (isLit) { el.classList.add('banner-lit'); el.classList.remove('banner-unlit'); } 
        else { el.classList.remove('banner-lit'); el.classList.add('banner-unlit'); }
    }

    let isAutoTriggered = false; 

    function openCert(tier) {
        if (db.totalPracticedDays < tier) return; 
        isAutoTriggered = false; 

        let currentName = "行 者"; 
        if (mainDb && mainDb.name && mainDb.name.trim() !== "") {
            currentName = mainDb.name;
        }
        document.getElementById('cert-name-display').innerText = currentName;

        document.getElementById('cert-title').innerText = CERT_DATA[tier].title;
        document.getElementById('cert-text').innerHTML = CERT_DATA[tier].text;
        document.getElementById('cert-glow').style.filter = CERT_DATA[tier].glow;
        document.getElementById('cert-svg').style.cssText = CERT_DATA[tier].cssVars;
        document.getElementById('cert-modal').classList.add('show');
    }


    function closeCert() { 
        document.getElementById('cert-modal').classList.remove('show'); 
        if (isAutoTriggered) {
            setTimeout(flyLightToHistory, 300); 
        }
    }

    function flyLightToHistory() {
        const targetBtn = document.getElementById('nav-history-btn'); 
        if (!targetBtn) return;
        const rect = targetBtn.getBoundingClientRect();
        const targetX = rect.left + rect.width / 2;
        const targetY = rect.top + rect.height / 2;

        const light = document.createElement('div');
        light.className = 'dharma-light';
        light.style.left = '50vw'; light.style.top = '50vh'; light.style.opacity = '1';
        light.style.transform = 'translate(-50%, -50%) scale(1)';
        document.body.appendChild(light);
        
        void light.offsetWidth; 
        
        light.style.left = targetX + 'px'; light.style.top = targetY + 'px';
        light.style.transform = 'translate(-50%, -50%) scale(0.1)'; light.style.opacity = '0';

        setTimeout(() => {
            light.remove();
            targetBtn.style.transform = 'scale(1.1)'; targetBtn.style.textShadow = '0 0 15px #fff'; targetBtn.style.color = '#fff';
            setTimeout(() => { targetBtn.style.transform = 'none'; targetBtn.style.textShadow = 'none'; targetBtn.style.color = 'var(--gold-light)'; }, 300);
        }, 1200);
    }

    const btn = document.getElementById('seal-btn'); const progCircle = document.getElementById('progress-circle'); const hintText = document.getElementById('seal-text');
    let reqAnimId, startTime, DURATION = 2000;
    function drawProgress(timestamp) {
        if (!startTime) startTime = timestamp; let pct = Math.min((timestamp - startTime) / DURATION, 1);
        progCircle.style.strokeDashoffset = 289 - (289 * pct);
        if (pct < 1) reqAnimId = requestAnimationFrame(drawProgress); else completeTodayTask();
    }
function startPress(e) { 
    if (db.weekRecord[currentDayOfWeek]) return; 
    e.preventDefault(); 
    hintText.innerText = "エネルギー注入中..."; 
    hintText.style.color = "#fff"; 
    
    if (reqAnimId) { cancelAnimationFrame(reqAnimId); }
    
    startTime = null; 
    reqAnimId = requestAnimationFrame(drawProgress); 
}

    function cancelPress() { if (db.weekRecord[currentDayOfWeek]) return; cancelAnimationFrame(reqAnimId); progCircle.style.strokeDashoffset = 289; hintText.innerText = "長押し契印 ． 今日を円満にす"; hintText.style.color = "var(--cyan)"; }
    
    function completeTodayTask() {
        if (db.weekRecord[currentDayOfWeek]) return;
        
        db.weekRecord[currentDayOfWeek] = true; 
        db.totalDays365++;
        db.totalPracticedDays++; 

        if (db.totalDays365 >= 365) { db.totalDays365 = 0; db.totalYears108++; showVowAlert("歳星円満、365日の行願已に成る。<br>劫波の蓮華の歳数 + 1。"); }
        
        saveDB(); updatePageTwoUI(); updateDataModal();

        const core = document.getElementById('p2-bodhi-seed');
        core.style.transform = "translate(-50%, -50%) scale(1.5)"; core.style.opacity = "0";
        setTimeout(() => { core.style.transform = "translate(-50%, -50%) scale(1)"; core.style.opacity = "1"; }, 500);

        const triggers = [7, 70, 700, 7000, 9999999];
        if (triggers.includes(db.totalPracticedDays)) {
            setTimeout(() => { 
                isAutoTriggered = true; 
                openCert(db.totalPracticedDays); 
            }, 1000);
        }
    }
    btn.addEventListener('mousedown', startPress); btn.addEventListener('touchstart', startPress, {passive: false});
    window.addEventListener('mouseup', cancelPress); window.addEventListener('touchend', cancelPress); window.addEventListener('mouseleave', cancelPress); btn.addEventListener('touchcancel', cancelPress);

    function openDataModal() { updateDataModal(); document.getElementById('dataModal').classList.add('active'); }
    function closeDataModal() { document.getElementById('dataModal').classList.remove('active'); document.getElementById('ui-bar-365').style.width = '0%'; document.getElementById('ui-bar-108').style.width = '0%'; }

    const canvas = document.getElementById('starCanvas'); const ctx = canvas.getContext('2d');
    let width, height, stars = [], warpSpeed = 1, starScale = 1; 
    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();
    const STAR_COLORS = ['#f3e5ab', '#ffffff', '#00f2fe', '#ff7eb3', '#c471ed', '#43e97b', '#d4af37'];
    for (let i = 0; i < 350; i++) { stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)], s: Math.random() * 2 + 1 }); }
    
    function renderStars() {
        ctx.fillStyle = 'rgba(2, 2, 4, 0.4)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= warpSpeed; if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; } 
            let sc = 400 / (400 + s.z); ctx.beginPath(); 
            ctx.arc((width / 2) + s.x * sc, (height / 2) + s.y * sc, s.s * sc * starScale, 0, Math.PI * 2);
            ctx.fillStyle = s.color; ctx.globalAlpha = Math.min(1, sc * 2.5); ctx.fill(); ctx.globalAlpha = 1;
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(renderStars);
    }
    window.addEventListener('load', () => { buildStairs(); renderStars(); animateStairsSequence(); updateDataModal(); });
</script>

</body>
