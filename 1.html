<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>諸惡莫作 眾善奉行 淨意法門</title>
    <style>
        :root {
            --bg-color: #030305;
            --panel-bg: rgba(15, 15, 25, 0.85);
            --border-color: rgba(191, 158, 72, 0.4);
            --text-color: #f5eabf;
            --text-dim: #bf9e48;
            --accent-glow: #ffffff;
            --font-family: 'Microsoft JhengHei', 'Segoe UI', Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-color);
        }

        /* 背景畫布與宇宙遠景 */
        #universe-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(circle at 50% 30%, #101220 0%, #030305 75%);
        }

        /* 頂部極簡導覽列 */
        .top-nav {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 20;
        }

        .nav-btn {
            background: rgba(191, 158, 72, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 18px;
            font-size: 13px;
            letter-spacing: 2px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
        }

        .nav-btn:hover {
            background: rgba(191, 158, 72, 0.2);
            border-color: var(--accent-glow);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .nav-right {
            display: flex;
            gap: 15px;
        }

        /* 核心中央金塔層 */
        #meditator-layer {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 700px;
            height: auto;
            aspect-ratio: 1 / 1;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none;
        }

        .meditator-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            cursor: pointer;
            pointer-events: auto;
        }

        .meditator-svg {
            width: 100%;
            height: 100%;
            transform: translateY(12%);
            transition: transform 0.3s ease;
        }

        /* 中右側：法門面板 */
        #precepts-panel {
            position: absolute;
            top: 50%;
            right: 4%;
            transform: translateY(-50%);
            width: 320px;
            max-height: 70vh;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(191, 158, 72, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(10px);
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .panel-title {
            font-size: 16px;
            color: var(--text-color);
            letter-spacing: 4px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            font-weight: normal;
        }

        .precept-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(191, 158, 72, 0.1);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .precept-item:hover {
            background: rgba(191, 158, 72, 0.08);
            border-color: var(--border-color);
        }

        .precept-item.active {
            background: rgba(191, 158, 72, 0.15);
            border-color: var(--accent-glow);
            box-shadow: 0 0 10px rgba(191, 158, 72, 0.2);
        }

        /* 極簡向量單選鈕代替 HTML 原生 */
        .vector-radio {
            width: 14px;
            height: 14px;
            border: 1px solid var(--text-dim);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .precept-item.active .vector-radio {
            border-color: var(--accent-glow);
            background: var(--accent-glow);
            box-shadow: 0 0 6px var(--accent-glow);
        }

        .precept-text {
            font-size: 14px;
            letter-spacing: 2px;
            color: var(--text-color);
        }

        .precept-item.active .precept-text {
            color: #ffffff;
            text-shadow: 0 0 4px rgba(255,255,255,0.5);
        }

        /* 左下角：洗心詠唱看板 */
        #chant-board {
            position: absolute;
            bottom: 40px;
            left: 4%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .chant-subtitle {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .chant-main {
            font-size: 24px;
            color: var(--text-color);
            letter-spacing: 6px;
            text-shadow: 0 0 12px rgba(245, 234, 191, 0.4);
            font-weight: 300;
        }

        /* 全螢幕法門說明遮罩 */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 3, 5, 0.95);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
        }

        .intro-content {
            width: 90%;
            max-width: 550px;
            border: 1px solid var(--border-color);
            background: rgba(15, 15, 25, 0.9);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
        }

        .intro-content h2 {
            font-size: 20px;
            letter-spacing: 4px;
            margin-bottom: 25px;
            color: var(--text-color);
            font-weight: normal;
        }

        .intro-body {
            font-size: 14px;
            line-height: 1.8;
            letter-spacing: 2px;
            color: #dcd1a5;
            text-align: justify;
            margin-bottom: 35px;
        }

        .intro-close {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 30px;
            font-size: 13px;
            letter-spacing: 3px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .intro-close:hover {
            border-color: var(--accent-glow);
            background: rgba(255,255,255,0.05);
        }

        /* 響應式微調 */
        @media (max-width: 850px) {
            #precepts-panel {
                position: absolute;
                top: auto;
                bottom: 140px;
                right: 50%;
                transform: translateX(50%);
                width: 90%;
                max-width: 340px;
                max-height: 40vh;
            }
            #chant-board {
                top: 90px;
                left: 50%;
                transform: translateX(-50%);
                bottom: auto;
                text-align: center;
                width: 100%;
            }
            .meditator-svg {
                transform: translateY(18%);
            }
        }
    </style>
</head>

                本系統提供修行者一個靜心觀想的空間。右側可選取身、口、意三皈依洗心法門，點擊中央彌陀金塔，天空將會降下對應法門的甘露法雨。願修行者藉由視覺與心念的專注，達到念念清淨、福慧增長之境界。

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStars();
        });

        // 1. 宇宙背景背景星辰
        let stars = [];
        function initStars() {
            stars = [];
            const count = Math.min(width * 0.15, 120);
            for(let i=0; i<count; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height * 0.7,
                    size: Math.random() * 1.2,
                    alpha: Math.random(),
                    speed: 0.01 + Math.random() * 0.02
                });
            }
        }

        // 2. 甘露法雨系統
        let rains = [];
        let isRaining = false;
        let rainColor = '#ffffff';
        let currentActiveIndex = -1;

        class RainDrop {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * -50;
                this.length = 15 + Math.random() * 20;
                this.speed = 8 + Math.random() * 7;
                this.opacity = 0.1 + Math.random() * 0.4;
            }
            update() {
                this.y += this.speed;
                if(this.y > height) {
                    this.y = Math.random() * -20;
                    this.x = Math.random() * width;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.strokeStyle = rainColor;
                ctx.globalAlpha = this.opacity;
                ctx.lineWidth = 0.8;
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y + this.length);
                ctx.stroke();
            }
        }

        function triggerRainAndSelect() {
            if(currentActiveIndex === -1) {
                // 若未選取，預設啟動第一個
                selectPrecept(0, '諸惡莫作', '行為清淨');
            }
            
            // 觸發洗心動畫特效
            isRaining = true;
            rains = [];
            for(let i=0; i<60; i++) {
                rains.push(new RainDrop());
            }

            // 記錄修持軌跡 (可對接儲存邏輯)
            const preceptText = document.querySelectorAll('.precept-text')[currentActiveIndex].innerText;
            saveHistory(preceptText);

            // 金塔微動回饋
            const svg = document.querySelector('.meditator-svg');
            svg.style.transform = window.innerWidth <= 850 ? 'translateY(18%) scale(0.98)' : 'translateY(12%) scale(0.98)';
            setTimeout(() => {
                svg.style.transform = window.innerWidth <= 850 ? 'translateY(18%) scale(1)' : 'translateY(12%) scale(1)';
            }, 150);
        }

        function selectPrecept(index, text, type) {
            currentActiveIndex = index;
            
            // 更新 UI 狀態
            const items = document.querySelectorAll('.precept-item');
            items.forEach((item, i) => {
                if(i === index) item.classList.add('active');
                else item.classList.remove('active');
            });

            // 更新左下角看板
            document.getElementById('chant-type').innerText = type;
            document.getElementById('chant-text').innerText = text;

            // 依據法門變換法雨顏色
            if(index === 0) rainColor = '#bf9e48'; // 身業：古金
            if(index === 1) rainColor = '#ffffff'; // 口業：純白
            if(index === 2) rainColor = '#b0dfdb'; // 意業：琉璃青
            
            if(isRaining) {
                // 如果正在下雨，直接換色
                triggerRainAndSelect();
            }
        }

        function saveHistory(precept) {
            let history = JSON.parse(localStorage.getItem('pureland_history')) || [];
            history.push({
                date: new Date().toLocaleDateString(),
                time: new Date().toLocaleTimeString(),
                type: precept
            });
            localStorage.setItem('pureland_history', JSON.stringify(history));
        }

        function toggleIntro(show) {
            document.getElementById('intro-overlay').style.display = show ? 'flex' : 'none';
        }

        // 3. 主渲染迴圈
        function animate() {
            ctx.clearRect(0, 0, width, height);

            // 繪製星空
            ctx.globalCompositeOperation = 'source-over';
            stars.forEach(star => {
                star.alpha += star.speed;
                if(star.alpha > 1 || star.alpha < 0) star.speed = -star.speed;
                ctx.fillStyle = '#ffffff';
                ctx.globalAlpha = Math.abs(star.alpha);
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // 繪製法雨
            if(isRaining) {
                rains.forEach(drop => {
                    drop.update();
                    drop.draw();
                });
            }

            requestAnimationFrame(animate);
        }

        // 初始化啟動
        initStars();
        animate();
    </script>
</body>
</html>
