<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>彌陀淨土同心圓 - 滿版流轉</title>
    <style>
        body { background-color: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .mandala-svg { width: 90vmin; height: 90vmin; }
        @keyframes spin-cw { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spin-ccw { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }
        .layer { transform-origin: 500px 500px; }
        .l1 { animation: spin-cw 70s linear infinite; }
        .l2 { animation: spin-ccw 55s linear infinite; }
        .l3 { animation: spin-cw 40s linear infinite; }
        .l4 { animation: spin-ccw 25s linear infinite; }
    </style>
</head>
<body>
<svg class="mandala-svg" viewBox="0 0 1000 1000">
    <defs>
        <!-- 玻璃材質 -->
        <radialGradient id="glass" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
        </radialGradient>
        <!-- 各圈路徑 -->
        <path id="p1" d="M 500 40 A 460 460 0 1 1 499.9 40" />
        <path id="p2" d="M 500 110 A 390 390 0 1 1 499.9 110" />
        <path id="p3" d="M 500 180 A 320 320 0 1 1 499.9 180" />
        <path id="p4" d="M 500 250 A 250 250 0 1 1 499.9 250" />
    </defs>

    <!-- 藍層 -->
    <g class="layer l1">
        <circle cx="500" cy="500" r="460" fill="#0D47A1" opacity="0.9"/>
        <text fill="#F3E5AB" font-size="32" font-family="serif" letter-spacing="20"><textPath href="#p1" startOffset="0%">भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ</textPath></text>
    </g>
    <!-- 綠層 -->
    <g class="layer l2">
        <circle cx="500" cy="500" r="390" fill="#1B5E20" opacity="0.9"/>
        <text fill="#A5D6A7" font-size="30" font-family="serif" letter-spacing="18"><textPath href="#p2" startOffset="0%">ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः</textPath></text>
    </g>
    <!-- 紅層 -->
    <g class="layer l3">
        <circle cx="500" cy="500" r="320" fill="#880E4F" opacity="0.9"/>
        <text fill="#FFCCBC" font-size="28" font-family="serif" letter-spacing="15"><textPath href="#p3" startOffset="0%">भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ</textPath></text>
    </g>
    <!-- 黃層 -->
    <g class="layer l4">
        <circle cx="500" cy="500" r="250" fill="#F57F17" opacity="0.9"/>
        <text fill="#FFF9C4" font-size="26" font-family="serif" letter-spacing="12"><textPath href="#p4" startOffset="0%">ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः</textPath></text>
    </g>
    <!-- 玻璃中心 -->
    <circle cx="500" cy="500" r="200" fill="url(#glass)" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
</svg>
</body>
</html>
