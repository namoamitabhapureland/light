<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀淨土同心圓 - 種子字流轉測試</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #EFEFEF;
            font-family: "Noto Sans TC", "Microsoft JhengHei", serif;
        }
        .mandala-container {
            width: 100%;
            max-width: 850px;
        }

        /* 定義順時針與逆時針旋轉動畫 */
        @keyframes spin-cw { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spin-ccw { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }

        /* 每一圈設定不同的轉速與方向，鎖定於中心點 500,500 */
        .layer-blue { transform-origin: 500px 500px; animation: spin-cw 60s linear infinite; }
        .layer-green { transform-origin: 500px 500px; animation: spin-ccw 50s linear infinite; }
        .layer-red { transform-origin: 500px 500px; animation: spin-cw 40s linear infinite; }
        .layer-yellow { transform-origin: 500px 500px; animation: spin-ccw 30s linear infinite; }
        .layer-white { transform-origin: 500px 500px; animation: spin-cw 20s linear infinite; }
    </style>
</head>
<body>

<div class="mandala-container">
    <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- 漸層色彩定義 -->
            <radialGradient id="grad-blue" cx="50%" cy="50%" r="50%" fx="35%" fy="35%">
                <stop offset="60%" stop-color="#1565C0"/><stop offset="100%" stop-color="#0D47A1"/>
            </radialGradient>
            <radialGradient id="grad-green" cx="50%" cy="50%" r="50%" fx="65%" fy="35%">
                <stop offset="60%" stop-color="#2E7D32"/><stop offset="100%" stop-color="#1B5E20"/>
            </radialGradient>
            <radialGradient id="grad-red" cx="50%" cy="50%" r="50%" fx="35%" fy="65%">
                <stop offset="60%" stop-color="#C62828"/><stop offset="100%" stop-color="#880E4F"/>
            </radialGradient>
            <radialGradient id="grad-yellow" cx="50%" cy="50%" r="50%" fx="65%" fy="65%">
                <stop offset="60%" stop-color="#F9A825"/><stop offset="100%" stop-color="#F57F17"/>
            </radialGradient>
            <radialGradient id="grad-white" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
                <stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#B0BEC5"/>
            </radialGradient>

            <!-- 文字環繞路徑定義 (起點位於正上方，順時針畫圓) -->
            <path id="path-blue" d="M 500 50 A 450 450 0 1 1 499.9 50" />
            <path id="path-green" d="M 500 110 A 390 390 0 1 1 499.9 110" />
            <path id="path-red" d="M 500 170 A 330 330 0 1 1 499.9 170" />
            <path id="path-yellow" d="M 500 230 A 270 270 0 1 1 499.9 230" />
            <path id="path-white" d="M 500 280 A 220 220 0 1 1 499.9 280" />
        </defs>

        <!-- 藍色層（最外圍）：字體選用亮金色 -->
        <g class="layer-blue">
            <circle cx="500" cy="500" r="480" fill="url(#grad-blue)" />
            <text fill="#F3E5AB" font-size="28" font-family="serif" letter-spacing="12" opacity="0.85">
                <textPath href="#path-blue" startOffset="0%">
                    भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ
                </textPath>
            </text>
        </g>
        
        <!-- 綠色層：字體選用純白偏銀 -->
        <g class="layer-green">
            <circle cx="500" cy="500" r="420" fill="url(#grad-green)" />
            <text fill="#E0F2F1" font-size="26" font-family="serif" letter-spacing="10" opacity="0.9">
                <textPath href="#path-green" startOffset="5%">
                    ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः
                </textPath>
            </text>
        </g>
        
        <!-- 紅色層：字體選用淡金黃色 -->
        <g class="layer-red">
            <circle cx="500" cy="500" r="360" fill="url(#grad-red)" />
            <text fill="#FFE082" font-size="24" font-family="serif" letter-spacing="8" opacity="0.9">
                <textPath href="#path-red" startOffset="10%">
                    भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ
                </textPath>
            </text>
        </g>
        
        <!-- 黃色層：字體選用深紅棕色 -->
        <g class="layer-yellow">
            <circle cx="500" cy="500" r="300" fill="url(#grad-yellow)" />
            <text fill="#5D4037" font-size="22" font-family="serif" letter-spacing="6" opacity="0.95">
                <textPath href="#path-yellow" startOffset="15%">
                    ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः ॐ अ ह्रीः भै अं यु ह भः
                </textPath>
            </text>
        </g>

        <!-- 白色層（中心區塊底色）：字體邊緣選用蒼青色 -->
        <g class="layer-white">
            <circle cx="500" cy="500" r="240" fill="url(#grad-white)" />
            <text fill="#37474F" font-size="20" font-family="serif" letter-spacing="6" opacity="0.7">
                <textPath href="#path-white" startOffset="20%">
                    भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ भः ह यु अं भै ह्रीः अ ॐ
                </textPath>
            </text>
        </g>

        <!-- 內部文字區塊：保持靜態不旋轉，確保視覺穩定 -->
        <text x="500" y="480" font-size="42" text-anchor="middle" fill="#263238" font-weight="bold">真言流轉 法界常住</text>
        <text x="500" y="540" font-size="24" text-anchor="middle" fill="#546E7A">中心保留極度寬敞的手寫空間</text>
        
    </svg>
</div>

</body>
</html>
