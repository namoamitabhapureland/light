<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀淨土同心圓設計 - 視覺測試</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #FAFAFA; /* 乾淨無干擾的背景 */
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        }
        .mandala-container {
            width: 100%;
            max-width: 850px; /* 確保高畫質縮放 */
        }
    </style>
</head>
<body>

<div class="mandala-container">
    <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <radialGradient id="grad-r4" cx="50%" cy="50%" r="50%">
                <stop offset="83%" stop-color="#9FA8DA"/>
                <stop offset="100%" stop-color="#283593"/>
            </radialGradient>
            
            <radialGradient id="grad-r3" cx="50%" cy="50%" r="50%">
                <stop offset="80%" stop-color="#80DEEA"/>
                <stop offset="100%" stop-color="#00838F"/>
            </radialGradient>
            
            <radialGradient id="grad-r2" cx="50%" cy="50%" r="50%">
                <stop offset="75%" stop-color="#F48FB1"/>
                <stop offset="100%" stop-color="#C2185B"/>
            </radialGradient>

            <radialGradient id="grad-r1" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#FFF59D"/>
                <stop offset="100%" stop-color="#FBC02D"/>
            </radialGradient>
        </defs>

        <circle cx="500" cy="500" r="480" fill="url(#grad-r4)" />
        
        <circle cx="500" cy="500" r="400" fill="url(#grad-r3)" />
        
        <circle cx="500" cy="500" r="320" fill="url(#grad-r2)" />
        
        <circle cx="500" cy="500" r="240" fill="url(#grad-r1)" />

        <text x="500" y="470" font-size="42" text-anchor="middle" fill="#333333" font-weight="bold">充足的中心空間</text>
        <text x="500" y="530" font-size="28" text-anchor="middle" fill="#333333">文字不需鮮豔，即有極佳對比</text>
        
    </svg>
</div>

</body>
</html>
