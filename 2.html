<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>種子字字型觀想與毛筆鍊心系統</title>
    <style>
        /* ════ 承襲主系統變數與嚴格美學 ════ */
        :root {
            --cyan-jade: #8ba89c;    /* 靜謐琉璃色 */
            --gold-light: #f3e5ab;   /* 柔和淺金 */
            --gold-classic: #d4af37; /* 古典金 */
            --bg-dark: #010204;      /* 深邃法界黑 */
        }

        /* 引入開源無版權爭議之標準悉曇文字型 */
        @font-face {
            font-family: 'SiddhamUnicode';
            /* 採用網路上開源免版權的正統悉曇字型庫，若單機離線亦可放置於同級目錄 */
            src: url('https://fonts.gstatic.com/ea/siddham/v1/Siddham-Regular.ttf') format('truetype'),
                 url('Siddham.ttf') format('truetype');
            font-display: swap;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-user-select: none; user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--gold-light);
            font-family: serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 90px 20px 30px 20px;
        }

        /* ════ 星空背景載體 ════ */
        #starCanvas {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* ════ 頂部導航列 (承襲華藏月相) ════ */
        .top-nav {
            position: absolute; top: 25px; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: env(safe-area-inset-top, 0px) 20px 0 20px; 
            z-index: 200;
        }

        .nav-btn {
            color: var(--cyan-jade); font-size: 0.85rem; letter-spacing: 2px;
            padding: 6px 14px; border: 1px solid rgba(139,168,156,0.3); border-radius: 20px;
            background: rgba(1,2,4,0.6); cursor: pointer; backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        .nav-btn:active { 
            background: rgba(139,168,156,0.2); 
            transform: scale(0.95); 
            opacity: 0.8; 
        }

        .nav-title {
            color: var(--gold-light); font-size: 1.1rem; letter-spacing: 4px; 
            text-shadow: 0 0 10px rgba(243,229,171,0.3);
        }

        /* ════ 雙艙並立布局 ════ */
        .zen-workspace {
            display: flex;
            width: 100%;
            max-width: 900px;
            gap: 40px;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            z-index: 10;
        }

        /* 觀想艙：純文字 Unicode 悉曇字放大顯示，不需描摹 */
        .vision-chamber {
            flex: 1;
            aspect-ratio: 1 / 1;
            max-width: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.01) 0%, transparent 70%);
            border: 1px solid rgba(139,168,156,0.1);
            border-radius: 8px;
            position: relative;
        }

        .vision-chamber::before {
            content: "依相觀心";
            position: absolute; top: 15px; left: 15px;
            font-size: 0.75rem; color: var(--cyan-jade); opacity: 0.5; letter-spacing: 2px;
        }

        /* 純文字悉曇文展示區（絕不失真） */
        .siddham-text-render {
            font-family: 'SiddhamUnicode', serif;
            font-size: 11rem; /* 放大字體 */
            color: var(--gold-light);
            line-height: 1;
            text-align: center;
            cursor: default;
            animation: seed-glow 6s infinite ease-in-out;
        }

        @keyframes seed-glow {
            0%, 100% { opacity: 0.7; filter: drop-shadow(0 0 15px rgba(243,229,171,0.15)); }
            50% { opacity: 0.95; filter: drop-shadow(0 0 35px rgba(243,229,171,0.45)); }
        }

        /* 自寫艙：完全淨空的手寫畫布（動態毛筆刷） */
        .writing-chamber {
            flex: 1;
            aspect-ratio: 1 / 1;
            max-width: 380px;
            position: relative;
            border: 1px solid rgba(212,175,55,0.15);
            background: rgba(1, 2, 4, 0.4);
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .writing-chamber::before {
            content: "落筆凝神";
            position: absolute; top: 15px; left: 15px;
            font-size: 0.75rem; color: var(--gold-classic); opacity: 0.5; letter-spacing: 2px;
            pointer-events: none; z-index: 2;
        }

        #traceCanvas {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            z-index: 3;
            cursor: crosshair;
            touch-action: none;
        }

        /* 狀態提示 */
        .state-hint {
            position: absolute; bottom: -30px; left: 0; width: 100%;
            text-align: center; font-size: 0.8rem; letter-spacing: 2px;
            color: var(--cyan-jade); opacity: 0.6;
        }

        /* ════ 底部控制區 ════ */
        footer {
            display: flex; gap: 40px; z-index: 10; margin-top: 20px;
        }

        .action-btn {
            background: rgba(1,2,4,0.6);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: rgba(243, 229, 171, 0.7);
            padding: 10px 24px; font-size: 0.9rem; letter-spacing: 2px;
            cursor: pointer; border-radius: 4px; backdrop-filter: blur(5px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .action-btn:hover {
            border-color: var(--gold-classic); color: var(--gold-light);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }

        /* ════ 迴向確認與動畫遮罩層 ════ */
        #confirm-layer {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; opacity: 0; transition: opacity 0.5s;
            justify-content: center; align-items: center; z-index: 999;
            flex-direction: column; gap: 30px;
        }

        #anim-overlay {
            position: fixed; inset: 0; background: #000;
            display: none; opacity: 0; transition: opacity 0.5s;
            justify-content: center; align-items: center; z-index: 1000;
            flex-direction: column;
        }

        #full-screen-flash {
            position: absolute; inset: 0; background: #fff;
            opacity: 0; pointer-events: none; z-index: 1001;
            transition: opacity 0.2s ease-out;
        }

        #anim-text {
            color: var(--gold-light); text-align: center; font-size: 1.1rem;
            letter-spacing: 3px; line-height: 1.8; z-index: 1002;
            transition: opacity 1s; opacity: 0;
        }

        /* 微塵迴向特效 */
        .dust-particle {
            position: absolute;
            width: 3px; height: 3px;
            background: var(--cyan-jade); 
            border-radius: 50%;
            pointer-events: none;
            animation: drift 2s ease-out forwards;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0.3); opacity: 0; }
        }

        /* 響應式佈局：當螢幕太小時改為上下排列 */
        @media (max-width: 768px) {
            body { padding-top: 80px; }
            .zen-workspace { flex-direction: column; gap: 25px; }
            .vision-chamber, .writing-chamber { max-width: 290px; }
            .siddham-text-render { font-size: 8rem; }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-btn" onclick="goHome()">歸返道場</div>
        <div class="nav-title" id="display-name">阿彌陀佛種子字 ‧ 𑖮𑖿𑖨𑖱𑖾</div>
        <div class="nav-btn" onclick="toggleHelp()">說明</div>
    </div>

    <canvas id="starCanvas"></canvas>

    <div class="zen-workspace">
        
        <div class="vision-chamber">
            <div class="siddham-text-render" id="siddhamText">𑖮𑖿𑖨𑖱𑖾</div>
        </div>

        <div class="writing-chamber">
            <canvas id="traceCanvas"></canvas>
            <div class="state-hint" id="stateHint">當前狀態：隨意試寫（妄念隨消）</div>
        </div>

    </div>

    <footer>
        <button class="action-btn" id="stageBtn">正式鍊心</button>
        <button class="action-btn" id="clearBtn">清淨</button>
        <button class="action-btn" id="dedicateBtn" style="border-color: var(--gold-classic); color: var(--gold-classic); display:none;">大迴向</button>
    </footer>

    <div id="confirm-layer">
        <div style="font-size: 1.1rem; color: var(--gold-light); letter-spacing: 3px;">是否將此憑心自寫之功德，圓滿迴向？</div>
        <div style="display: flex; gap: 30px;">
            <button class="action-btn" onclick="closeConfirm()">再行精進</button>
            <button class="action-btn" style="border-color: var(--gold-classic);" onclick="executeDedicate()">確認迴向</button>
        </div>
    </div>

    <div id="anim-overlay">
        <div id="full-screen-flash"></div>
        <div id="anim-text"></div>
        <button class="action-btn" id="close-anim-btn" style="margin-top: 40px; opacity:0; pointer-events:none;" onclick="closeAnim()">因緣圓滿</button>
    </div>

    <script>
        // ════ 基礎宣告 ════
        const canvas = document.getElementById('traceCanvas');
        const ctx = canvas.getContext('2d');
        const starCanvas = document.getElementById('starCanvas');
        const starCtx = starCanvas.getContext('2d');
        
        const stageBtn = document.getElementById('stageBtn');
        const clearBtn = document.getElementById('clearBtn');
        const dedicateBtn = document.getElementById('dedicateBtn');
        const stateHint = document.getElementById('stateHint');
        
        let isDrawing = false;
        let lastX = 0; let lastY = 0;
        let lastWidth = 4; // 初始筆寬
        let lastTime = 0;
        let currentStage = 1; // 1: 隨意試寫, 2: 正式鍊心
        let fadeInterval = null;

        // 筆刷粗細限制演算法參數
        const MAX_WIDTH = 12; // 慢速停頓點圓時的最大寬度
        const MIN_WIDTH = 2;  // 快速提筆疾書時的最小寬度

        // ════ 靜謐星空背景 ════
        function initStars() {
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight;
            starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
            starCtx.fillStyle = 'rgba(139, 168, 156, 0.15)';
            for(let i=0; i<60; i++) {
                starCtx.beginPath();
                starCtx.arc(Math.random()*starCanvas.width, Math.random()*starCanvas.height, Math.random()*1.5, 0, Math.PI*2);
                starCtx.fill();
            }
        }

        // ════ 書寫畫布初始化 ════
        function initCanvas() {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(dpr, dpr);
            setBaseStrokeConfig();
        }

        function setBaseStrokeConfig() {
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowBlur = 4;
            ctx.shadowColor = currentStage === 1 ? '#8ba89c' : '#d4af37';
        }

        // ════ 隨意試寫（妄念隨消）柔和淡出機制 ════
        function startFadeMechanism() {
            if (fadeInterval) clearInterval(fadeInterval);
            fadeInterval = setInterval(() => {
                if (currentStage !== 1 || isDrawing) return;
                ctx.save();
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
            }, 100);
        }

        // ════ 座標獲取 ════
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        // ════ 毛筆運筆核心演算法（提按與點圓） ════
        function startDrawing(e) {
            isDrawing = true;
            const coords = getCoords(e);
            lastX = coords.x; lastY = coords.y;
            lastTime = Date.now();
            lastWidth = MAX_WIDTH * 0.7; // 起筆略帶圓潤

            // 處理輕點（即刻點圓）
            ctx.beginPath();
            ctx.fillStyle = currentStage === 1 ? '#8ba89c' : '#f3e5ab';
            ctx.arc(lastX, lastY, lastWidth / 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const coords = getCoords(e);
            const currentTime = Date.now();
            
            // 計算移動距離與時間差
            const distance = Math.hypot(coords.x - lastX, coords.y - lastY);
            const timeDiff = currentTime - lastTime || 1;
            
            // 速度 = 距離 / 時間
            const speed = distance / timeDiff;

            // 彈性粗細公式：速度快則線條細，速度慢（停頓）則線條粗（點圓擴散）
            let targetWidth = MAX_WIDTH - (speed * 2.5);
            if (targetWidth > MAX_WIDTH) targetWidth = MAX_WIDTH;
            if (targetWidth < MIN_WIDTH) targetWidth = MIN_WIDTH;

            // 緩和筆寬過渡（阻尼效應，使線條流暢不突兀）
            let currentWidth = lastWidth * 0.65 + targetWidth * 0.35;

            // 繪製毛筆路徑
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(coords.x, coords.y);
            
            ctx.strokeStyle = currentStage === 1 ? '#8ba89c' : '#f3e5ab';
            ctx.lineWidth = currentWidth;
            ctx.stroke();

            // 如果速度極慢且有移動，追加微量圓弧填充以確保「重按成圓」的墨跡飽滿度
            if (speed < 0.2) {
                ctx.beginPath();
                ctx.fillStyle = ctx.strokeStyle;
                ctx.arc(coords.x, coords.y, currentWidth / 2, 0, Math.PI * 2);
                ctx.fill();
            }

            lastX = coords.x; 
            lastY = coords.y;
            lastTime = currentTime;
            lastWidth = currentWidth;
        }

        function stopDrawing() { isDrawing = false; }

        // 事件綁定 (支援觸控筆與手指高精細識別)
        canvas.addEventListener('pointerdown', startDrawing);
        canvas.addEventListener('pointermove', draw);
        canvas.addEventListener('pointerup', stopDrawing);
        canvas.addEventListener('pointerleave', stopDrawing);

        // ════ 修持階段轉換 ════
        stageBtn.addEventListener('click', () => {
            if (currentStage === 1) {
                currentStage = 2;
                clearInterval(fadeInterval);
                ctx.clearRect(0, 0, canvas.width, canvas.height); // 淨空畫布
                setBaseStrokeConfig();
                stateHint.innerText = '當前狀態：正式鍊心（憑空默寫）';
                stageBtn.innerText = '重回試寫';
                dedicateBtn.style.display = 'inline-block';
            } else {
                currentStage = 1;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                setBaseStrokeConfig();
                stateHint.innerText = '當前狀態：隨意試寫（妄念隨消）';
                stageBtn.innerText = '正式鍊心';
                dedicateBtn.style.display = 'none';
                startFadeMechanism();
            }
        });

        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // ════ 完美銜接：大迴向機制 ════
        dedicateBtn.addEventListener('click', () => {
            const m = document.getElementById('confirm-layer');
            m.style.display = 'flex';
            setTimeout(() => m.style.opacity = 1, 10);
        });

        function closeConfirm() {
            const m = document.getElementById('confirm-layer');
            m.style.opacity = 0;
            setTimeout(() => m.style.display = 'none', 500);
        }

        function executeDedicate() {
            closeConfirm();

            const ov = document.getElementById('anim-overlay');
            const flash = document.getElementById('full-screen-flash');
            const txt = document.getElementById('anim-text');
            const btn = document.getElementById('close-anim-btn');

            ov.style.display = 'flex';
            txt.style.opacity = 0;
            btn.style.opacity = 0;
            btn.style.pointerEvents = 'none';

            setTimeout(() => ov.style.opacity = 1, 50);

            // 剎那閃光，毛筆字跡清空歸空，化作微塵
            setTimeout(() => {
                flash.style.opacity = 1;
                ctx.clearRect(0, 0, canvas.width, canvas.height); 

                // 250顆琉璃色與淡金微塵噴發散落
                for (let k = 0; k < 250; k++) {
                    let d = document.createElement('div');
                    d.className = 'dust-particle';
                    d.style.background = Math.random() > 0.5 ? 'var(--gold-light)' : 'var(--cyan-jade)';
                    d.style.width = (Math.random() * 4 + 2) + 'px';
                    d.style.height = d.style.width;
                    d.style.left = '50%'; d.style.top = '50%';
                    
                    let a = Math.random() * Math.PI * 2;
                    let dist = 100 + Math.random() * 550;
                    d.style.setProperty('--dx', Math.cos(a) * dist + 'px');
                    d.style.setProperty('--dy', Math.sin(a) * dist + 'px');
                    d.style.animationDuration = (0.7 + Math.random() * 1.5) + 's';
                    ov.appendChild(d);
                }

                setTimeout(() => {
                    flash.style.transition = 'opacity 1.5s ease-in';
                    flash.style.opacity = 0;
                }, 1200);

                txt.innerHTML = "【 因緣圓滿 ‧ 悉皆迴向 】<br><span style='font-size:0.95rem; color:var(--cyan-jade);'><br>自寫毛筆心念已化作無漏金剛光束，迴向虛空法界。</span>";
                txt.style.opacity = 1;

                setTimeout(() => {
                    btn.style.opacity = 1;
                    btn.style.pointerEvents = 'auto';
                }, 2500);
            }, 1600);
        }

        function closeAnim() {
            const ov = document.getElementById('anim-overlay');
            ov.style.opacity = 0;
            setTimeout(() => {
                ov.style.display = 'none';
                document.querySelectorAll('#anim-overlay .dust-particle').forEach(d => d.remove());
                currentStage = 1;
                setBaseStrokeConfig();
                stateHint.innerText = '當前狀態：隨意試寫（妄念隨消）';
                stageBtn.innerText = '正式鍊心';
                dedicateBtn.style.display = 'none';
                startFadeMechanism();
            }, 500);
        }

        // ════ 系統外部引導虛擬接口 ════
        function goHome() { alert("返回主道場系統"); }
        function toggleHelp() { alert("左側為純文字字型放大觀想區。右側為毛筆自寫區，手指移動慢或原地停頓即可『點圓』，移動快則線條銳利。"); }

        window.addEventListener('resize', () => { initStars(); initCanvas(); });
        window.addEventListener('DOMContentLoaded', () => { initStars(); initCanvas(); startFadeMechanism(); });
    </script>
</body>
</html>
