<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀淨土系統 - 七日法界觀想</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #141414;
            --text-color: #e0e0e0;
            --gold-glow: 0 0 20px rgba(255, 215, 0, 0.6), 0 0 40px rgba(255, 215, 0, 0.3);
            --gold-text: #ffd700;
            --border-color: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        /* 頂部七日聖字亮燈軌道 */
        .track-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .track-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #666;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .track-circle.active {
            border-color: var(--gold-text);
            color: var(--gold-text);
            background: #222;
            box-shadow: var(--gold-glow);
            text-shadow: var(--gold-glow);
        }

        /* 主顯示區域 */
        .main-display {
            text-align: center;
            margin-bottom: 30px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .day-title {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .deity-name {
            font-size: 2rem;
            color: var(--gold-text);
            margin-bottom: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .vow-text {
            font-size: 1.1rem;
            color: #b0b0b0;
            margin-bottom: 24px;
            letter-spacing: 4px;
        }

        /* 向量化大數據收藏室 - 五階寶幢 */
        .banner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 15px;
        }

        .banner-tier {
            width: 80%;
            height: 35px;
            margin: 2px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #aaa;
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: linear-gradient(180deg, #1f1f1f 0%, #151515 100%);
            transition: all 0.3s ease;
        }

        /* 依據當日啟動五階寶幢流轉與光芒 */
        .banner-tier.highlight {
            border-color: var(--gold-text);
            color: var(--gold-text);
            background: linear-gradient(180deg, #2a2510 0%, #1a1505 100%);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
            font-weight: bold;
        }

        /* 控制與語音按鈕 */
        .audio-control-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .audio-btn {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .audio-btn:hover {
            border-color: var(--gold-text);
            background: rgba(255, 215, 0, 0.05);
        }

        .audio-btn svg {
            width: 22px;
            height: 22px;
            fill: #888;
            transition: fill 0.3s ease;
        }

        .audio-btn:hover svg {
            fill: var(--gold-text);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. 去象牙燈，完美置入梵文種子字之軌道 -->
    <div class="track-container" id="trackContainer">
        <div class="track-circle" onclick="switchDay(0)">भः</div>
        <div class="track-circle" onclick="switchDay(1)">ह</div>
        <div class="track-circle" onclick="switchDay(2)">यु</div>
        <div class="track-circle" onclick="switchDay(3)">अं</div>
        <div class="track-circle" onclick="switchDay(4)">भै</div>
        <div class="track-circle" onclick="switchDay(5)">ह्रीः</div>
        <div class="track-circle" onclick="switchDay(6)">अ</div>
    </div>

    <!-- 主觀想與本尊內容 -->
    <div class="main-display">
        <div class="day-title" id="dayTitle">─ 第 1 日 ─</div>
        <div class="deity-name" id="deityName">釋迦如來 (bhaḥ)</div>
        <div class="vow-text" id="vowText">【娑婆教主 ． 寂靜涅槃】</div>

        <!-- 3. 五階寶幢向量美學大數據室 -->
        <div class="banner-container" id="bannerContainer">
            <div class="banner-tier" id="tier1">第一階：本初清淨觀</div>
            <div class="banner-tier" id="tier2">第二階：福德資糧具</div>
            <div class="banner-tier" id="tier3">第三階：智慧法界開</div>
            <div class="banner-tier" id="tier4">第四階：慈心三昧印</div>
            <div class="banner-tier" id="tier5">第五階：萬德洪名顯</div>
        </div>
    </div>

    <!-- 4. 法音恭聆同步控制 -->
    <div class="audio-control-panel">
        <button class="audio-btn" onclick="playTTS()" title="法音恭聆">
            <!-- 純向量喇叭圖示，無表情符號 -->
            <svg viewBox="0 0 24 24">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
        </button>
    </div>
</div>

<script>
    // 2. 1-7日全新本尊、核心法音與順序資料庫
    const purelandData = [
        { day: 1, seed: "भः", audioText: "bhaḥ", name: "釋迦如來", vow: "【娑婆教主 ． 寂靜涅槃】", highlightTier: 0 },
        { day: 2, seed: "ह", audioText: "ha", name: "地藏菩薩", vow: "【地藏本願 ． 拔苦與樂】", highlightTier: 1 },
        { day: 3, seed: "यु", audioText: "yu", name: "彌勒菩薩", vow: "【慈氏當來 ． 慈心三昧】", highlightTier: 2 },
        { day: 4, seed: "अं", audioText: "aṃ", name: "普賢文殊", vow: "【大行大智 ． 智行合一】", highlightTier: 3 },
        { day: 5, seed: "भै", audioText: "bhai", name: "藥師佛", vow: "【藥師消災 ． 身心琉璃】", highlightTier: 4 },
        { day: 6, seed: "ह्रीः", audioText: "hrīḥ", name: "阿彌陀佛", vow: "【彌陀淨土 ． 萬德洪名】", highlightTier: 5 }, // 特殊全然共鳴
        { day: 7, seed: "अ", audioText: "a", name: "胎藏界大日如來", vow: "【毗盧遮那 ． 本初清淨】", highlightTier: -1 } // 全階契合
    ];

    let currentDayIndex = 0;

    function switchDay(index) {
        currentDayIndex = index;
        const data = purelandData[index];

        // 更新文字
        document.getElementById("dayTitle").innerText = `─ 第 ${data.day} 日 ─`;
        document.getElementById("deityName").innerText = `${data.name} (${data.audioText})`;
        document.getElementById("vowText").innerText = data.vow;

        // 更新軌道亮燈狀態
        const circles = document.querySelectorAll('.track-circle');
        circles.forEach((circle, idx) => {
            if (idx === index) {
                circle.classList.add('active');
            } else {
                circle.classList.remove('active');
            }
        });

        // 更新五階寶幢向量高亮邏輯
        const tiers = [
            document.getElementById("tier1"),
            document.getElementById("tier2"),
            document.getElementById("tier3"),
            document.getElementById("tier4"),
            document.getElementById("tier5")
        ];

        tiers.forEach((tier, idx) => {
            tier.classList.remove('highlight');
            // 第7日胎藏界大日如來代表本初清淨，五階全契合高亮；其餘依序對齊
            if (data.highlightTier === -1) {
                tier.classList.add('highlight');
            } else if (data.highlightTier === 5 || idx === data.highlightTier) {
                // 第6日阿彌陀佛與全寶幢功德共鳴
                tier.classList.add('highlight');
            }
        });
    }

    // 4. TTS（法音恭聆）完美同步發音核心
    function playTTS() {
        const data = purelandData[currentDayIndex];
        
        // 確保單機及跨平台相容性，採用內建 SpeechSynthesis
        if ('speechSynthesis' in window) {
            // 停止當前所有正在播放的聲音
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(data.audioText);
            // 設定合適的法音發聲語系
            utterance.lang = 'sa-IN'; // 優先嘗試梵文/印度語系發音
            utterance.rate = 0.8;      // 略微放慢，呈現神聖沉穩感
            
            window.speechSynthesis.speak(utterance);
        } else {
            console.log("當前裝置不支援語音輸出，發音文字為: " + data.audioText);
        }
    }

    // 初始化顯示第一天
    window.onload = function() {
        switchDay(0);
    };
</script>

</body>
</html>
