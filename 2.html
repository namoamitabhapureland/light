<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>彌陀淨土同心圓 - 滿版流轉</title>
  <!-- ===== CSS：取代原本 .write-box-outer / .write-box-inner / .write-btn-group ===== -->
<style>
.write-box-outer {
    width: 280px;
    height: 280px;
    padding: 0;
    border: none;
    background: transparent;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
}

.write-box-outer svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

/* 中央可書寫圓形區域 — 放大讓字寫得開 */
.write-box-inner {
    width: 78%;
    height: 78%;
    border-radius: 50%;
    border: 1.5px solid rgba(212, 175, 55, 0.85);
    background: rgba(2, 2, 4, 0.5);
    position: relative;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
    z-index: 2;
}

#writeCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 25;
    touch-action: none;
    border-radius: 50%;
}

/* 簡化版圖示按鈕：恢復 + 音符 */
.write-btn-group {
    margin-top: 14px;
    display: flex;
    gap: 28px;
    align-items: center;
    justify-content: center;
}
.icon-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(212,175,55,0.5);
    background: linear-gradient(180deg, rgba(30,25,15,0.8) 0%, rgba(10,8,5,0.95) 100%);
    box-shadow: inset 0 0 10px rgba(212,175,55,0.2), 0 4px 12px rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s ease;
}
.icon-btn:active {
    transform: scale(0.92);
    border-color: var(--gold);
    box-shadow: inset 0 0 14px rgba(255,255,255,0.2), 0 2px 6px rgba(0,0,0,0.8);
}
.icon-btn svg {
    width: 20px;
    height: 20px;
    stroke: var(--gold-light);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
}
.icon-btn.tts-btn svg {
    fill: var(--gold-light);
    stroke: none;
}
</style>

<!-- ===== HTML：取代原本 .write-box-outer 區塊與 .write-btn-group ===== -->
<div class="write-box-outer">
    <!-- 同心圓種子字環 SVG（原創幾何排列，無版權問題） -->
    <svg viewBox="0 0 280 280" aria-hidden="true">
        <defs>
            <!-- 文字排列路徑：外圈大圓 -->
            <path id="ringPathOuter" d="M 140,18 A 122,122 0 1,1 139.99,18" fill="none"/>
        </defs>

        <!-- 最外層細金線圓 -->
        <circle cx="140" cy="140" r="138" fill="none" stroke="rgba(212,175,55,0.25)" stroke-width="1"/>

        <!-- 種子字環底色 -->
        <circle cx="140" cy="140" r="122" fill="rgba(2,2,4,0.55)" stroke="rgba(212,175,55,0.85)" stroke-width="1.5"/>
        <circle cx="140" cy="140" r="110" fill="rgba(2,2,4,0)" stroke="rgba(212,175,55,0.85)" stroke-width="1.5"/>

        <!-- 環繞種子字（重複排列，沿圓周分佈） -->
        <g fill="#f3e5ab" font-family="serif" font-size="13" text-anchor="middle"
           style="text-shadow:0 0 6px rgba(243,229,171,0.5);">
            <text>
                <textPath href="#ringPathOuter" startOffset="0%">
                    ॐ अ ह्रीः भः यु अं भै ह ॐ अ ह्रीः भः यु अं भै ह ॐ अ ह्रीः भः यु अं भै ह ॐ अ ह्रीः भः यu अं भै ह
                </textPath>
            </text>
        </g>

        <!-- 內圈裝飾細線 -->
        <circle cx="140" cy="140" r="98" fill="none" stroke="rgba(212,175,55,0.35)" stroke-width="1" stroke-dasharray="2 4"/>
    </svg>

    <div class="write-box-inner" id="writeContainer">
        <canvas id="writeCanvas"></canvas>
    </div>
</div>

<div class="write-btn-group">
    <div class="icon-btn" onclick="clearCanvas()" title="重新書寫">
        <svg viewBox="0 0 24 24">
            <path d="M3 12a9 9 0 1 0 2.64-6.36L3 8"/>
            <path d="M3 3v5h5"/>
        </svg>
    </div>
    <div class="icon-btn tts-btn" onclick="playTTS()" title="恭聆法音">
        <svg viewBox="0 0 24 24">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
        </svg>
    </div>
</div>
