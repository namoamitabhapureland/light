<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <title>彌陀淨土系統 ． 七日法界觀想</title>
    <style>
        :root {
            --bg-deep: #020203; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; 
            --gold-light: #f3e5ab; 
            --text-gold: #f3e5ab;
            --gold-glow: 0 0 20px rgba(255, 215, 0, 0.6), 0 0 40px rgba(255, 215, 0, 0.3);
            --mandala-red: rgba(70, 15, 15, 0.45);
        }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, var(--bg-deep) 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100dvh;
            display: flex; justify-content: center; align-items: center; color: #fff;
        }

        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #vignette { position: absolute; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(circle at 50% 30%, transparent 10%, rgba(1, 1, 3, 0.95) 100%); }

        #mist-layer { position: absolute; bottom: -10%; left: -10%; width: 120%; height: 60%; z-index: 5; pointer-events: none; mix-blend-mode: screen; overflow: hidden; }
        .mist-cloud { 
            position: absolute; border-radius: 50%; 
            animation: drift-mist 15s infinite alternate ease-in-out; 
            will-change: transform, opacity; 
            transform: translateZ(0); 
        }

        .mist-1 { width: 1000px; height: 500px; left: -10%; bottom: -50px; background: radial-gradient(ellipse, rgba(212,175,55,0.25) 0%, transparent 70%); animation-duration: 18s; }
        .mist-2 { width: 1200px; height: 600px; right: -15%; bottom: -100px; background: radial-gradient(ellipse, rgba(196,113,237,0.2) 0%, transparent 70%); animation-duration: 22s; animation-delay: -5s; }
        .mist-3 { width: 900px; height: 450px; left: 15%; bottom: 0px; background: radial-gradient(ellipse, rgba(0,242,254,0.2) 0%, transparent 70%); animation-duration: 16s; animation-delay: -2s; }
        .mist-4 { width: 1100px; height: 550px; right: 10%; bottom: -80px; background: radial-gradient(ellipse, rgba(255,126,179,0.2) 0%, transparent 70%); animation-duration: 20s; animation-delay: -8s; }
        .mist-5 { width: 800px; height: 400px; left: 35%; bottom: -40px; background: radial-gradient(ellipse, rgba(255,255,255,0.25) 0%, transparent 70%); animation-duration: 14s; animation-delay: -10s; }
        @keyframes drift-mist { 0% { transform: translateX(-40px) translateY(10px) scale(1); opacity: 0.6; } 100% { transform: translateX(40px) translateY(-10px) scale(1.1); opacity: 1; } }

        /* 行願主頁面 */
        #page-main { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; }
        .neon-flow { background: linear-gradient(90deg, #FDF5D3, #D4AF37, #E5989B, #89CFF0, #C9A0DC, #D4AF37, #FDF5D3); background-size: 200% 100%; animation: energyFlow 4s linear infinite; }
        @keyframes energyFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        
        .nav-top { width: 90%; max-width: 480px; z-index: 20; display: flex; justify-content: space-between; align-items: center; margin-top: max(15px, env(safe-area-inset-top)); padding: 12px 20px; background: rgba(5, 5, 8, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(212,175,55,0.2); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .nav-btn { display: flex; align-items: center; gap: 8px; color: var(--gold-light); font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .nav-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.5; fill: none; }
        .nav-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }

        .tracker-container { z-index: 20; margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .tracker-title { color: var(--gold-light); font-size: 0.85rem; letter-spacing: 4px; text-shadow: 0 0 10px var(--solid-gold); font-weight: bold; }
        
        .tracker-circles { display: flex; gap: 8px; align-items: center; }
        .track-circle { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(212,175,55,0.3); display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.6); font-size: 0.95rem; color: #555; font-weight: bold; transition: all 0.4s ease; cursor: pointer; }
        .track-circle.lit { border-color: #fff; color: rgba(255, 255, 255, 0.4); background: rgba(212,175,55,0.1); }
        .track-circle.active-day { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.25); box-shadow: var(--gold-glow); text-shadow: var(--gold-glow); }

        .zen-action-btn {
            background: linear-gradient(180deg, rgba(30, 25, 15, 0.8) 0%, rgba(10, 8, 5, 0.95) 100%);
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: inset 0 0 12px rgba(212, 175, 55, 0.2), 0 4px 15px rgba(0,0,0,0.6);
            color: var(--gold-light);
            padding: 10px 24px;
            font-size: 0.85rem;
            letter-spacing: 3px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 6px rgba(243, 229, 171, 0.4);
        }
        .zen-action-btn:active {
            background: linear-gradient(180deg, rgba(50, 40, 20, 0.9) 0%, rgba(20, 15, 10, 0.98) 100%);
            border-color: var(--gold);
            box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.2), 0 2px 8px rgba(0,0,0,0.8);
            transform: scale(0.98);
            color: #fff;
        }

        /* 曼荼羅圓形手寫區域 - 已依需求放大1/3倍並往外擴散 */
        .hrih-container {
            z-index: 20;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .hrih-title {
            color: var(--gold);
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 2px;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(243, 229, 171, 0.7);
            font-family: serif;
        }
        .hrih-subtitle {
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        
        .mandala-wrap {
            position: relative;
            width: 92vw;
            max-width: 380px;
            height: 92vw;
            max-height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px 0;
        }
        .mandala-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            animation: mandala-rotate 180s linear infinite;
        }
        @keyframes mandala-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .write-box-circular {
            width: 56%;
            height: 56%;
            border-radius: 50%;
            background: rgba(10, 8, 8, 0.85);
            border: 2px solid rgba(212, 175, 55, 0.85);
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.9), 0 0 20px rgba(212, 175, 55, 0.3);
            position: relative;
            z-index: 25;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #writeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        
        .write-btn-group {
            margin-top: 10px;
            display: flex;
            gap: 15px;
        }

        .action-zone { z-index: 20; margin-top: 15px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        .seal-btn-rect {
            width: 85%;
            max-width: 320px;
            height: 52px;
            position: relative;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.4);
            background: linear-gradient(180deg, rgba(25, 22, 15, 0.85) 0%, rgba(5, 5, 5, 0.95) 100%);
            box-shadow: 0 6px 20px rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        .seal-btn-progress-bg {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(214, 175, 53, 0.05), rgba(243, 229, 171, 0.25));
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .seal-btn-text {
            position: relative;
            z-index: 5;
            color: var(--cyan);
            font-size: 0.9rem;
            letter-spacing: 4px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            transition: color 0.3s;
        }

        .pool-wrap { width: 70%; max-width: 300px; text-align: center; }
        .pool-label { font-size: 0.7rem; color: var(--gold-light); letter-spacing: 2px; margin-bottom: 6px; opacity: 0.8; }
        .pool-bar-bg { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.5); }
        .pool-bar-fill { height: 100%; width: 0%; transition: width 1s cubic-bezier(0.2,0.8,0.2,1); }

        /* Modal 彈窗樣式 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 9999; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .data-card { width: 92%; max-width: 420px; border: 1px solid rgba(212,175,55,0.42); border-radius: 20px; padding: 30px 25px; box-shadow: 0 10px 55px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.1); background: linear-gradient(180deg, rgba(20,20,20,0.95) 0%, rgba(5,5,5,0.98) 100%); }
        .data-title { color: var(--solid-gold); font-size: 1.05rem; letter-spacing: 4px; text-align: center; margin-bottom: 5px; font-weight: bold; text-shadow: 0 0 10px rgba(212,175,55,0.4); }
        .data-sub { text-align: center; font-size: 11px; color: var(--text-gold); margin-bottom: 25px; letter-spacing: 2px; opacity: 0.6; }

        .trophy-shelf { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 35px; padding-bottom: 15px; border-bottom: 1px dashed rgba(212,175,55,0.3); }
        .trophy-item { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 20%; }
        .trophy-label { font-size: 0.65rem; color: rgba(243,229,171,0.6); letter-spacing: 1px; white-space: nowrap; }

        .banner-jewel { width: 25px; height: 42px; cursor: pointer; transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); transform-origin: bottom center; }
        .banner-unlit { opacity: 0.15; filter: grayscale(100%); }
        .banner-lit { opacity: 0.95; animation: star-breathe 3s infinite alternate ease-in-out; }
        @keyframes star-breathe { 0% { transform: scale(1); } 100% { transform: scale(1.08); filter: brightness(1.2); } }

        #banner-7 { --f1: #FFB703; --f2: #FB8500; --f3: #E85D04; --bd: #9D0208; --bs: #370617; --rb: #FFF; }
        #banner-7.banner-lit { filter: drop-shadow(0 0 8px rgba(251,133,0,0.8)); }
        #banner-70 { --f1: #FFF8DC; --f2: #F3E5AB; --f3: #D4AF37; --bd: #AA7900; --bs: #5C4000; --rb: #FFF; }
        #banner-70.banner-lit { filter: drop-shadow(0 0 8px rgba(212,175,55,0.8)); }
        #banner-700 { --f1: #E0FBFC; --f2: #98C1D9; --f3: #48CAE4; --bd: #2A9D8F; --bs: #1D3557; --rb: #FFF; }
        #banner-700.banner-lit { filter: drop-shadow(0 0 8px rgba(42,157,143,0.8)); }
        #banner-7000 { --f1: #FFFFFF; --f2: #F4A261; --f3: #2A9D8F; --bd: #C1121F; --bs: #3A86FF; --rb: #FDFCDC; }
        #banner-7000.banner-lit { filter: drop-shadow(0 0 12px rgba(131,56,236,0.6)); }
        #banner-9999999 { --f1: #FFFFFF; --f2: #FDFCDC; --f3: #E0E1DD; --bd: #F3E5AB; --bs: #D4AF37; --rb: #FFFFFF; }
        #banner-9999999.banner-lit { filter: drop-shadow(0 0 10px rgba(255,255,255,0.9)); }

        .glass-energy-bar { width: 100%; margin: 8px 0 35px 0; position: relative; }
        .bar-track { width: 100%; height: 10px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.09); border-radius: 10px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.55); }
        .bar-fill { height: 100%; width: 0%; opacity: 0.95; transition: width 1.2s cubic-bezier(0.2,0.8,0.2,1); border-radius: 10px;}
        .bar-labels { position: absolute; width: 100%; height: 20px; top: 16px; }
        .bar-labels span { position: absolute; font-size: 9px; color: var(--text-gold); letter-spacing: 1px; transform: translateX(-50%); white-space: nowrap; opacity: 0.7; }
        .bar-labels span::before { content: ''; position: absolute; top: -11px; left: 50%; transform: translateX(-50%); width: 3px; height: 3px; background: rgba(255,255,255,0.8); border-radius: 50%; box-shadow: 0 0 4px #fff; }
        
        /* 證書彈窗 */
        .cert-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 10000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s; }
        .cert-overlay.show { opacity: 1; pointer-events: auto; }
        .cert-box { background: linear-gradient(180deg, rgba(20,20,20,0.95) 0%, rgba(5,5,5,0.98) 100%); border: 1px solid rgba(212,175,55,0.4); border-radius: 20px; width: 85%; max-width: 360px; padding: 40px 25px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.9); transform: translateY(20px) scale(0.95); transition: 0.4s; }
        .cert-overlay.show .cert-box { transform: translateY(0) scale(1); }
        .cert-header { color: var(--gold-light); font-size: 0.9rem; letter-spacing: 6px; margin-bottom: 25px; }
        .cert-svg-wrap { width: 90px; height: 150px; margin: 0 auto 25px auto; animation: cert-float 3s infinite alternate; }
        .cert-svg-wrap svg { width: 100%; height: 100%; overflow: visible; }
        @keyframes cert-float { 0% { transform: translateY(0); } 100% { transform: translateY(-8px); } }
        .cert-name { color: var(--solid-gold); font-size: 1.3rem; font-weight: bold; letter-spacing: 5px; margin: 10px 0 25px 0; }
        .cert-divider { width: 60%; height: 1px; background: radial-gradient(circle, rgba(212,175,55,0.6) 0%, transparent 100%); margin: 0 auto 20px auto; }
        .cert-desc { color: #ddd; font-size: 0.85rem; line-height: 2; letter-spacing: 1.5px; margin-bottom: 35px; }

        .dharma-light {
            position: fixed; width: 20px; height: 20px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 20px 10px rgba(212,175,55,0.9), 0 0 40px 20px rgba(255,255,255,0.7);
            z-index: 10001; pointer-events: none; opacity: 0;
            transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="page-transition-curtain" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 999999; opacity: 0; pointer-events: none; transition: opacity 0.8s ease-in-out;"></div>

    <div id="vow-alert-overlay" style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 10000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s;">
        <div id="vow-alert-box" style="background: linear-gradient(135deg, rgba(20,20,20,0.95), rgba(5,5,5,0.98)); border: 1px solid rgba(212,175,55,0.4); border-radius: 20px; padding: 35px 25px; width: 85%; max-width: 340px; text-align: center; box-shadow: 0 15px 50px rgba(0,0,0,0.9), inset 0 0 15px rgba(212,175,55,0.1); transform: scale(0.95); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.2" style="width: 36px; height: 36px; margin-bottom: 15px; filter: drop-shadow(0 0 8px rgba(212,175,55,0.6));">
                <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
            </svg>
            <div style="color: var(--gold); font-size: 1.15rem; letter-spacing: 4px; margin-bottom: 15px; font-weight: bold; text-shadow: 0 0 10px rgba(212,175,55,0.3);">法界顯化</div>
            <div id="vow-alert-msg" style="color: #bbb; font-size: 0.95rem; line-height: 1.8; letter-spacing: 1px; margin-bottom: 25px;"></div>
            <button class="zen-action-btn" onclick="closeVowAlert()">合十收攝</button>

    <canvas id="starCanvas"></canvas>
    <div id="vignette"></div>
    <div id="mist-layer">
        <div class="mist-cloud mist-1"></div><div class="mist-cloud mist-2"></div>
        <div class="mist-cloud mist-3"></div><div class="mist-cloud mist-4"></div><div class="mist-cloud mist-5"></div>
    </div>
    <div id="flash-overlay"></div>

    <div id="page-main">
        <div class="nav-top">
            <div class="nav-btn" onclick="returnToMainHall()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回道場</div>
            <div class="nav-divider"></div>

<script>
    const purelandData = [
        { day: 1, seed: "भः", audioText: "bhaḥ", name: "釋迦如來", vow: "【娑婆教主 ． 寂靜涅槃】" },
        { day: 2, seed: "ह", audioText: "ha", name: "地藏菩薩", vow: "【地藏本願 ． 拔苦與樂】" },
        { day: 3, seed: "यु", audioText: "yu", name: "彌勒菩薩", vow: "【慈氏當來 ． 慈心三昧】" },
        { day: 4, seed: "अं", audioText: "aṃ", name: "普賢文殊", vow: "【大行大智 ． 智行合一】" },
        { day: 5, seed: "भै", audioText: "bhai", name: "藥師佛", vow: "【藥師消災 ． 身心琉璃】" },
        { day: 6, seed: "ह्रीः", audioText: "hrīḥ", name: "阿彌陀佛", vow: "【彌陀淨土 ． 萬德洪名】" },
        { day: 7, seed: "अ", audioText: "a", name: "胎藏界大日如來", vow: "【毗盧遮那 ． 本初清淨】" }
    ];

    const CERT_DATA = {
        7: { title: "✦ 初心 ． 發心契印 ✦", glow: "drop-shadow(0 0 25px rgba(251,133,0,0.8))", text: "初發菩提心，已行七日。<br>橘紅微光破除無明黑闇。<br>願此一念，相續不斷。", cssVars: "--f1: #FFB703; --f2: #FB8500; --f3: #E85D04; --bd: #9D0208; --bs: #370617; --rb: #FFF;" },
        70: { title: "✦ 歡喜 ． 菩提契印 ✦", glow: "drop-shadow(0 0 25px rgba(233,196,106,0.8))", text: "已圓滿七十日普賢行願。<br>真金寶幢於法界初現。<br>願此生步步生蓮，永不退轉。", cssVars: "--f1: #FFF8DC; --f2: #F3E5AB; --f3: #D4AF37; --bd: #AA7900; --bs: #5C4000; --rb: #FFF;" },
        700: { title: "✦ 遠行 ． 琉璃契印 ✦", glow: "drop-shadow(0 0 35px rgba(42,157,143,0.8))", text: "歷經七百日大願薰修。<br>煩惱漸除，青琉璃寶幢高懸法界。<br>願身心清淨，內外明徹。", cssVars: "--f1: #E0FBFC; --f2: #98C1D9; --f3: #48CAE4; --bd: #2A9D8F; --bs: #1D3557; --rb: #FFF;" },
        7000: { title: "✦ 善慧 ． 妙法契印 ✦", glow: "drop-shadow(0 0 45px rgba(193,18,31,0.8))", text: "七千日行願，不疲不厭。<br>赤紅寶幢燃起三昧真火。<br>願大悲拔苦，普度一切有情。", cssVars: "--f1: #F4A261; --f2: #E76F51; --f3: #C1121F; --bd: #780000; --bs: #370617; --rb: #FDFCDC;" },
        9999999: { title: "✦ 無量 ． 盡未來際 ✦", glow: "drop-shadow(0 0 60px #fff) drop-shadow(0 0 15px #E9C46A)", text: "盡未來際，行願無盡。<br>累劫功德化為無上白金佛光。<br>法界授記，十方如來同聲讚歎。", cssVars: "--f1: #FFFFFF; --f2: #FDFCDC; --f3: #E0E1DD; --bd: #F3E5AB; --bs: #D4AF37; --rb: #FFFFFF;" }
    };

    const MAIN_DB_KEY = 'PX_V15.0'; 
    let mainDb = localStorage.getItem(MAIN_DB_KEY) ? JSON.parse(localStorage.getItem(MAIN_DB_KEY)) : { points: 0, puxianData: null };
    let todayStr = new Date().toDateString();

    if (!mainDb.puxianData) {
        mainDb.puxianData = {
            startDate: new Date().setHours(0,0,0,0), 
            lastLogin: todayStr,
            weekRecord: [false, false, false, false, false, false, false],
            poolPoints: 0, 
            totalDays365: 0, 
            totalYears108: 0,
            totalPracticedDays: 0
        };
        localStorage.setItem(MAIN_DB_KEY, JSON.stringify(mainDb));
    }

    let db = mainDb.puxianData; 
    let trueDays = (db.totalYears108 * 365) + db.totalDays365;
    if (typeof db.totalPracticedDays === 'undefined' || db.totalPracticedDays < trueDays) {
        db.totalPracticedDays = trueDays;
        localStorage.setItem(MAIN_DB_KEY, JSON.stringify(mainDb));
    }

    let nowMidnight = new Date().setHours(0,0,0,0);
    let startMidnight = new Date(db.startDate).setHours(0,0,0,0);
    let daysPassed = Math.max(0, Math.round((nowMidnight - startMidnight) / 86400000));
    
    let currentDayOfWeek = daysPassed % 7; 
    let activeViewIndex = currentDayOfWeek; 

    if (db.lastLogin !== todayStr) {
        let lastLoginMidnight = db.lastLogin ? new Date(db.lastLogin).setHours(0,0,0,0) : startMidnight;
        let lastLoginWeek = Math.floor(Math.round((lastLoginMidnight - startMidnight) / 86400000) / 7);
        let currentWeek = Math.floor(daysPassed / 7);

        if (currentWeek > lastLoginWeek) {
            let successCount = db.weekRecord.filter(Boolean).length;
            db.poolPoints += (successCount === 7) ? 1000 : (successCount * 100);
            if (db.poolPoints >= 1000) {
                showVowAlert(`行願資糧已滿千，<br>自動匯入彌陀淨土主系統。`);
                mainDb.points = (mainDb.points || 0) + db.poolPoints; 
                db.poolPoints = 0; 
            }
            db.weekRecord = [false, false, false, false, false, false, false];
        }
        db.lastLogin = todayStr; saveDB();
    }
    function saveDB() { localStorage.setItem(MAIN_DB_KEY, JSON.stringify(mainDb)); }

    function returnToMainHall() {
        document.getElementById('page-transition-curtain').style.opacity = '1';
        setTimeout(() => { window.location.href = 'index.html?screen=3'; }, 800);
    }

    function showVowAlert(msg) {
        const alertMsg = document.getElementById('vow-alert-msg');
        const overlay = document.getElementById('vow-alert-overlay');
        if(alertMsg && overlay) {
            alertMsg.innerHTML = msg;
            overlay.style.display = 'flex';
            void overlay.offsetWidth; 
            overlay.style.opacity = '1';
            document.getElementById('vow-alert-box').style.transform = 'scale(1)';
        }
    }

    function closeVowAlert() {
        const overlay = document.getElementById('vow-alert-overlay');
        const box = document.getElementById('vow-alert-box');
        if(overlay && box) {
            overlay.style.opacity = '0';
            box.style.transform = 'scale(0.95)';
            setTimeout(() => { overlay.style.display = 'none'; }, 400); 
        }
    }

    function selectDay(idx) {
        activeViewIndex = idx;
        clearCanvas();
        updatePageUI();
    }

    function updatePageUI() {
        let trackersHTML = '';
        for (let i = 0; i < 7; i++) {
            let isLit = db.weekRecord[i] ? 'lit' : '';
            let isActive = (i === activeViewIndex) ? 'active-day' : '';
            trackersHTML += `<div class="track-circle ${isLit} ${isActive}" onclick="selectDay(${i})">${purelandData[i].seed}</div>`;
        }
        document.getElementById('ui-trackers').innerHTML = trackersHTML;

        const currentData = purelandData[activeViewIndex];
        document.getElementById('dharma-seed-title').innerText = currentData.seed;
        document.getElementById('dharma-deity-subtitle').innerText = `${currentData.name} (${currentData.audioText})`;

        document.getElementById('ui-pool-text').innerText = `法界暫存資糧 : ${db.poolPoints} / 1000`;
        document.getElementById('ui-pool-bar').style.width = `${(db.poolPoints / 1000) * 100}%`;

        let btnText = document.getElementById('seal-text');
        let progressFill = document.getElementById('btn-progress');

        if (db.weekRecord[activeViewIndex]) {
            btnText.innerText = "【 此日行願已圓滿 】"; btnText.style.color = "var(--solid-gold)";
            progressFill.style.width = '100%';
        } else {
            if (activeViewIndex === currentDayOfWeek) {
                btnText.innerText = "長按契印 ． 圓滿今日"; btnText.style.color = "var(--cyan)";
            } else {
                btnText.innerText = "瀏覽觀想中 ． 無法跨日契印"; btnText.style.color = "#555";
            }
            progressFill.style.width = '0%';
        }
    }

    let hwCanvas, hwCtx, isDrawing = false;
    function initHandwritingCanvas() {
        hwCanvas = document.getElementById('writeCanvas');
        hwCtx = hwCanvas.getContext('2d');
        resizeHandwritingCanvas();

        const preventAndExecute = (e, func) => { e.preventDefault(); func(e); };

        hwCanvas.addEventListener('mousedown', (e) => { isDrawing = true; drawStroke(e); });
        hwCanvas.addEventListener('mousemove', (e) => { if(isDrawing) drawStroke(e); });
        window.addEventListener('mouseup', () => isDrawing = false);

        hwCanvas.addEventListener('touchstart', (e) => preventAndExecute(e, (ev) => { isDrawing = true; drawStroke(ev.touches[0]); }), {passive: false});
        hwCanvas.addEventListener('touchmove', (e) => preventAndExecute(e, (ev) => { if(isDrawing) drawStroke(ev.touches[0]); }), {passive: false});
        hwCanvas.addEventListener('touchend', (e) => preventAndExecute(e, () => isDrawing = false), {passive: false});
    }

    function resizeHandwritingCanvas() {
        const container = document.getElementById('writeContainer');
        if (!container) return;
        const rect = container.getBoundingClientRect();
        hwCanvas.width = rect.width;
        hwCanvas.height = rect.height;
        clearCanvas();
    }

    function drawStroke(e) {
        const rect = hwCanvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        hwCtx.lineWidth = 4;
        hwCtx.lineCap = 'round';
        hwCtx.lineJoin = 'round';
        hwCtx.strokeStyle = '#f3e5ab';
        hwCtx.shadowBlur = 6;
        hwCtx.shadowColor = '#d4af37';

        if (e.type === 'mousedown' || (isDrawing && hwCtx.pathBegun === false)) {
            hwCtx.beginPath();
            hwCtx.moveTo(x, y);
            hwCtx.lineTo(x + 0.1, y);
            hwCtx.stroke();
            hwCtx.pathBegun = true;
        } else {
            hwCtx.lineTo(x, y);
            hwCtx.stroke();
        }
    }
    window.addEventListener('mouseup', () => { if(hwCtx) hwCtx.pathBegun = false; });
    window.addEventListener('touchend', () => { if(hwCtx) hwCtx.pathBegun = false; });

    function clearCanvas() {
        if(!hwCtx) return;
        hwCtx.clearRect(0, 0, hwCanvas.width, hwCanvas.height);
        hwCtx.pathBegun = false;
    }

    function playTTS() {
        if (!('speechSynthesis' in window)) return showVowAlert("法界回饋：您的設備暫不支援語音朗讀。");
        window.speechSynthesis.cancel(); 
        const currentData = purelandData[activeViewIndex];
        let utterance = new SpeechSynthesisUtterance(currentData.audioText);
        utterance.lang = 'sa-IN'; 
        utterance.rate = 0.8; 
        window.speechSynthesis.speak(utterance);
    }

    function updateDataModal() {
        document.getElementById('ui-txt-365').innerText = db.totalDays365; 
        document.getElementById('ui-txt-108').innerText = db.totalYears108;
        setTimeout(() => { 
            document.getElementById('ui-bar-365').style.width = (Math.min(db.totalDays365 / 365, 1) * 100) + '%'; 
            document.getElementById('ui-bar-108').style.width = (Math.min(db.totalYears108 / 108, 1) * 100) + '%'; 
        }, 100);

        let days = db.totalPracticedDays;
        toggleJewel('banner-7', days >= 7);
        toggleJewel('banner-70', days >= 70);
        toggleJewel('banner-700', days >= 700);
        toggleJewel('banner-7000', days >= 7000);
        toggleJewel('banner-9999999', days >= 9999999);
    }

    function toggleJewel(id, isLit) {
        const el = document.getElementById(id);
        if (isLit) { el.classList.add('banner-lit'); el.classList.remove('banner-unlit'); } 
        else { el.classList.remove('banner-lit'); el.classList.add('banner-unlit'); }
    }

    let isAutoTriggered = false; 
    function openCert(tier) {
        if (db.totalPracticedDays < tier) return; 
        isAutoTriggered = false; 

        let currentName = "行 者";
        if (mainDb && mainDb.name && mainDb.name.trim() !== "") { currentName = mainDb.name; }
        document.getElementById('cert-name-display').innerText = currentName;
        document.getElementById('cert-title').innerText = CERT_DATA[tier].title;
        document.getElementById('cert-text').innerHTML = CERT_DATA[tier].text;
        document.getElementById('cert-glow').style.filter = CERT_DATA[tier].glow;
        document.getElementById('cert-svg').style.cssText = CERT_DATA[tier].cssVars;
        document.getElementById('cert-modal').classList.add('show');
    }

    function closeCert() { 
        document.getElementById('cert-modal').classList.remove('show'); 
        if (isAutoTriggered) { setTimeout(flyLightToHistory, 300); }
    }

    function flyLightToHistory() {
        const targetBtn = document.getElementById('nav-history-btn'); 
        if (!targetBtn) return;
        const rect = targetBtn.getBoundingClientRect();
        const targetX = rect.left + rect.width / 2;
        const targetY = rect.top + rect.height / 2;

        const light = document.createElement('div');
        light.className = 'dharma-light';
        light.style.left = '50vw'; light.style.top = '50vh'; light.style.opacity = '1';
        light.style.transform = 'translate(-50%, -50%) scale(1)';
        document.body.appendChild(light);
        void light.offsetWidth; 
        
        light.style.left = targetX + 'px'; light.style.top = targetY + 'px';
        light.style.transform = 'translate(-50%, -50%) scale(0.1)'; light.style.opacity = '0';

        setTimeout(() => {
            light.remove();
            targetBtn.style.transform = 'scale(1.1)'; targetBtn.style.textShadow = '0 0 15px #fff';
            setTimeout(() => { targetBtn.style.transform = 'none'; targetBtn.style.textShadow = 'none'; }, 300);
        }, 1200);
    }

    const sealBtn = document.getElementById('seal-btn'); 
    const progressFill = document.getElementById('btn-progress'); 
    const hintText = document.getElementById('seal-text');
    let reqAnimId, startTime, DURATION = 2000;

    function drawProgress(timestamp) {
        if (!startTime) startTime = timestamp; 
        let pct = Math.min((timestamp - startTime) / DURATION, 1);
        progressFill.style.width = (pct * 100) + '%';
        if (pct < 1) reqAnimId = requestAnimationFrame(drawProgress); else completeTodayTask();
    }

    function startPress(e) { 
        if (activeViewIndex !== currentDayOfWeek) return; 
        if (db.weekRecord[currentDayOfWeek]) return; 
        e.preventDefault(); 
        hintText.innerText = "能 量 注 入 中 ..."; 
        hintText.style.color = "#fff"; 
        if (reqAnimId) { cancelAnimationFrame(reqAnimId); }
        startTime = null; 
        reqAnimId = requestAnimationFrame(drawProgress); 
    }

    function cancelPress() { 
        if (activeViewIndex !== currentDayOfWeek) return;
        if (db.weekRecord[currentDayOfWeek]) return; 
        cancelAnimationFrame(reqAnimId); 
        progressFill.style.width = '0%'; 
        hintText.innerText = "長按契印 ． 圓滿今日"; 
        hintText.style.color = "var(--cyan)"; 
    }
    
    function completeTodayTask() {
        if (db.weekRecord[currentDayOfWeek]) return;
        db.weekRecord[currentDayOfWeek] = true; 
        db.totalDays365++;
        db.totalPracticedDays++; 

        const currentData = purelandData[currentDayOfWeek];

        if (db.totalDays365 >= 365) { 
            db.totalDays365 = 0; 
            db.totalYears108++; 
            showVowAlert("歲星圓滿，365日行願已成，<br>劫波蓮花歲數 + 1。"); 
        } else {
            showVowAlert(`<div style='font-size:1.1rem; color:var(--gold); font-weight:bold; margin-bottom:10px;'>${currentData.name} ‧ 顯化現前</div><div style='letter-spacing:2px; line-height:1.8; color:#eee;'>已端嚴書寫聖字 <span style='color:var(--gold);'>${currentData.seed}</span><br>${currentData.vow}<br><br>今日觀想實修功德圓滿！</div>`);
        }
        
        saveDB(); updatePageUI(); updateDataModal();

        const triggers = [7, 70, 700, 7000, 9999999];
        if (triggers.includes(db.totalPracticedDays)) {
            setTimeout(() => { isAutoTriggered = true; openCert(db.totalPracticedDays); }, 1200);
        }
    }

    sealBtn.addEventListener('mousedown', startPress); 
    sealBtn.addEventListener('touchstart', startPress, {passive: false});
    window.addEventListener('mouseup', cancelPress); 
    window.addEventListener('touchend', cancelPress); 
    window.addEventListener('mouseleave', cancelPress);

    function openDataModal() { updateDataModal(); document.getElementById('dataModal').classList.add('active'); }
    function closeDataModal() { document.getElementById('dataModal').classList.remove('active'); }

    const canvas = document.getElementById('starCanvas'); const ctx = canvas.getContext('2d');
    let width, height, stars = [], warpSpeed = 1, starScale = 0.6; 
    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();
    const STAR_COLORS = ['#f3e5ab', '#ffffff', '#00f2fe', '#ff7eb3', '#c471ed', '#43e97b', '#d4af37'];
    for (let i = 0; i < 350; i++) { stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)], s: Math.random() * 2 + 1 }); }
    
    function renderStars() {
        ctx.fillStyle = 'rgba(2, 2, 4, 0.4)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= warpSpeed; if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; } 
            let sc = 400 / (400 + s.z); ctx.beginPath(); 
            ctx.arc((width / 2) + s.x * sc, (height / 2) + s.y * sc, s.s * sc * starScale, 0, Math.PI * 2);
            ctx.fillStyle = s.color; ctx.globalAlpha = Math.min(1, sc * 2.5); ctx.fill(); ctx.globalAlpha = 1;
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(renderStars);
    }

    window.addEventListener('load', () => { 
        renderStars(); 
        initHandwritingCanvas(); 
        updatePageUI(); 
        updateDataModal(); 
    });
</script>
</body>
</html>
