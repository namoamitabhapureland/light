<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>種子字法界描寫鍊心系統</title>
    <style>
        /* 嚴格美學：極簡、清淨、無雜質 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #121212;
            color: #f3e5ab;
            font-family: 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            overflow: hidden;
            padding: 40px 20px;
        }

        /* 頂部標題與選擇區（預留未來切換諸佛種子字） */
        header {
            text-align: center;
            z-index: 10;
        }

        header h1 {
            font-size: 1.2rem;
            letter-spacing: 4px;
            font-weight: 300;
            color: #d4af37;
            margin-bottom: 8px;
        }

        header p {
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: rgba(243, 229, 171, 0.6);
        }

        /* 核心修持書寫艙 */
        .sacred-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 雙層法界煙霧與燃香特效（整合妙依之設計構想） */
        #smoke-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 向量底圖引導：種子字（𑖮𑖿𑖨𑖱𑖾 - Hrīḥ） */
        /* 使用 CSS 動態賦予呼吸律動感 */
        .seed-guide-svg {
            position: absolute;
            width: 70%;
            height: 70%;
            z-index: 2;
            pointer-events: none;
            fill: none;
            stroke: #d4af37;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.15;
            animation: seed-breath 4s infinite ease-in-out;
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.3));
        }

        @keyframes seed-breath {
            0%, 100% { transform: scale(1); opacity: 0.12; filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.2)); }
            50% { transform: scale(1.03); opacity: 0.22; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5)); }
        }

        /* 高精細度手寫畫布 */
        #traceCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            cursor: crosshair;
            touch-action: none; /* 防止行動裝置滑動干擾書寫 */
        }

        /* 底部功能控制區 */
        footer {
            display: flex;
            gap: 40px;
            z-index: 10;
        }

        .action-btn {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: rgba(243, 229, 171, 0.8);
            padding: 10px 24px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .action-btn:hover {
            border-color: #d4af37;
            color: #f3e5ab;
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }

        .action-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <header>
        <h1>阿彌陀佛 ‧ 觀世音菩薩</h1>
        <p>心注筆端 ‧ 一切法本不生</p>
    </header>

    <div class="sacred-container">
        <!-- 煙霧特效載體 -->
        <div id="smoke-container"></div>
        
        <!-- 精準向量悉曇體 Hrīḥ 種子字底圖 (以標準幾何幾何化線條模擬) -->
        <svg class="seed-guide-svg" viewBox="0 0 100 100">
            <!-- 悉曇文 Hrīḥ 的典雅線條結構架構（由簡入深之描摹路徑） -->
            <path d="M 30,25 C 45,20 55,20 70,25 M 50,22 L 50,65 C 50,75 40,80 35,70 C 32,65 38,58 48,60 C 58,62 65,70 60,80 M 35,42 C 45,40 55,40 65,42 M 72,40 C 78,35 78,45 72,50 C 68,52 72,62 76,58 C 80,55 82,65 74,68" />
        </svg>

        <!-- 手寫辨識畫布 -->
        <canvas id="traceCanvas"></canvas>
    </div>

    <footer>
        <button class="action-btn" id="clearBtn">重寫清淨</button>
        <button class="action-btn" id="dedicateBtn" style="border-color: #d4af37; color: #d4af37;">大迴向</button>
    </footer>

    <script>
        const canvas = document.getElementById('traceCanvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');
        const dedicateBtn = document.getElementById('dedicateBtn');

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // 初始化與適應高解析度螢幕（避免毛邊）
        function initCanvas() {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            
            // 設定畫布實體像素大小
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            
            // 透過 CSS 控制顯示大小
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            
            // 縮放繪圖上下文，確保後續繪圖邏輯不需手動乘上 dpr
            ctx.scale(dpr, dpr);
            
            // 設定流暢舒適的毛筆金色筆觸
            ctx.strokeStyle = '#f3e5ab'; 
            ctx.lineWidth = 3.5; 
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // 賦予筆跡微弱的金色法光
            ctx.shadowBlur = 4;
            ctx.shadowColor = '#d4af37';
        }

        // 核心捕捉邏輯（相容手指觸控與專業觸控筆）
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            // 判定是觸控事件或滑鼠事件
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const coords = getCoords(e);
            lastX = coords.x;
            lastY = coords.y;
            
            // 點擊時亦繪製一個點，避免短暫接觸無筆跡
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(lastX, lastY);
            ctx.stroke();
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault(); // 阻止行動裝置滾動行為
            
            const coords = getCoords(e);
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
            
            lastX = coords.x;
            lastY = coords.y;
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // 事件監聽：完整覆蓋滑鼠與觸控面板
        canvas.addEventListener('pointerdown', startDrawing);
        canvas.addEventListener('pointermove', draw);
        canvas.addEventListener('pointerup', stopDrawing);
        canvas.addEventListener('pointerleave', stopDrawing);

        // 介面功能控制
        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        dedicateBtn.addEventListener('click', () => {
            alert('願以此功德，普及於一切。我等與眾生，皆共成佛道。');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // 視窗大小改變時重置畫布大小（生產環境中會加入保留筆跡邏輯）
        window.addEventListener('resize', initCanvas);
        
        // 確保 DOM 載入後正確執行
        window.addEventListener('DOMContentLoaded', initCanvas);
        // 針對部分瀏覽器渲染時差補強
        setTimeout(initCanvas, 100);
    </script>
</body>
</html>
