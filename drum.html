<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>法華一佛乘 · 大法鼓經虛空系統</title>
  <style>
    /* 全局極簡與純淨美學設定 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-user-select: none;
      user-select: none;
    }
    
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #020205;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 星空法界背景 */
    .space-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, #0a0b22 0%, #010103 100%);
      z-index: 1;
    }

    .space-bg::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 30px),
        radial-gradient(rgba(229, 193, 88, 0.4), rgba(229, 193, 88, 0.05) 2px, transparent 40px);
      background-size: 300px 300px, 200px 200px;
      background-position: 0 0, 60px 120px;
      opacity: 0.5;
    }

    /* 主容器 */
    .container {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 40px 20px;
    }

    /* 莊嚴標題區 */
    .title-area {
      text-align: center;
      pointer-events: none;
    }

    .title-area h1 {
      color: #e5c158;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 10px;
      margin-bottom: 8px;
      text-shadow: 0 0 12px rgba(229, 193, 88, 0.3);
    }

    .title-area p {
      color: #7a8499;
      font-size: 12px;
      letter-spacing: 4px;
    }

    /* 舞台容器 */
    .drum-stage {
      width: 100%;
      max-width: 750px;
      height: 60vh;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* 巨型一字圓柱法槌：初始隱形且置於左側畫面外 */
    .stick-master {
      transform: translate(-350px, 0px);
      opacity: 0;
      pointer-events: none;
    }

    /* 左右橫撞的強烈衝擊動態 (支援連續快速點擊) */
    .stick-master.animate-strike {
      animation: horizontal-strike 0.32s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
    }

    @keyframes horizontal-strike {
      0% {
        transform: translate(-350px, 0px);
        opacity: 0;
      }
      12% {
        opacity: 1; /* 迅速顯現 */
      }
      22% {
        transform: translate(15px, 0px); /* 猛烈向前橫撞直擊鼓皮 */
        opacity: 1;
      }
      35% {
        transform: translate(-15px, 0px); /* 撞擊後的物理反彈 */
        opacity: 1;
      }
      100% {
        transform: translate(-350px, 0px); /* 迅速退回左側並隱形 */
        opacity: 0;
      }
    }

    /* 鼓體受擊 3D 微共震 */
    .drum-master-group {
      transform-origin: 450px 350px;
      transition: transform 0.04s ease-out;
    }
    .drum-master-group.shake {
      transform: scale(1.012) translate(-1px, 1px);
    }

    /* 單圈高效能法音波紋 */
    .dharma-wave {
      fill: none;
      stroke-width: 3;
      pointer-events: none;
    }

    /* 控制面板 */
    .control-panel {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .btn {
      background: rgba(10, 11, 30, 0.5);
      border: 1px solid rgba(229, 193, 88, 0.2);
      color: #8690a6;
      padding: 10px 24px;
      font-size: 12px;
      letter-spacing: 2px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn:hover, .btn.active {
      border-color: #e5c158;
      color: #e5c158;
      box-shadow: 0 0 12px rgba(229, 193, 88, 0.15);
    }
  </style>
</head>
<body>

  <div class="space-bg"></div>

  <div class="container">
    <div class="title-area">
      <h1>大法鼓經</h1>
      <p>法消毒妙藥塗於大鼓而擊之 · 一佛乘正義</p>
    </div>

    <div class="drum-stage" id="stage-interact">
      <svg viewBox="0 0 800 800" id="drum-svg">
        <defs>
          <linearGradient id="crimson-barrel" x1="0%" y1="20%" x2="100%" y2="80%">
            <stop offset="0%" stop-color="#8a161b" />
            <stop offset="35%" stop-color="#590c10" />
            <stop offset="80%" stop-color="#2e0305" />
            <stop offset="100%" stop-color="#140002" />
          </linearGradient>

          <linearGradient id="drum-head-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="65%" stop-color="#f5ede2" />
            <stop offset="100%" stop-color="#ded2bf" />
          </linearGradient>

          <linearGradient id="dark-timber" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#1f1c19" />
            <stop offset="50%" stop-color="#302a26" />
            <stop offset="100%" stop-color="#171412" />
          </linearGradient>

          <linearGradient id="gold-metal" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fede6a" />
            <stop offset="50%" stop-color="#d4af37" />
            <stop offset="100%" stop-color="#8a6f1c" />
          </linearGradient>

          <linearGradient id="cylinder-body-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#593e03" />
            <stop offset="25%" stop-color="#ffe891" />
            <stop offset="50%" stop-color="#e5b83b" />
            <stop offset="80%" stop-color="#b38619" />
            <stop offset="100%" stop-color="#402d02" />
          </linearGradient>

          <g id="decorated-rivet-sym">
            <circle cx="0" cy="0" r="5.5" fill="#543e07" />
            <circle cx="0" cy="0" r="4" fill="url(#gold-metal)" />
            <circle cx="-1" cy="-1" r="1.2" fill="#ffffff" opacity="0.5" />
          </g>
        </defs>

        <g id="stand-back-layer">
          <path d="M 420 460 L 220 760 L 265 760 L 450 480 Z" fill="#12100e" />
          <path d="M 540 460 L 590 730 L 630 730 L 565 470 Z" fill="#161412" />
          <path d="M 240 670 L 580 670 L 580 695 L 240 695 Z" fill="#100e0d" />
        </g>

        <g class="drum-master-group" id="drum-hardware-group">
          
          <path d="M 330 130 Q 520 110 650 200 L 650 500 Q 520 590 330 570 Z" fill="url(#crimson-barrel)" />
          
          <g transform="translate(545, 365)">
            <rect x="-10" y="-20" width="20" height="40" rx="3" fill="url(#gold-metal)" stroke="#42350c" stroke-width="1" />
            <circle cx="0" cy="0" r="12" fill="none" stroke="url(#gold-metal)" stroke-width="4" />
          </g>

          <ellipse cx="330" cy="350" rx="120" ry="220" fill="url(#drum-head-grad)" stroke="#baa185" stroke-width="2" />

          <path d="M 330 130 A 120 220 0 0 1 330 570" fill="none" stroke="url(#gold-metal)" stroke-width="6" />
          <path d="M 330 136 A 114 214 0 0 1 330 564" fill="none" stroke="url(#gold-metal)" stroke-width="3" opacity="0.85" />

          <g transform="translate(330, 350) scale(0.65, 1.2)">
            <circle cx="0" cy="0" r="45" fill="none" stroke="rgba(168, 137, 76, 0.3)" stroke-width="2" />
            <circle cx="0" cy="0" r="12" fill="none" stroke="rgba(168, 137, 76, 0.35)" stroke-width="2" />
            <path d="M 0 -45 L 0 45 M -45 0 L 45 0 M -31.8 -31.8 L 31.8 31.8 M -31.8 31.8 L 31.8 -31.8" stroke="rgba(168, 137, 76, 0.3)" stroke-width="1.5" />
          </g>

          <g id="right-rim-rivets-container"></g>

        </g>

        <g id="wave-delivery-layer"></g>

        <g id="stand-front-layer">
          <path d="M 370 565 L 300 760 L 345 760 L 410 560 Z" fill="url(#dark-timber)" />
          <path d="M 500 535 L 440 760 L 485 760 L 535 525 Z" fill="url(#dark-timber)" />
          <path d="M 290 690 L 490 690 L 490 725 L 290 725 Z" fill="url(#dark-timber)" />
          
          <path d="M 300 690 L 330 690 L 330 725 L 290 725 Z" fill="url(#gold-metal)" opacity="0.95" />
          <path d="M 460 690 L 490 690 L 480 725 L 450 725 Z" fill="url(#gold-metal)" opacity="0.95" />
          <circle cx="390" cy="707" r="9" fill="url(#gold-metal)" />
        </g>

        <g class="stick-master" id="drum-stick">
          <path d="M -220 305 L 200 305 A 15 45 0 0 1 200 395 L -220 395 Z" fill="url(#cylinder-body-grad)" />
          <ellipse cx="200" cy="350" rx="15" ry="45" fill="url(#gold-metal)" stroke="#9c7514" stroke-width="1" />
          <line x1="-220" y1="325" x2="200" y2="325" stroke="rgba(255,255,255,0.18)" stroke-width="1" />
          <line x1="-220" y1="375" x2="200" y2="375" stroke="rgba(0,0,0,0.35)" stroke-width="1.5" />
        </g>

      </svg>
    </div>

    <div class="control-panel">
      <button class="btn" id="ambient-toggle">真如法界法音：靜音</button>
    </div>
  </div>

  <script>
    // 空間透視 —— 卯釘均勻地沿著白色鼓皮的【右半圈】邊緣生成
    const rivetsContainer = document.getElementById('right-rim-rivets-container');
    const rivetCount = 30;
    const cx = 330, cy = 350; 
    const rx = 120, ry = 220; 

    for (let i = 0; i < rivetCount; i++) {
      const angle = -Math.PI / 2 + (i / (rivetCount - 1)) * Math.PI;
      const cosVal = Math.cos(angle);
      const sinVal = Math.sin(angle);

      const x = cx + rx * cosVal;
      const y = cy + ry * sinVal;

      const perspectiveFactor = cosVal; 
      const scale = 0.75 + (perspectiveFactor * 0.25); 

      const useTag = document.createElementNS('http://www.w3.org/2000/svg', 'use');
      useTag.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#decorated-rivet-sym');
      useTag.setAttribute('x', x);
      useTag.setAttribute('y', y);
      useTag.setAttribute('transform', `translate(${x}, ${y}) scale(${scale}) translate(${-x}, ${-y})`);
      useTag.setAttribute('opacity', 0.8 + (perspectiveFactor * 0.2));

      rivetsContainer.appendChild(useTag);
    }

    // Web Audio API：清淨低頻大佛鼓音訊合成器
    let audioCtx = null;
    let ambientOscs = [];
    let isAmbientPlaying = false;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playDeepDrumSound() {
      initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const now = audioCtx.currentTime;

      // 皮革撞擊瞬間的物理雜訊層 (Thwack)
      const strikeNoise = audioCtx.createBufferSource();
      const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.015, audioCtx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < noiseBuffer.length; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      strikeNoise.buffer = noiseBuffer;

      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.setValueAtTime(130, now);
      
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.35, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.012);

      // 核心深沉震撼低音
      const mainOsc = audioCtx.createOscillator();
      const mainGain = audioCtx.createGain();
      
      mainOsc.type = 'sine';
      mainOsc.frequency.setValueAtTime(115, now);
      mainOsc.frequency.exponentialRampToValueAtTime(38, now + 0.08);
      mainOsc.frequency.linearRampToValueAtTime(26, now + 0.6);

      mainGain.gain.setValueAtTime(0, now);
      mainGain.gain.linearRampToValueAtTime(1.0, now + 0.004);
      mainGain.gain.exponentialRampToValueAtTime(0.01, now + 1.1);

      const lowpass = audioCtx.createBiquadFilter();
      lowpass.type = 'lowpass';
      lowpass.frequency.setValueAtTime(140, now);

      strikeNoise.connect(noiseGain);
      noiseGain.connect(noiseFilter);
      noiseFilter.connect(lowpass);

      mainOsc.connect(mainGain);
      mainGain.connect(lowpass);
      lowpass.connect(audioCtx.destination);

      strikeNoise.start(now);
      mainOsc.start(now);
      mainOsc.stop(now + 1.2);
    }

    function toggleAmbient() {
      initAudio();
      const now = audioCtx.currentTime;

      if (!isAmbientPlaying) {
        ambientOscs = [];
        const freqRatio = [54.0, 108.0, 162.0];
        
        freqRatio.forEach((freq) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now);
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.035, now + 2.5);
          
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          
          osc.start(now);
          ambientOscs.push({ osc, gain });
        });
        
        document.getElementById('ambient-toggle').textContent = '真如法界法音：流轉';
        document.getElementById('ambient-toggle').classList.add('active');
        isAmbientPlaying = true;
      } else {
        ambientOscs.forEach((node) => {
          node.gain.linearRampToValueAtTime(0, now + 1.2);
          node.osc.stop(now + 1.3);
        });
        ambientOscs = [];
        document.getElementById('ambient-toggle').textContent = '真如法界法音：靜音';
        document.getElementById('ambient-toggle').classList.remove('active');
        isAmbientPlaying = false;
      }
    }

    // 互動與法槌、波紋控制
    const stage = document.getElementById('stage-interact');
    const stick = document.getElementById('drum-stick');
    const drumHardware = document.getElementById('drum-hardware-group');
    const waveLayer = document.getElementById('wave-delivery-layer');
    const ambientBtn = document.getElementById('ambient-toggle');

    stage.addEventListener('mousedown', (e) => { e.preventDefault(); performStrike(); });
    stage.addEventListener('touchstart', (e) => { e.preventDefault(); performStrike(); });
    ambientBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleAmbient(); });

    function performStrike() {
      playDeepDrumSound();

      // 鼓身微震共鳴
      drumHardware.classList.add('shake');
      setTimeout(() => drumHardware.classList.remove('shake'), 50);

      // 巨型撞木橫撞動畫 (消除舊類別並重刷以支援快速連續點擊)
      stick.classList.remove('animate-strike');
      void stick.offsetWidth; // 強制瀏覽器重繪 (Reflow)
      stick.classList.add('animate-strike');

      // 清空上一圈，法音波紋清淨流轉
      waveLayer.innerHTML = "";
      createOptimizedWave();
    }

    function createOptimizedWave() {
      const ellipse = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
      ellipse.setAttribute('cx', '330');
      ellipse.setAttribute('cy', '350');
      ellipse.setAttribute('rx', '120');
      ellipse.setAttribute('ry', '220');
      ellipse.setAttribute('class', 'dharma-wave');
      waveLayer.appendChild(ellipse);

      let rxValue = 120;
      let ryValue = 220;
      let opacity = 1.0;

      function render() {
        rxValue += 8;
        ryValue += 14.66; 
        opacity -= 0.02;

        ellipse.setAttribute('rx', rxValue);
        ellipse.setAttribute('ry', ryValue);
        ellipse.setAttribute('style', `stroke: rgba(229, 193, 88, ${opacity}); opacity: ${opacity};`);

        if (opacity > 0 && ellipse.parentNode) {
          requestAnimationFrame(render);
        } else {
          ellipse.remove();
        }
      }
      requestAnimationFrame(render);
    }
  </script>
</body>
</html>
