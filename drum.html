<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>法華一佛乘 · 大法鼓經虛空系統</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-user-select: none;
      user-select: none;
    }
    
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #020205;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 星空法界背景 */
    .space-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, #0c0d28 0%, #020206 100%);
      z-index: 1;
    }

    /* 純CSS星光微動 */
    .space-bg::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(white, rgba(255,255,255,.3) 1px, transparent 30px),
        radial-gradient(rgba(229, 193, 88, 0.6), rgba(229, 193, 88, 0.1) 2px, transparent 40px);
      background-size: 350px 350px, 150px 150px;
      background-position: 0 0, 40px 60px;
      opacity: 0.6;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 30px 20px;
    }

    .title-area {
      text-align: center;
      pointer-events: none;
    }

    .title-area h1 {
      color: #e5c158;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 10px;
      margin-bottom: 6px;
      text-shadow: 0 0 12px rgba(229, 193, 88, 0.4);
    }

    .title-area p {
      color: #7a8499;
      font-size: 12px;
      letter-spacing: 4px;
    }

    .drum-stage {
      width: 100%;
      max-width: 700px;
      height: 65vh;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* 雙鼓棒獨立動畫軌跡 */
    .stick-left {
      transform-origin: 120px 680px;
      transition: transform 0.05s cubic-bezier(0.11, 0, 0, 1);
    }
    .stick-left.hit {
      transform: rotate(22deg) translate(50px, -60px);
    }

    .stick-right {
      transform-origin: 160px 720px;
      transition: transform 0.05s cubic-bezier(0.11, 0, 0, 1);
    }
    .stick-right.hit {
      transform: rotate(26deg) translate(70px, -80px);
    }

    /* 鼓體受擊整體3D微共振 */
    .drum-master-group {
      transform-origin: 480px 400px;
      transition: transform 0.04s ease-out;
    }
    .drum-master-group.shake {
      transform: scale(1.015) translate(-2px, 1px);
    }

    /* 核心法音波紋 */
    .dharma-wave {
      fill: none;
      stroke-width: 2;
      pointer-events: none;
    }

    .control-panel {
      width: 100%;
      display: flex;
      justify-content: center;
      padding-bottom: 10px;
    }

    .btn {
      background: rgba(10, 11, 30, 0.6);
      border: 1px solid rgba(229, 193, 88, 0.25);
      color: #8690a6;
      padding: 10px 24px;
      font-size: 12px;
      letter-spacing: 2px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn:hover, .btn.active {
      border-color: #e5c158;
      color: #e5c158;
      box-shadow: 0 0 12px rgba(229, 193, 88, 0.2);
    }
  </style>
</head>
<body>

  <div class="space-bg"></div>

  <div class="container">
    <div class="title-area">
      <h1>大法鼓經</h1>
      <p>法消毒妙藥塗於大鼓而擊之 · 一佛乘正義</p>
    </div>

    <div class="drum-stage" id="stage-interact">
      <svg viewBox="0 0 800 800" id="drum-svg">
        <defs>
          <linearGradient id="crimson-barrel" x1="0%" y1="30%" x2="100%" y2="70%">
            <stop offset="0%" stop-color="#801419" />
            <stop offset="40%" stop-color="#540b0e" />
            <stop offset="85%" stop-color="#2d0406" />
            <stop offset="100%" stop-color="#150002" />
          </linearGradient>

          <linearGradient id="drum-head-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="60%" stop-color="#f4ece1" />
            <stop offset="100%" stop-color="#dcd0be" />
          </linearGradient>

          <linearGradient id="dark-timber" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#1e1b18" />
            <stop offset="50%" stop-color="#2d2825" />
            <stop offset="100%" stop-color="#141210" />
          </linearGradient>

          <linearGradient id="gold-metal" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fedb6a" />
            <stop offset="50%" stop-color="#d4af37" />
            <stop offset="100%" stop-color="#8a6f1c" />
          </linearGradient>

          <g id="decorated-rivet-sym">
            <circle cx="0" cy="0" r="6" fill="#5c4308" />
            <circle cx="0" cy="0" r="4.5" fill="url(#gold-metal)" />
            <circle cx="-1" cy="-1" r="1.5" fill="#ffffff" opacity="0.4" />
          </g>

          <filter id="glow">
            <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <g id="stand-back-layer">
          <path d="M 600 380 L 250 740 L 290 740 L 640 380 Z" fill="#191614" />
          <path d="M 460 480 L 520 720 L 480 720 L 430 480 Z" fill="#110f0e" />
        </g>

        <g class="drum-master-group" id="drum-hardware-group">
          
          <path d="M 330 130 Q 520 100 640 180 L 640 540 Q 520 620 330 570 Z" fill="url(#crimson-barrel)" />
          
          <g transform="translate(540, 360)">
            <rect x="-15" y="-25" width="30" height="50" rx="4" fill="url(#gold-metal)" stroke="#4a3b0e" stroke-width="1" />
            <circle cx="0" cy="0" r="16" fill="none" stroke="url(#gold-metal)" stroke-width="5" />
          </g>

          <ellipse cx="330" cy="350" rx="120" ry="220" fill="url(#drum-head-grad)" stroke="#baa185" stroke-width="2" />

          <g transform="translate(330, 350) scale(0.65, 1.2)">
            <circle cx="0" cy="0" r="45" fill="none" stroke="rgba(168, 137, 76, 0.35)" stroke-width="2" />
            <circle cx="0" cy="0" r="12" fill="none" stroke="rgba(168, 137, 76, 0.4)" stroke-width="2" />
            <path d="M 0 -45 L 0 45 M -45 0 L 45 0 M -31.8 -31.8 L 31.8 31.8 M -31.8 31.8 L 31.8 -31.8" stroke="rgba(168, 137, 76, 0.35)" stroke-width="2" />
          </g>

          <g id="double-rivets-container"></g>

        </g>

        <g id="wave-delivery-layer"></g>

        <g id="stand-front-layer">
          <path d="M 280 420 L 200 750 L 245 750 L 320 420 Z" fill="url(#dark-timber)" />
          <path d="M 400 480 L 450 750 L 495 750 L 430 480 Z" fill="url(#dark-timber)" />
          <path d="M 180 660 L 520 660 L 520 695 L 180 695 Z" fill="url(#dark-timber)" />
          
          <path d="M 215 660 L 245 660 L 245 695 L 205 695 Z" fill="url(#gold-metal)" opacity="0.95" />
          <path d="M 465 660 L 495 660 L 485 695 L 455 695 Z" fill="url(#gold-metal)" opacity="0.95" />
          <circle cx="345" cy="677" r="10" fill="url(#gold-metal)" />
        </g>

        <g class="stick-left" id="stick-l">
          <path d="M 115 675 L 265 380 C 267 376, 273 379, 271 383 L 128 682 Z" fill="url(#dark-timber)" />
          <ellipse cx="268" cy="381" rx="14" ry="16" fill="#f4ece1" stroke="#c2b6a4" stroke-width="1" />
        </g>

        <g class="stick-right" id="stick-r">
          <path d="M 155 715 L 315 415 C 317 411, 323 414, 321 418 L 168 722 Z" fill="url(#dark-timber)" />
          <ellipse cx="318" cy="416" rx="15" ry="17" fill="#f4ece1" stroke="#c2b6a4" stroke-width="1" />
        </g>

      </svg>
    </div>

    <div class="control-panel">
      <button class="btn" id="ambient-toggle">真如法界法音：靜音</button>
    </div>
  </div>

  <script>
    //======================================================================
    // 1. 空間幾何：動態雙排裝飾卯釘生成
    //======================================================================
    const rivetsContainer = document.getElementById('double-rivets-container');
    const rivetCount = 38;
    const cx = 330, cy = 350;
    
    // 定義內外兩排卯釘的橢圓半徑（貼合2.5D邊緣）
    const layouts = [
      { rx: 124, ry: 224, opacityMult: 1.0 }, // 內圈
      { rx: 133, ry: 233, opacityMult: 0.7 }  // 外圈裝飾
    ];

    layouts.forEach((layer) => {
      for (let i = 0; i < rivetCount; i++) {
        // 全圓分佈 0 ~ 2π
        const angle = (i / rivetCount) * Math.PI * 2;
        const x = cx + layer.rx * Math.cos(angle);
        const y = cy + layer.ry * Math.sin(angle);

        // 透過透視深度計算卯釘的立體大小與明暗
        // 右側較遠處的卯釘微縮並變暗，左前方的變亮
        const perspectiveFactor = Math.cos(angle); // -1 到 1
        const scale = 0.75 + (perspectiveFactor * -0.25); 

        const useTag = document.createElementNS('http://www.w3.org/2000/svg', 'use');
        useTag.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#decorated-rivet-sym');
        useTag.setAttribute('x', x);
        useTag.setAttribute('y', y);
        useTag.setAttribute('transform', `translate(${x}, ${y}) scale(${scale}) translate(${-x}, ${-y})`);
        useTag.setAttribute('opacity', (0.4 + (perspectiveFactor * -0.4)) * layer.opacityMult);

        rivetsContainer.appendChild(useTag);
      }
    });

    //======================================================================
    // 2. Web Audio API：高品質大佛鼓深沉音訊合成器
    //======================================================================
    let audioCtx = null;
    let ambientOscs = [];
    let isAmbientPlaying = false;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playDeepDrumSound() {
      initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const now = audioCtx.currentTime;

      // 1. 衝擊波包絡（類皮革衝擊點 Thwack）
      const strikeNoise = audioCtx.createBufferSource();
      const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.02, audioCtx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < noiseBuffer.length; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      strikeNoise.buffer = noiseBuffer;

      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.setValueAtTime(120, now);
      
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.4, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.015);

      // 2. 核心深沉大鼓重低音（如來藏共振）
      const mainOsc = audioCtx.createOscillator();
      const mainGain = audioCtx.createGain();
      
      mainOsc.type = 'sine';
      // 模擬巨型大鼓物理頻率急速下墜
      mainOsc.frequency.setValueAtTime(110, now);
      mainOsc.frequency.exponentialRampToValueAtTime(36, now + 0.09);
      mainOsc.frequency.linearRampToValueAtTime(25, now + 0.7);

      mainGain.gain.setValueAtTime(0, now);
      mainGain.gain.linearRampToValueAtTime(1.0, now + 0.004);
      mainGain.gain.exponentialRampToValueAtTime(0.01, now + 1.2); // 超長餘音

      // 低通濾波器，保留莊嚴沉悶的遠處迴音
      const lowpass = audioCtx.createBiquadFilter();
      lowpass.type = 'lowpass';
      lowpass.frequency.setValueAtTime(150, now);

      // 節點串接
      strikeNoise.connect(noiseGain);
      noiseGain.connect(noiseFilter);
      noiseFilter.connect(lowpass);

      mainOsc.connect(mainGain);
      mainGain.connect(lowpass);
      
      lowpass.connect(audioCtx.destination);

      // 啟動
      strikeNoise.start(now);
      mainOsc.start(now);
      mainOsc.stop(now + 1.3);
    }

    // 宇宙真如低頻環境音
    function toggleAmbient() {
      initAudio();
      const now = audioCtx.currentTime;

      if (!isAmbientPlaying) {
        ambientOscs = [];
        // 三乘合一的純淨基音
        const freqRatio = [54.0, 108.0, 162.0];
        
        freqRatio.forEach((freq) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now);
          
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.04, now + 3.0);
          
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          
          osc.start(now);
          ambientOscs.push({ osc, gain });
        });
        
        document.getElementById('ambient-toggle').textContent = '真如法界法音：流轉';
        document.getElementById('ambient-toggle').classList.add('active');
        isAmbientPlaying = true;
      } else {
        ambientOscs.forEach((node) => {
          node.gain.linearRampToValueAtTime(0, now + 1.5);
          node.osc.stop(now + 1.6);
        });
        ambientOscs = [];
        document.getElementById('ambient-toggle').textContent = '真如法界法音：靜音';
        document.getElementById('ambient-toggle').classList.remove('active');
        isAmbientPlaying = false;
      }
    }

    //======================================================================
    // 3. 互動與動效控制中心：交替擊打與透視波紋
    //======================================================================
    const stage = document.getElementById('stage-interact');
    const stickL = document.getElementById('stick-l');
    const stickR = document.getElementById('stick-r');
    const drumHardware = document.getElementById('drum-hardware-group');
    const waveLayer = document.getElementById('wave-delivery-layer');
    const ambientBtn = document.getElementById('ambient-toggle');

    let alternateFlag = false; // 用於控制雙棒交替擊打

    stage.addEventListener('mousedown', (e) => { e.preventDefault(); performStrike(); });
    stage.addEventListener('touchstart', (e) => { e.preventDefault(); performStrike(); });
    ambientBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleAmbient(); });

    function performStrike() {
      // 1. 音效解鎖與播放
      playDeepDrumSound();

      // 2. 雙棒交替揮動邏輯
      if (!alternateFlag) {
        stickL.classList.add('hit');
        setTimeout(() => stickL.classList.remove('hit'), 60);
      } else {
        stickR.classList.add('hit');
        setTimeout(() => stickR.classList.remove('hit'), 60);
      }
      alternateFlag = !alternateFlag;

      // 3. 鼓身3D形變顫動
      drumHardware.classList.add('shake');
      setTimeout(() => drumHardware.classList.remove('shake'), 50);

      // 4. 產生與鼓面透視完全平行的法音擴散波紋（破除無明）
      createPerspectiveWave();
    }

    function createPerspectiveWave() {
      const ellipse = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
      ellipse.setAttribute('cx', '330');
      ellipse.setAttribute('cy', '350');
      ellipse.setAttribute('rx', '120');
      ellipse.setAttribute('ry', '220');
      ellipse.setAttribute('class', 'dharma-wave');
      ellipse.setAttribute('filter', 'url(#glow)');
      waveLayer.appendChild(ellipse);

      let rx = 120;
      let ry = 220;
      let opacity = 1.0;

      function render() {
        rx += 8;
        ry += 14.6; // 嚴格保持 120:220 的幾何透視比例擴散
        opacity -= 0.016;

        ellipse.setAttribute('rx', rx);
        ellipse.setAttribute('ry', ry);
        ellipse.setAttribute('style', `stroke: rgba(229, 193, 88, ${opacity}); opacity: ${opacity};`);

        if (opacity > 0) {
          requestAnimationFrame(render);
        } else {
          ellipse.remove();
        }
      }
      requestAnimationFrame(render);
    }
  </script>
</body>
</html>
