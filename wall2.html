<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>無量的光 · 守護之光</title>
<style>
:root {
  --bg-gradient: linear-gradient(135deg, #FFFFFF 0%, #FDFCFB 100%);
  --glass-border: rgba(255, 255, 255, 0.7); 
  --text-main: #58504A; 
  --text-light: #968E86;
  --accent-gold: #D4AF37; 
  --shadow-soft: 0 10px 40px rgba(160, 155, 150, 0.08);
}

- { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
margin: 0; padding: 0; width: 100%; height: 100dvh;
background: var(–bg-gradient); color: var(–text-main);
font-family: -apple-system, “PingFang TC”, sans-serif;
overflow: hidden; display: flex; flex-direction: column; align-items: center;
}

.top-nav { width: 100%; padding: max(15px, env(safe-area-inset-top)) 20px 10px; display: flex; justify-content: space-between; z-index: 5000; position: absolute; top: 0;}
.nav-btn { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 50%; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(–glass-border); color: var(–text-main); box-shadow: var(–shadow-soft); cursor: pointer; transition: 0.2s; }
.nav-btn:active { transform: scale(0.92); }

.bottom-text {
position: absolute; bottom: max(40px, env(safe-area-inset-bottom)); text-align: center; z-index: 5000;
background: rgba(255,255,255,0.4);
padding: 18px 35px; border-radius: 40px;
backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
border: 1px solid var(–glass-border); box-shadow: var(–shadow-soft);
animation: fadeUp 1.5s ease-out;
width: max-content; max-width: 90%; white-space: nowrap;
}
.bt-title { font-size: 0.85rem; letter-spacing: 5px; color: var(–text-light); margin-bottom: 6px; font-weight: 300;}
.bt-count { font-size: 1.3rem; font-weight: 300; letter-spacing: 2px; color: var(–text-main); display: flex; align-items: center; justify-content: center; gap: 10px;}
.bt-count span { font-weight: 400; color: var(–accent-gold); font-size: 2.2rem; text-shadow: 0 0 20px rgba(212,175,55,0.25);}

@keyframes fadeUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

#visual-sea { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

#bubble-sea { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
.crystal-light {
position: absolute; border-radius: 50%;
background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8) 0%, rgba(212,175,55,0.1) 60%, transparent 100%);
border: 0.5px solid rgba(212,175,55,0.05);
animation: riseUp var(–d) linear infinite, wiggleX var(–w) ease-in-out infinite alternate, softFade var(–d) linear infinite;
will-change: transform, opacity;
}

@keyframes riseUp { 0% { transform: translateY(110vh); } 100% { transform: translateY(-15vh); } }
@keyframes wiggleX { 0% { margin-left: -40px; } 100% { margin-left: 40px; } }
@keyframes softFade { 0%, 100% { opacity: 0; } 15%, 85% { opacity: 0.8; } }

#sprite-sea { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; }
.sprite-node {
position: absolute; will-change: transform, opacity;
animation: deepFloatY var(–dy) ease-in-out infinite alternate,
deepFloatX var(–dx) ease-in-out infinite alternate,
pulseBreathe var(–ds) ease-in-out infinite alternate;
}

@keyframes deepFloatY { 0% { transform: translateY(-80px); } 100% { transform: translateY(80px); } }
@keyframes deepFloatX { 0% { margin-left: -50px; } 100% { margin-left: 50px; } }
@keyframes pulseBreathe { 0% { transform: scale(0.65); opacity: 0.4; } 100% { transform: scale(1.3); opacity: 1; } }

/* ✨ 精靈王 */
.king-node {
position: absolute !important;
left: 50% !important; top: 42% !important;
margin: 0 !important;
transform: translate(-50%, -50%) !important;
animation: kPulse 10s ease-in-out infinite alternate !important;
will-change: transform;
filter: drop-shadow(0 0 24px rgba(212,175,55,0.18));
}
@keyframes kPulse {
0%  { transform: translate(-50%, -50%) scale(0.78); opacity: 0.92; }
100%{ transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
}

#loading { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 0.9rem; letter-spacing: 5px; color: var(–text-light); z-index: 9999; background: var(–bg-gradient); transition: opacity 0.8s; }
</style>

</head>
<body>

<div id="loading">感受清透光芒中...</div>

<div class="top-nav">
  <div class="nav-btn" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </div>
</div>

<div id="visual-sea">
    <div id="bubble-sea"></div>
    <div id="sprite-sea"></div>
</div>

<div class="bottom-text">
  <div class="bt-title">一燈即無量</div>
  <div class="bt-count">累計有 <span id="total-warmth">0</span> 份善意發光</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const spriteColors = ["#D1E4EE", "#E8F0E1", "#E1D5E7", "#FDF5D3"];

function generateSpriteSVG(color) {
    return `
    <svg viewBox="35 15 130 140" width="100%" height="100%" overflow="visible">
        <path d="M 60 140 C 40 140, 45 90, 70 70 C 90 50, 110 50, 130 70 C 155 90, 160 140, 140 140 C 120 140, 130 150, 100 150 C 70 150, 80 140, 60 140 Z" fill="${color}" opacity="0.95" />
        <path d="M 85 85 Q 90 88 95 85" fill="none" stroke="#8C7A6B" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 105 85 Q 110 88 115 85" fill="none" stroke="#8C7A6B" stroke-width="2.5" stroke-linecap="round"/>
        <ellipse cx="70" cy="95" rx="8" ry="4" fill="#D1A299" opacity="0.7"/>
        <ellipse cx="130" cy="95" rx="8" ry="4" fill="#D1A299" opacity="0.7"/>
    </svg>`;
}

/* ─────────────────────────────────────────────────────
   ✨ 精靈王 SVG — 四段色彩主題
   colorKey: "cream" | "gold" | "rose" | "rainbow"
   ───────────────────────────────────────────────────── */
function generateKingSVG(colorKey) {

    const themes = {
        cream: {
            b0:'#FFFEF8', b1:'#FDF5D3', b2:'#E8D5A0',
            stroke:'#D4AF37', eye:'#8C7A6B', cheek:'#D1A299',
            glow:'#FDF5D3',
            c0:'#FFF2A0', c1:'#D4AF37', c2:'#A07820',
            gem:'#FFFDE7', shimmer:'rgba(255,248,200,0.7)'
        },
        gold: {
            b0:'#FFFFF2', b1:'#FFE878', b2:'#C8A030',
            stroke:'#A07820', eye:'#6B5020', cheek:'#F5C842',
            glow:'#FFF8DC',
            c0:'#FFD700', c1:'#B8860B', c2:'#7A5800',
            gem:'#FFFFFF', shimmer:'rgba(255,240,100,0.75)'
        },
        rose: {
            b0:'#FFF0F8', b1:'#F8C8D5', b2:'#E5989B',
            stroke:'#C8707A', eye:'#8B5A60', cheek:'#F4A7B9',
            glow:'#FCE4EC',
            c0:'#FFB6C1', c1:'#E07080', c2:'#A04050',
            gem:'#FFFFFF', shimmer:'rgba(255,180,200,0.7)'
        },
        rainbow: {
            b0:'#FFFFFF', b1:'#EDE0FF', b2:'#C8D8FF',
            stroke:'#9B8EC4', eye:'#6B5A8B', cheek:'#F4A7B9',
            glow:'#F0E8FF',
            c0:'#FBBF24', c1:'#60A5FA', c2:'#A78BFA',
            gem:'#FFFFFF', shimmer:'rgba(200,180,255,0.65)'
        }
    };

    const t = themes[colorKey] || themes.cream;

    /* 彩虹版 body gradient 改為線性漸層 */
    const bodyGrad = colorKey === 'rainbow'
        ? `<linearGradient id="kg-body" x1="10%" y1="0%" x2="90%" y2="100%">
               <stop offset="0%"   stop-color="#E0F7FA"/>
               <stop offset="30%"  stop-color="#FFFDE7"/>
               <stop offset="65%"  stop-color="#FCE4EC"/>
               <stop offset="100%" stop-color="#E1D5E7"/>
           </linearGradient>`
        : `<radialGradient id="kg-body" cx="38%" cy="30%" r="68%">
               <stop offset="0%"   stop-color="${t.b0}"/>
               <stop offset="52%"  stop-color="${t.b1}"/>
               <stop offset="100%" stop-color="${t.b2}"/>
           </radialGradient>`;

    const crownGrad = colorKey === 'rainbow'
        ? `<linearGradient id="kg-crown" x1="0%" y1="0%" x2="100%" y2="100%">
               <stop offset="0%"   stop-color="#FBBF24"/>
               <stop offset="40%"  stop-color="#60A5FA"/>
               <stop offset="100%" stop-color="#A78BFA"/>
           </linearGradient>`
        : `<linearGradient id="kg-crown" x1="0%" y1="0%" x2="70%" y2="100%">
               <stop offset="0%"   stop-color="${t.c0}"/>
               <stop offset="55%"  stop-color="${t.c1}"/>
               <stop offset="100%" stop-color="${t.c2}"/>
           </linearGradient>`;

    return `<svg viewBox="0 0 200 255" width="100%" height="100%" overflow="visible" xmlns="http://www.w3.org/2000/svg">
      <defs>
        ${bodyGrad}
        ${crownGrad}
        <radialGradient id="kg-glow" cx="50%" cy="58%" r="52%">
          <stop offset="0%"   stop-color="${t.glow}" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="${t.glow}" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="kg-cheek" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="${t.cheek}" stop-opacity="0.62"/>
          <stop offset="100%" stop-color="${t.cheek}" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="kg-hi" cx="30%" cy="25%" r="60%">
          <stop offset="0%"   stop-color="white" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- 背景光暈 -->
      <ellipse cx="100" cy="162" rx="88" ry="92" fill="url(#kg-glow)"/>

      <!-- ══════════ 皇冠 ══════════ -->
      <!--  三個尖峰 + 底座 -->
      <g>
        <!-- 左尖 -->
        <polygon points="62,82  74,50  86,76"
                 fill="url(#kg-crown)" stroke="${t.c2}" stroke-width="1.2" stroke-linejoin="round"/>
        <!-- 中尖（最高） -->
        <polygon points="86,82  100,36  114,82"
                 fill="url(#kg-crown)" stroke="${t.c2}" stroke-width="1.2" stroke-linejoin="round"/>
        <!-- 右尖 -->
        <polygon points="114,76  126,50  138,82"
                 fill="url(#kg-crown)" stroke="${t.c2}" stroke-width="1.2" stroke-linejoin="round"/>
        <!-- 底座帶 -->
        <rect x="60" y="78" width="80" height="18" rx="6"
              fill="url(#kg-crown)" stroke="${t.c2}" stroke-width="1.2"/>
        <!-- 皇冠光澤 -->
        <rect x="63" y="80" width="74" height="6" rx="3"
              fill="${t.shimmer}"/>
        <!-- 寶石：中央菱形 -->
        <path d="M100 37 L103.5 42.5 L100 48 L96.5 42.5 Z"
              fill="${t.gem}" opacity="0.92"/>
        <!-- 寶石：左 -->
        <path d="M74 51 L76.5 55.5 L74 60 L71.5 55.5 Z"
              fill="${t.gem}" opacity="0.82"/>
        <!-- 寶石：右 -->
        <path d="M126 51 L128.5 55.5 L126 60 L123.5 55.5 Z"
              fill="${t.gem}" opacity="0.82"/>
      </g>

      <!-- ══════════ 身體主體 ══════════ -->
      <!-- 兩側小手臂 (先畫在身體下方) -->
      <path d="M 54 148 Q 30 143, 32 161 Q 34 175, 55 170"
            fill="url(#kg-body)" stroke="${t.stroke}" stroke-width="2.2"
            stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M 146 148 Q 170 143, 168 161 Q 166 175, 145 170"
            fill="url(#kg-body)" stroke="${t.stroke}" stroke-width="2.2"
            stroke-linejoin="round" stroke-linecap="round"/>

      <!-- 主體（圓潤鬼魂形，底部兩個小腳） -->
      <path d="
        M  70 210
        Q  66 224,  78 225
        Q  90 226,  90 210
        Q  95 217, 100 217
        Q 105 217, 110 210
        Q 110 226, 122 225
        Q 134 224, 130 210
        C 156 196, 164 158, 151 116
        C 141  82, 123  68, 100  68
        C  77  68,  59  82,  49 116
        C  36 158,  44 196,  70 210
        Z
      " fill="url(#kg-body)" stroke="${t.stroke}" stroke-width="2.8"
        stroke-linejoin="round"/>

      <!-- 身體高光 -->
      <ellipse cx="84" cy="105" rx="18" ry="13" fill="url(#kg-hi)"/>

      <!-- ══════════ 表情 ══════════ -->
      <!-- 閉眼（下彎弧 = 舒服微笑眼） -->
      <path d="M 82 130 Q 90 123, 97 130"
            fill="none" stroke="${t.eye}" stroke-width="3.8"
            stroke-linecap="round"/>
      <path d="M 103 130 Q 110 123, 118 130"
            fill="none" stroke="${t.eye}" stroke-width="3.8"
            stroke-linecap="round"/>

      <!-- 臉頰紅暈 -->
      <ellipse cx="76"  cy="143" rx="15" ry="9" fill="url(#kg-cheek)"/>
      <ellipse cx="124" cy="143" rx="15" ry="9" fill="url(#kg-cheek)"/>
    </svg>`;
}

function spawnSprites(count) {
    const sea = document.getElementById('sprite-sea');
    sea.innerHTML = ''; 
    for (let i = 0; i < count; i++) {
        const node = document.createElement('div');
        node.className = 'sprite-node';
        node.innerHTML = generateSpriteSVG(spriteColors[i % 4]);
        const size = Math.random() * 60 + 80;
        node.style.cssText = `width:${size}px; height:${size}px; left:${Math.random()*85}vw; top:${Math.random()*70+5}vh; --dy:${Math.random()*8+6}s; --dx:${Math.random()*10+8}s; --ds:${Math.random()*6+5}s; animation-delay:-${Math.random()*20}s;`;
        sea.appendChild(node);
    }
}

function spawnBubbles(count) {
    const sea = document.getElementById('bubble-sea');
    sea.innerHTML = '';
    for (let i = 0; i < count; i++) {
        const b = document.createElement('div');
        b.className = 'crystal-light';
        const size = Math.random() * 40 + 10;
        b.style.cssText = `width:${size}px; height:${size}px; left:${Math.random()*100}vw; --d:${Math.random()*15+15}s; --w:${Math.random()*8+8}s; animation-delay:-${Math.random()*30}s;`;
        sea.appendChild(b);
    }
}

/* ✨ 精靈王 — 依門檻換主題色 */
function spawnKing(total) {
    if (total < 500) return;

    let colorKey = 'cream';
    if      (total >= 100000) colorKey = 'rainbow';
    else if (total >= 10000)  colorKey = 'rose';
    else if (total >= 1000)   colorKey = 'gold';

    const sea = document.getElementById('sprite-sea');
    const king = document.createElement('div');
    king.className = 'king-node';
    king.style.cssText = 'width:360px; height:360px; z-index:100;';
    king.innerHTML = generateKingSVG(colorKey);
    sea.appendChild(king);
}

const fbCfg = {
  apiKey: "AIzaSyDMIkS0XPIR98U8LkOjdio5ygh20eMfTr0", 
  authDomain: "pure-land-light.firebaseapp.com",
  databaseURL: "https://pure-land-light-default-rtdb.firebaseio.com",
  projectId: "pure-land-light"
};
if (!firebase.apps.length) firebase.initializeApp(fbCfg);
const db = firebase.database();
const statsRef = db.ref('lights_v1_stats/total_warmth');

function hideLoader() {
    const loader = document.getElementById('loading');
    if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => { if (loader) loader.style.display = 'none'; }, 800);
    }
}

function fetchOnce() {
    const failSafe = setTimeout(hideLoader, 5000);
    statsRef.once('value').then(snap => {
        clearTimeout(failSafe);
        const total = 500;
        animN('total-warmth', 0, total, 1500);
        
        let sCount = 8, bCount = 12;
        if (total > 50)  { sCount = 15; bCount = 20; }
        if (total > 150) { sCount = 20; bCount = 25; }
        
        spawnSprites(sCount);
        spawnBubbles(bCount);
        spawnKing(total);
        hideLoader();
    }).catch(() => { hideLoader(); });
}

function animN(id, from, to, dur) {
  const el = document.getElementById(id);
  if (!el || to === 0) { if(el) el.textContent = '0'; return; }
  const step = (to - from) / (dur / 16); 
  let cur = from;
  const t = setInterval(() => {
    cur = Math.min(cur + step, to); 
    el.textContent = Math.round(cur).toLocaleString();
    if (cur >= to) clearInterval(t);
  }, 16);
}

firebase.auth().signInAnonymously()
    .then(() => fetchOnce())
    .catch(() => fetchOnce());
</script>

</body>
</html>
