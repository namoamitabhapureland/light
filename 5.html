<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#020204">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>地藏法界 ‧ 願海九華瞻禮道場</title>
    <style>
        :root {
            --bg-deep: #0a0b0d; 
            --gold-light: #fbeba5; 
            --gold-solid: #d4af37; 
            --amber: #ffbf00; 
        }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; outline: none; }

        html, body { 
            background-color: var(--bg-deep); 
            width: 100%; height: 100%; overflow: hidden; touch-action: none;
        }
        body { 
            background: radial-gradient(circle at 50% 45%, #181b22 0%, var(--bg-deep) 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff;
            transition: background 2s ease;
        }

        /* 背景畫布與靜謐業海水波 */
        canvas { position: absolute; inset: 0; }
        #starCanvas { z-index: 1; pointer-events: none; }
        #waterCanvas { 
            z-index: 2; mix-blend-mode: screen; opacity: 0.25; pointer-events: none; 
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        body.bowing-active #waterCanvas,
        body.incense-on #waterCanvas { 
            opacity: 0 !important; 
        }

        /* 頂部導航與護持資訊 */
        .nav-top { position: absolute; top: max(20px, env(safe-area-inset-top)); left: 15px; z-index: 1000; display: flex; gap: 6px; }
        .nav-btn { 
            color: var(--gold-light); display: flex; align-items: center; gap: 6px; 
            cursor: pointer; background: rgba(0,0,0,0.5); padding: 6px 12px; 
            border-radius: 20px; border: 1px solid rgba(212,175,55,0.2); 
            backdrop-filter: blur(5px); font-size: 0.75rem; letter-spacing: 1px; 
            transition: 0.4s; opacity: 0.8; white-space: nowrap;
        }
        .nav-btn:hover { opacity: 1; border-color: var(--gold-solid); }

        /* 聖像主體層 */
        #buddha-scene {
            position: absolute; inset: 0; z-index: 10; margin: 0 auto;
            display: flex; justify-content: center; align-items: center;
            transform-origin: 50% 75%; transition: transform 4s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none; width: 100%; max-width: 680px; 
        }
        #buddha-scene.bowing { transform: scale(1.28) translateY(2%); }

        /* 萬丈白毫願力地藏紫光爆發層 */
    #burst-container { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 5; pointer-events: none; }
    
    .screen-flash {
        position: absolute; inset: 0; 
        /* 將原琥珀金改為神聖紫光 (#b388ff 聖紫、#7c4dff 梵紫) */
        background: radial-gradient(circle at 50% 45%, #ffffff 0%, #b388ff 45%, #7c4dff 70%, transparent 90%);
        opacity: 1; pointer-events: none; z-index: 100; mix-blend-mode: screen;
        animation: flash-fade 2.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
    }
    @keyframes flash-fade { 0% { opacity: 1; transform: scale(0.8); } 100% { opacity: 0; transform: scale(1.5); } }

    .gold-ray {
        position: absolute; width: 3px; height: 150vh;
        /* 光束核心維持純白，兩側延伸為清淨紫光 */
        background: linear-gradient(to top, transparent, #7c4dff, #ffffff, #b388ff, transparent);
        box-shadow: 0 0 15px #b388ff, 0 0 5px #ffffff; opacity: 0; transform-origin: center center; will-change: transform, opacity;
    }
    @keyframes ray-burst { 
        0% { transform: scaleY(0.05) rotate(var(--rot)); opacity: 0; } 
        15% { opacity: 1; transform: scaleY(0.6) rotate(var(--rot)); } 
        100% { transform: scaleY(2.5) rotate(var(--rot)); opacity: 0; } 
    }

    .space-particle {
        position: absolute; width: 60px; height: 40px; background: #ffffff; border-radius: 70%;
        /* 粒子邊緣的外發光改為琉璃紫光 */
        box-shadow: 0 0 12px #ffffff, 0 0 25px #e040fb; opacity: 0; pointer-events: none; will-change: transform, opacity;
    }
    @keyframes particle-explode {
        0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
        100% { transform: translate(var(--tx), var(--ty)) scale(2.5); opacity: 0; }
    }

        
        /* 菩薩優雅凌空飄浮層 */
        .buddha-breathe { width: 100%; height: auto; animation: floating 7s ease-in-out infinite alternate; position: relative; }
        @keyframes floating {
            0% { transform: translateY(0px); filter: drop-shadow(0 5px 15px rgba(212,175,55,0.1.5)); }
            100% { transform: translateY(-20px); filter: drop-shadow(0 25px 40px rgba(212,175,55,0.35)); }
        }

        /* 光相呼吸 */
        .halo-pulse { transform-origin: 500px 300px; animation: halo-anim 4s infinite alternate ease-in-out; }
        @keyframes halo-anim { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.03); opacity: 0.9; } }

        /* 香煙霧系統 */
        #smoke-container { position: absolute; inset: 0; pointer-events: none; z-index: 15; overflow: hidden; }
        .smoke-fine { position: absolute; width: 6px; height: 50px; background: linear-gradient(to top, rgba(240, 230, 210, 0.25), transparent); border-radius: 3px; filter: blur(4px); opacity: 0; animation: smoke-rise-fine 4.5s cubic-bezier(0.4, 0.1, 0.4, 1) forwards; }
        @keyframes smoke-rise-fine { 0% { transform: translateY(0) scaleX(1); opacity: 0; } 20% { opacity: 0.5; } 100% { transform: translateY(-45vh) scaleX(2.5) translateX(var(--drift)); opacity: 0; } }

        /* 🕯️ 燭火微動態 */
        .candle-flicker { transform-origin: center bottom; animation: flicker-anim 2.5s ease-in-out infinite alternate; }
        @keyframes flicker-anim { 0% { transform: scale(0.93) rotate(-1.2deg); opacity: 0.8; } 100% { transform: scale(1.04) rotate(1.2deg); opacity: 1; } }

        /* 底部控制面板 */
        .ritual-container { position: absolute; bottom: max(30px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; width: 100%; z-index: 100; }
        #blessing-text { height: 25px; margin-bottom: 20px; color: var(--gold-light); font-size: 1.1rem; letter-spacing: 8px; text-shadow: 0 0 20px rgba(255,191,0,0.9), 0 0 10px #fff; opacity: 0; pointer-events: none; white-space: nowrap; }
        @keyframes float-blessing { 0% { opacity: 0; transform: translateY(15px); } 20% { opacity: 1; transform: translateY(0); } 80% { opacity: 1; transform: translateY(-5px); } 100% { opacity: 0; transform: translateY(-15px); } }

        .ritual-panel { display: flex; gap: 40px; }
        .ritual-btn { color: var(--gold-light); font-size: 1rem; letter-spacing: 6px; cursor: pointer; transition: all 0.4s; padding: 12px 24px; background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.35); border-radius: 25px; backdrop-filter: blur(8px); font-weight: bold; text-shadow: 0 0 8px rgba(243,229,171,0.4); }
        .ritual-btn:hover, .ritual-btn.active { color: #fff; text-shadow: 0 0 15px var(--gold-light); border-color: rgba(212,175,55,0.85); background: rgba(212,175,55,0.15); box-shadow: 0 0 20px rgba(212,175,55,0.25); }
        .chant-hint { margin-top: 18px; font-size: 0.8rem; color: rgba(255,255,255,0.6); letter-spacing: 4px; pointer-events: none; }

        /* 供桌與香爐控制 */
        body.incense-on #censer-group { opacity: 1; transform: translateY(0); }
        #censer-group { opacity: 0; transform: translateY(15px); transition: all 1.2s cubic-bezier(0.25, 1, 0.5, 1); }
        .incense-glow { animation: glow-pulse 1.5s infinite alternate ease-in-out; }
        @keyframes glow-pulse { 0% { r: 3px; opacity: 0.7; filter: drop-shadow(0 0 4px #ff4500); } 100% { r: 4.5px; opacity: 1; filter: drop-shadow(0 0 12px #ffaa00); } }

        /* 觀想導引彈窗 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); backdrop-filter: blur(12px); z-index: 10000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
        .modal-overlay.show { display: flex !important; opacity: 1 !important; pointer-events: auto !important; }
        .modal-box { width: 85%; max-width: 350px; max-height: 80vh; overflow-y: auto; background: linear-gradient(135deg, #141822, #07090e); border: 1px solid var(--gold-solid); border-radius: 20px; padding: 35px 25px; text-align: center; box-shadow: 0 0 50px rgba(212,175,55,0.2); transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .modal-overlay.show .modal-box { transform: scale(1); }
        .m-title { color: var(--gold-light); font-size: 1.2rem; letter-spacing: 5px; margin-bottom: 15px; font-weight: bold; }
        .m-text { font-size: 0.95rem; line-height: 1.8; margin-bottom: 30px; letter-spacing: 2px; color: #ccc; text-align: left; }
        .m-btn-prime { background: rgba(212,175,55,0.1); border: 1px solid var(--gold-solid); color: var(--gold-light); padding: 12px; border-radius: 20px; font-size: 0.95rem; cursor: pointer; width: 100%; letter-spacing: 3px; }

              /* --- 1. 白毫（金色）保持在原處 --- */
        #buddha-urna {
            transition: all 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            transform-origin: 500px 190px;
            fill: #cc2222 !important;
        }
        .bowing #buddha-urna {
            r: 10px;
            filter: drop-shadow(0 0 15px #ffd700) drop-shadow(0 0 35px #ffbf00);
        }

        /* --- 2. 摩尼寶珠（金色）與彩色能量光環 --- */
        #mani-jewel-container {
            transform-origin: 0px 0px; /* 錨定在雙手原處中心 */
            /* 平時：在手上溫柔地放大縮小呼吸 */
            animation: jewel-breathe 4s ease-in-out infinite alternate;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.3, 1);
        }

        #mani-jewel {
            fill: url(#kshitigarbhaGold) !important;
            transition: filter 1.2s ease-in-out;
        }

       

        /* 動態效果定義 */
        @keyframes jewel-breathe {
            0% { transform: scale(0.95); }
            100% { transform: scale(1.08); }
        }
      

        /* --- 3. 頂禮時：寶珠與光環從原處放大數倍 --- */
        .bowing #mani-jewel-container {
            animation: none; /* 頂禮時專注於放大 */
            transform: scale(1); /* 從原處放大 3.5 倍（可依畫面隨意調整此數值） */
        }
        .bowing #mani-jewel {
            filter: drop-shadow(0 0 25px #ffffff) drop-shadow(0 0 60px #ffd700);
        }
               /* 彩色能量光環：極高透明度、如琉璃清澈、若隱若現 */
        #mani-rainbow-ring {
            stroke: url(#rainbowGradient); /* 使用彩色漸層線條 */
            stroke-width: 2.5; /* 稍微縮細線條，更顯精緻 */
            fill: none;
            transform-origin: 0px 0px;
            opacity: 0.35; /* 大幅提高透明度，平時保持清透感 */
            
            /* 讓透明度與發光隨呼吸優雅地淡入淡出 */
            animation: ring-glow 3s ease-in-out infinite alternate;
            transition: all 1.2s cubic-bezier(0.25, 1, 0.3, 1);
        }

        /* 彩色能量圈的動態效果：主要控制「透明度」與微幅金銀光的流轉，不產生深色厚重感 */
        @keyframes ring-glow {
            0% { 
                opacity: 0.25; 
                filter: drop-shadow(0 0 4px rgba(0, 255, 255, 0.4)) 
                        drop-shadow(0 0 8px rgba(255, 215, 0, 0.3)); 
            }
            100% { 
                opacity: 0.55; /* 最亮時也保持半透明的高級感 */
                filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.5)) 
                        drop-shadow(0 0 20px rgba(255, 215, 0, 0.4)); 
            }
        }

        /* 頂禮時：放大後線條變細，且保持聖潔的清透金芒 */
        .bowing #mani-rainbow-ring {
            animation: none;
            opacity: 0.6; /* 頂禮放大時稍微增強，但依然保持剔透 */
            stroke-width: 1.2; 
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
        }


    </style>
</head>

    <script>
        // 莊嚴語音與法語
        function speakWords(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW'; msg.rate = 0.82; msg.pitch = 0.82; 
            window.speechSynthesis.speak(msg);
        }

        function showBlessing(text) {
            const el = document.getElementById('blessing-text');
            if(!el) return;
            el.innerText = text;
            el.style.animation = 'none';
            void el.offsetWidth;
            el.style.animation = 'float-blessing 3.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards';
        }

        // 頂禮核心邏輯
        // 頂禮核心邏輯
function toggleAction(action) {
    const btn = document.getElementById(`btn-${action}`);
    if (!btn || btn.classList.contains('active')) return;

    // 獲取錫杖元素
    const staff = document.getElementById('khakkhara-staff');
    
    // 頂禮開始：浮現錫杖
    if (staff) staff.style.opacity = '1'; 

    btn.classList.add('active');
    document.body.classList.add('bowing-active');
    document.getElementById('buddha-scene').classList.add('bowing');
    
    triggerGoldenBurst();
    speakWords("地藏大願，滅定業障");
    showBlessing("地藏悲願 ‧ 滅罪消業");
    
    // 頂禮結束：恢復初始狀態
    setTimeout(() => { 
        document.getElementById('buddha-scene').classList.remove('bowing');
        btn.classList.remove('active'); 
        document.body.classList.remove('bowing-active');
        
        // 禮拜結束後自動收攝錫杖
        if (staff) staff.style.opacity = '0'; 
    }, 3000);
}

        // 萬丈金光粒子特效
        function triggerGoldenBurst() {
            const container = document.getElementById('burst-container');
            if(!container) return;
            container.innerHTML = '';
            
            const flash = document.createElement('div');
            flash.className = 'screen-flash';
            container.appendChild(flash);
            
            for(let i=0; i<48; i++) {
                const angle = i * 7.5;
                const ray = document.createElement('div');
                ray.className = 'gold-ray';
                ray.style.setProperty('--rot', `${angle}deg`);
                ray.style.animation = `ray-burst 2.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards`;
                container.appendChild(ray);
                
                const particle = document.createElement('div');
                particle.className = 'space-particle';
                const distance = 70 + Math.random() * 50; 
                const rad = (angle * Math.PI) / 180;
                const tx = Math.cos(rad) * distance + "vw";
                const ty = Math.sin(rad) * distance + "vh";
                particle.style.setProperty('--tx', tx);
                particle.style.setProperty('--ty', ty);
                particle.style.animation = `particle-explode ${1.4 + Math.random() * 1}s cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;
                container.appendChild(particle);
            }
        }

        // 燃香物理計時器
        let incenseTimer, smokeTimer, incenseProgress = 0;

        function toggleIncense() {
            const btn = document.getElementById('btn-incense');
            const isActive = document.body.classList.contains('incense-on');
            
            if (!isActive) {
                document.body.classList.add('incense-on');
                btn.classList.add('active');
                speakWords("明珠照徹天堂路，金錫振開地獄門");
                showBlessing("一柱清香 ‧ 照破幽冥");
                
                incenseProgress = 0;
                createDualSmoke();
                
                let startTime = Date.now();
                function burn() {
                    let elapsed = (Date.now() - startTime) / 1000;
                    incenseProgress = Math.min(elapsed / 60, 1); // 60秒完全燃盡
                    
                    document.getElementById('stick-center').setAttribute('y1', 1125 + (145 * incenseProgress));
                    document.getElementById('glow-center').setAttribute('cy', 1125 + (145 * incenseProgress));
                    
                    document.getElementById('stick-left').setAttribute('y1', 1140 + (130 * incenseProgress));
                    document.getElementById('glow-left').setAttribute('cy', 1140 + (130 * incenseProgress));
                    
                    document.getElementById('stick-right').setAttribute('y1', 1140 + (130 * incenseProgress));
                    document.getElementById('glow-right').setAttribute('cy', 1140 + (130 * incenseProgress));
                    
                    let meltAmount = 45 * incenseProgress;
                    ['left', 'right'].forEach(side => {
                        document.getElementById(`candle-body-${side}`).setAttribute('y', 1220 + meltAmount);
                        document.getElementById(`candle-body-${side}`).setAttribute('height', 55 - meltAmount);
                        document.getElementById(`candle-wick-${side}`).setAttribute('y1', 1215 + meltAmount);
                        document.getElementById(`candle-wick-${side}`).setAttribute('y2', 1220 + meltAmount);
                        document.getElementById(`flame-move-${side}`).style.transform = `translateY(${meltAmount}px)`;
                    });
                    
                    if (incenseProgress < 1 && document.body.classList.contains('incense-on')) {
                        incenseTimer = requestAnimationFrame(burn);
                    } else if (incenseProgress >= 1 && document.body.classList.contains('incense-on')) {
                        resetIncense();
                    }
                }
                incenseTimer = requestAnimationFrame(burn);
            } else {
                resetIncense();
            }
        }

        function resetIncense() {
            cancelAnimationFrame(incenseTimer);
            clearTimeout(smokeTimer);
            document.body.classList.remove('incense-on');
            document.getElementById('btn-incense').classList.remove('active');
            setTimeout(restoreIncensePosition, 1200);
        }

        function restoreIncensePosition() {
            if(!document.body.classList.contains('incense-on')) {
                document.getElementById('stick-center').setAttribute('y1', '1125');
                document.getElementById('glow-center').setAttribute('cy', '1125');
                document.getElementById('stick-left').setAttribute('y1', '1140');
                document.getElementById('glow-left').setAttribute('cy', '1140');
                document.getElementById('stick-right').setAttribute('y1', '1140');
                document.getElementById('glow-right').setAttribute('cy', '1140');
                ['left', 'right'].forEach(side => {
                    document.getElementById(`candle-body-${side}`).setAttribute('y', '1220');
                    document.getElementById(`candle-body-${side}`).setAttribute('height', '55');
                    document.getElementById(`candle-wick-${side}`).setAttribute('y1', '1215');
                    document.getElementById(`flame-move-${side}`).style.transform = `translateY(0px)`;
                });
            }
        }

        function createDualSmoke() {
            if (!document.body.classList.contains('incense-on') || incenseProgress >= 1) return;
            const container = document.getElementById('smoke-container');
            const glow = document.getElementById('glow-center');
            const rect = glow.getBoundingClientRect(); 
            
            const puff = document.createElement('div');
            puff.className = 'smoke-fine';
            puff.style.setProperty('--drift', `${(Math.random() - 0.5) * 50}px`);
            puff.style.left = `${rect.left + rect.width / 2 - 3}px`; 
            puff.style.top = `${rect.top - 50}px`; 
            container.appendChild(puff);
            setTimeout(() => puff.remove(), 4500);
            
            smokeTimer = setTimeout(createDualSmoke, 450);
        }

        // 背景星河渲染
        const canvas = document.getElementById('starCanvas'), ctx = canvas.getContext('2d'); 
        let width, height, stars = []; 
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; } 
        window.addEventListener('resize', resize); resize(); 

        for (let i = 0; i < 150; i++) { 
            stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, s: Math.random() * 1.8 }); 
        } 
        function renderStars() { 
            ctx.fillStyle = 'rgba(10, 11, 13, 0.4)'; ctx.fillRect(0, 0, width, height); 
            stars.forEach(s => { 
                s.z -= 0.3; if (s.z <= 0) s.z = 2000; 
                let sc = 400 / (400 + s.z); 
                ctx.beginPath(); ctx.arc((width / 2) + s.x * sc, (height / 2) + s.y * sc, s.s * sc, 0, Math.PI * 2); 
                ctx.fillStyle = '#fbeba5'; ctx.fill(); 
            }); 
            requestAnimationFrame(renderStars); 
        } 
        renderStars();

            document.getElementById('m-title').innerText = title;
