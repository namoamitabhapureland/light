<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>無量的光 · 光之海</title>
    <style>
        :root {
            --bg-dark: #121416;
            --text-gold: #CBA37A;
            --text-muted: #6B615A;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            color: #fff;
            font-family: -apple-system, "PingFang TC", sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 畫布容器 */
        #sea-container {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        /* 覆蓋層：營造深度感 */
        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(18,20,22,0.4) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* 核心計數器 */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .count-label {
            font-size: 0.75rem;
            letter-spacing: 5px;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .count-num {
            font-size: 3.5rem;
            font-weight: 200;
            letter-spacing: 2px;
            color: var(--text-gold);
            text-shadow: 0 0 20px rgba(203, 163, 122, 0.3);
            font-variant-numeric: tabular-nums;
        }

        .sub-text {
            margin-top: 15px;
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* 返回按鈕 */
        .back-btn {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: 20px;
            z-index: 100;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .back-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }
        .back-btn svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 1.5; }

        /* 載入中遮罩 */
        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .loader-dot {
            width: 8px;
            height: 8px;
            background: var(--text-gold);
            border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(2); opacity: 1; }
        }
    </style>
</head>
<body>

<div id="loading"><div class="loader-dot"></div></div>

<div class="back-btn" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
</div>

<div id="sea-container"></div>
<div class="overlay"></div>

<div class="content">
    <div class="count-label">無量的光 · 已點亮</div>
    <div class="count-num" id="total-warmth">0</div>
    <div class="sub-text">每一道光，都是一份不孤單的證明</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // --- 視覺：光之海動畫引擎 ---
    const container = document.getElementById('sea-container');
    const particleCount = 40;

    function createParticle() {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        const size = Math.random() * 30 + 10;
        svg.setAttribute("viewBox", "0 0 100 100");
        svg.style.position = "absolute";
        svg.style.width = size + "px";
        svg.style.height = size + "px";
        svg.style.left = Math.random() * 100 + "%";
        svg.style.top = Math.random() * 100 + "%";
        svg.style.opacity = "0";
        svg.style.filter = "blur(1px)";
        
        // 使用妳喜歡的低熵向量圖形：簡單的圓形或菱形
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", "50");
        circle.setAttribute("cy", "50");
        circle.setAttribute("r", "40");
        circle.setAttribute("fill", "url(#grad)");
        
        if (!document.getElementById('sea-defs')) {
            const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
            defs.id = 'sea-defs';
            defs.innerHTML = `
                <radialGradient id="grad">
                    <stop offset="0%" stop-color="#CBA37A" stop-opacity="0.6" />
                    <stop offset="100%" stop-color="#CBA37A" stop-opacity="0" />
                </radialGradient>
            `;
            svg.appendChild(defs);
        }
        
        svg.appendChild(circle);
        container.appendChild(svg);

        // 動畫邏輯：漂浮與呼吸
        const duration = Math.random() * 5000 + 4000;
        const delay = Math.random() * 3000;
        
        svg.animate([
            { transform: 'translateY(0) scale(1)', opacity: 0 },
            { transform: `translateY(-${Math.random() * 50 + 20}px) scale(1.2)`, opacity: 0.5, offset: 0.5 },
            { transform: `translateY(-${Math.random() * 100 + 50}px) scale(1)`, opacity: 0 }
        ], {
            duration: duration,
            delay: delay,
            iterations: Infinity,
            easing: 'ease-in-out'
        });
    }

    for (let i = 0; i < particleCount; i++) {
        createParticle();
    }

    // --- Firebase：單次讀取與自動斷線 ---
    const fbCfg = {
        apiKey: "AIzaSyDMIkS0XPIR98U8LkOjdio5ygh20eMfTr0", 
        authDomain: "pure-land-light.firebaseapp.com",
        databaseURL: "https://pure-land-light-default-rtdb.firebaseio.com",
        projectId: "pure-land-light"
    };
    if (!firebase.apps.length) firebase.initializeApp(fbCfg);
    const db = firebase.database();
    const statsRef = db.ref('lights_v1_stats/total_warmth');

    // 1. 開啟連線
    firebase.database().goOnline();

    // 2. 使用 .once 進行單次讀取
    statsRef.once('value').then(snap => {
        const total = snap.val() || 0;
        
        // 數字跳動動畫
        animN('total-warmth', 0, total, 2000);
        
        // 隱藏載入畫面
        const loader = document.getElementById('loading');
        if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 800);
        }

        // 3. 核心：讀取完畢後，1 秒內斷開連線，把名額讓給下一位有緣人
        setTimeout(() => {
            firebase.database().goOffline();
            console.log("連線已自動釋放，保護系統資源。");
        }, 1000);
    }).catch(err => {
        console.warn("讀取失敗:", err);
        // 失敗也要斷線
        firebase.database().goOffline();
    });

    function animN(id, from, to, dur) {
        const el = document.getElementById(id);
        if (!el) return;
        if (to === 0) { el.textContent = '0'; return; }
        
        const startTime = performance.now();
        
        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / dur, 1);
            // 使用 easeOutExpo 讓數字跳動更優雅
            const easeProgress = 1 - Math.pow(2, -10 * progress);
            const current = Math.floor(easeProgress * (to - from) + from);
            
            el.textContent = current.toLocaleString();
            
            if (progress < 1) {
                requestAnimationFrame(update);
            } else {
                el.textContent = to.toLocaleString();
            }
        }
        
        requestAnimationFrame(update);
    }
</script>

</body>
</html>
