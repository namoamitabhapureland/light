<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>無量的光 · 守護之光</title>
<style>
:root {
  /* 極致清透淨白背景 */
  --bg-gradient: linear-gradient(135deg, #FFFFFF 0%, #FDFCFB 100%);
  --glass-bg: rgba(255, 255, 255, 0.8);
  --glass-border: rgba(255, 255, 255, 0.7); /* 調整為更透明的邊框 */
  --text-main: #58504A; 
  --text-light: #968E86;
  --accent-gold: #D4AF37; 
  --shadow-soft: 0 10px 40px rgba(160, 155, 150, 0.08);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0; padding: 0; width: 100%; height: 100dvh;
  background: var(--bg-gradient); color: var(--text-main);
  font-family: -apple-system, "PingFang TC", sans-serif;
  overflow: hidden; display: flex; flex-direction: column; align-items: center;
}

.top-nav { width: 100%; padding: max(15px, env(safe-area-inset-top)) 20px 10px; display: flex; justify-content: space-between; z-index: 5000; position: absolute; top: 0;}
.nav-btn { display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 50%; background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); color: var(--text-main); box-shadow: var(--shadow-soft); cursor: pointer; transition: 0.2s; }
.nav-btn:active { transform: scale(0.92); }
.nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;}

/* ✨ 底部計數看板：透明玻璃與強制單行不折行 */
.bottom-text {
  position: absolute; bottom: max(40px, env(safe-area-inset-bottom)); text-align: center; z-index: 5000; 
  background: rgba(255,255,255,0.4); /* 透明玻璃感 */
  padding: 18px 35px; border-radius: 40px; 
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
  border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); 
  animation: fadeUp 1.5s ease-out;
  width: max-content; max-width: 90%; white-space: nowrap; /* 確保單行 */
}
.bt-title { font-size: 0.85rem; letter-spacing: 5px; color: var(--text-light); margin-bottom: 6px; font-weight: 300;}
.bt-count { font-size: 1.3rem; font-weight: 300; letter-spacing: 2px; color: var(--text-main); display: flex; align-items: center; justify-content: center; gap: 10px;}
.bt-count span { font-weight: 400; color: var(--accent-gold); font-size: 2.2rem; text-shadow: 0 0 20px rgba(212,175,55,0.25);}

@keyframes fadeUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

#visual-sea { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

/* 晶透氣泡層 */
#bubble-sea { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
.crystal-light {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8) 0%, rgba(212,175,55,0.1) 60%, transparent 100%);
  border: 0.5px solid rgba(212,175,55,0.05);
  animation: riseUp var(--d) linear infinite, wiggleX var(--w) ease-in-out infinite alternate, softFade var(--d) linear infinite;
  will-change: transform, opacity;
  backdrop-filter: blur(2px);
}

@keyframes riseUp { 0% { transform: translateY(110vh); } 100% { transform: translateY(-15vh); } }
@keyframes wiggleX { 0% { margin-left: -40px; } 100% { margin-left: 40px; } }
@keyframes softFade { 0%, 100% { opacity: 0; } 15%, 85% { opacity: 0.8; } }

/* 精靈層 */
#sprite-sea { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; }
.sprite-node {
  position: absolute; will-change: transform, opacity;
  animation: deepFloatY var(--dy) ease-in-out infinite alternate, 
             deepFloatX var(--dx) ease-in-out infinite alternate, 
             pulseBreathe var(--ds) ease-in-out infinite alternate;
}

@keyframes deepFloatY { 0% { transform: translateY(-80px); } 100% { transform: translateY(80px); } }
@keyframes deepFloatX { 0% { margin-left: -50px; } 100% { margin-left: 50px; } }
@keyframes pulseBreathe { 0% { transform: scale(0.65); opacity: 0.4; } 100% { transform: scale(1.3); opacity: 1; } }

/* ✨ 鎮守中央的精靈大王專屬定位 */
.king-node {
  left: 50% !important; top: 40% !important; 
  transform: translate(-50%, -50%) !important;
  animation: kPulse 12s ease-in-out infinite alternate;
  filter: drop-shadow(0 15px 35px rgba(212,175,55,0.15));
}
@keyframes kPulse { 
    0% { transform: translate(-50%, -50%) scale(0.7); opacity: 0.9; } 
    100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } 
}

#loading { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 0.9rem; letter-spacing: 5px; color: var(--text-light); z-index: 9999; background: var(--bg-gradient); transition: opacity 0.8s; }
</style>
</head>
<body>

<div id="loading">感受清透光芒中...</div>

<div class="top-nav">
  <div class="nav-btn" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </div>
</div>

<div id="visual-sea">
    <div id="bubble-sea"></div>
    <div id="sprite-sea"></div>
</div>

<div class="bottom-text">
  <div class="bt-title">一燈即無量</div>
  <div class="bt-count">累計有 <span id="total-warmth">0</span> 份善意發光</div>
</div>

<svg style="width:0;height:0;position:absolute;">
    <defs>
        <linearGradient id="king-gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFF8E1" stop-opacity="1"/><stop offset="100%" stop-color="#E8C36B" stop-opacity="0.95"/></linearGradient>
        <linearGradient id="king-red" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFF0F5" stop-opacity="1"/><stop offset="100%" stop-color="#E5989B" stop-opacity="0.95"/></linearGradient>
        <linearGradient id="king-rainbow" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="25%" stop-color="#E0F7FA" stop-opacity="0.9"/><stop offset="50%" stop-color="#FFFDE7" stop-opacity="0.95"/><stop offset="75%" stop-color="#FCE4EC" stop-opacity="0.9"/><stop offset="100%" stop-color="#E1D5E7" stop-opacity="0.85"/></linearGradient>
    </defs>
</svg>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const spriteColors = ["#D1E4EE", "#E8F0E1", "#E1D5E7", "#FDF5D3"];

// ✨ 所有人共用的畫法，確保 100% 不破圖
function generateSpriteSVG(color) {
    return `
    <svg viewBox="35 15 130 140" width="100%" height="100%" overflow="visible">
        <path d="M 60 140 C 40 140, 45 90, 70 70 C 90 50, 110 50, 130 70 C 155 90, 160 140, 140 140 C 120 140, 130 150, 100 150 C 70 150, 80 140, 60 140 Z" fill="${color}" opacity="0.9" />
        <path d="M 85 85 Q 90 88 95 85" fill="none" stroke="#8C7A6B" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 105 85 Q 110 88 115 85" fill="none" stroke="#8C7A6B" stroke-width="2.5" stroke-linecap="round"/>
        <ellipse cx="70" cy="95" rx="8" ry="4" fill="#D1A299" opacity="0.6"/>
        <ellipse cx="130" cy="95" rx="8" ry="4" fill="#D1A299" opacity="0.6"/>
    </svg>`;
}

function spawnSprites(count) {
    const sea = document.getElementById('sprite-sea');
    const limitedCount = Math.min(count, 30);
    sea.innerHTML = ''; 
    for (let i = 0; i < limitedCount; i++) {
        const node = document.createElement('div');
        node.className = 'sprite-node';
        node.innerHTML = generateSpriteSVG(spriteColors[i % 4]);
        const size = Math.random() * 80 + 80;
        node.style.cssText = `width:${size}px; height:${size}px; left:${Math.random()*85}vw; top:${Math.random()*70+5}vh; --dy:${Math.random()*8+6}s; --dx:${Math.random()*10+8}s; --ds:${Math.random()*6+5}s; animation-delay:-${Math.random()*20}s;`;
        sea.appendChild(node);
    }
}

function spawnBubbles(count) {
    const sea = document.getElementById('bubble-sea');
    sea.innerHTML = '';
    for (let i = 0; i < count; i++) {
        const b = document.createElement('div');
        b.className = 'crystal-light';
        const size = Math.random() * 40 + 10;
        b.style.cssText = `width:${size}px; height:${size}px; left:${Math.random()*100}vw; --d:${Math.random()*15+15}s; --w:${Math.random()*8+8}s; animation-delay:-${Math.random()*30}s;`;
        sea.appendChild(b);
    }
}

// ✨ 加入精靈王邏輯
function spawnKing(total) {
    if (total < 500) return; // 小於 500 不顯示
    
    let kingColor = "#FDF5D3"; 
    if (total >= 100000) kingColor = "url(#king-rainbow)"; 
    else if (total >= 10000) kingColor = "url(#king-red)";   
    else if (total >= 1000) kingColor = "url(#king-gold)";  

    const sea = document.getElementById('sprite-sea');
    const king = document.createElement('div');
    king.className = 'sprite-node king-node';
    king.style.cssText = `width:360px; height:360px; z-index:100;`;
    king.innerHTML = generateSpriteSVG(kingColor);
    sea.appendChild(king);
}

const fbCfg = {
  apiKey: "AIzaSyDMIkS0XPIR98U8LkOjdio5ygh20eMfTr0", 
  authDomain: "pure-land-light.firebaseapp.com",
  databaseURL: "https://pure-land-light-default-rtdb.firebaseio.com",
  projectId: "pure-land-light"
};
if (!firebase.apps.length) firebase.initializeApp(fbCfg);
const db = firebase.database();
const statsRef = db.ref('lights_v1_stats/total_warmth');

function hideLoader() {
    const loader = document.getElementById('loading');
    if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 800);
    }
}

// 👑 完全沿用妳的原始 Fetch 邏輯，保證 100% 讀到資料
function fetchOnce() {
    firebase.database().goOnline();
    // 設定 5 秒強制關閉 Loading，防止卡死
    const failSafe = setTimeout(hideLoader, 5000);

    statsRef.once('value').then(snap => {
        clearTimeout(failSafe);
        const total = snap.val() || 0;
        animN('total-warmth', 0, total, 1500);
        
        let sCount = 10, bCount = 15;
        if (total > 50) { sCount = 20; bCount = 25; }
        if (total > 150) { sCount = 30; bCount = 40; }
        
        spawnSprites(sCount);
        spawnBubbles(bCount);
        spawnKing(total); // ✨ 唯一新增：呼叫精靈王

        hideLoader();
        setTimeout(() => firebase.database().goOffline(), 1000);
    }).catch(() => {
        hideLoader();
        firebase.database().goOffline();
    });
}

function animN(id, from, to, dur) {
  const el = document.getElementById(id);
  if (!el || to === 0) { if(el) el.textContent = '0'; return; }
  const step = (to - from) / (dur / 16); 
  let cur = from;
  const t = setInterval(() => {
    cur = Math.min(cur + step, to); 
    el.textContent = Math.round(cur).toLocaleString();
    if (cur >= to) clearInterval(t);
  }, 16);
}

firebase.auth().signInAnonymously()
    .then(() => fetchOnce())
    .catch(() => fetchOnce());

</script>
</body>
</html>
