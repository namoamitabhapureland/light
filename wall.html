<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
  
<title>無量的光 · 守護之光</title>
<style>
:root {
  /* 調高白度，營造極致清透感 */
  --bg-gradient: linear-gradient(135deg, #FFFFFF, #F8F9FA);
  --glass-bg: rgba(255, 255, 255, 0.75);
  --glass-border: rgba(255, 255, 255, 0.95);
  --text-main: #58504A; 
  --text-light: #968E86;
  --accent-gold: #D4AF37; /* 更具穿透力的金 */
  --shadow-soft: 0 10px 40px rgba(160, 155, 150, 0.08);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0; padding: 0; width: 100%; height: 100dvh;
  background: var(--bg-gradient); color: var(--text-main);
  font-family: -apple-system, "PingFang TC", sans-serif;
  overflow: hidden; display: flex; flex-direction: column; align-items: center;
}

/* 頂部導航 */
.top-nav { width: 100%; padding: max(15px, env(safe-area-inset-top)) 20px 10px; display: flex; justify-content: space-between; z-index: 100; position: absolute; top: 0;}
.nav-btn { display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 50%; background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); color: var(--text-main); box-shadow: var(--shadow-soft); cursor: pointer; transition: 0.2s; }
.nav-btn:active { transform: scale(0.92); }
.nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;}

/* 底部統計看板：毛玻璃質感加強 */
.bottom-text {
  position: absolute; bottom: max(40px, env(safe-area-inset-bottom)); text-align: center; z-index: 100; animation: fadeUp 1.5s ease-out; background: rgba(255,255,255,0.8); padding: 18px 35px; border-radius: 35px; backdrop-filter: blur(20px); border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft);
}
.bt-title { font-size: 0.85rem; letter-spacing: 5px; color: var(--text-light); margin-bottom: 8px; font-weight: 300;}
.bt-count { font-size: 1.3rem; font-weight: 300; letter-spacing: 2px; color: var(--text-main); display: flex; align-items: center; justify-content: center; gap: 10px;}
.bt-count span { font-weight: 400; color: var(--accent-gold); font-size: 2rem; text-shadow: 0 0 20px rgba(212,175,55,0.25);}

@keyframes fadeUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

/* 視覺海容器 */
#visual-sea { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

/* 1. 晶透光芒氣泡層：向上昇華 */
#bubble-sea { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

.crystal-light {
  position: absolute;
  border-radius: 50%;
  /* 採用毛玻璃與微光疊加感，避免顏色變髒 */
  background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(212,175,55,0.15) 60%, transparent 100%);
  animation-name: riseUp, horizontalWiggle, softFade;
  animation-iteration-count: infinite;
  animation-timing-function: linear, ease-in-out, linear;
  will-change: transform, opacity;
  filter: blur(2px);
}

@keyframes riseUp { 0% { transform: translateY(110vh); } 100% { transform: translateY(-10vh); } }
@keyframes horizontalWiggle { 0% { margin-left: -30px; } 100% { margin-left: 30px; } }
@keyframes softFade { 0% { opacity: 0; } 15%, 85% { opacity: 0.8; } 100% { opacity: 0; } }

/* 2. 可愛精靈層：大幅度飄動與呼吸感 */
#sprite-sea { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; }

.sprite-node {
  position: absolute; 
  animation-name: largeFloatY, largeFloatX, deepBreathe; 
  animation-iteration-count: infinite; 
  animation-direction: alternate; 
  animation-timing-function: ease-in-out; 
  filter: drop-shadow(0 15px 30px rgba(203,163,122,0.12));
  will-change: transform, opacity;
}

[span_6](start_span)/* 加強移動幅度：從原本的 30px 擴展到 60px[span_6](end_span) */
@keyframes largeFloatY { 0% { transform: translateY(-60px); } 100% { transform: translateY(60px); } }
@keyframes largeFloatX { 0% { margin-left: -40px; } 100% { margin-left: 40px; } }
[span_7](start_span)/* 加強呼吸感：縮放比例更明顯[span_7](end_span) */
@keyframes deepBreathe { 0% { transform: scale(0.7); opacity: 0.45; } 100% { transform: scale(1.25); opacity: 1; } }

#loading { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 0.9rem; letter-spacing: 4px; color: var(--text-light); z-index: 200; background: var(--bg-gradient); transition: opacity 0.8s; }
</style>
</head>
<body>

<div id="loading">感受清透光芒中...</div>

<div class="top-nav">
  <div class="nav-btn" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </div>
</div>

<div id="visual-sea">
    <div id="bubble-sea"></div> <div id="sprite-sea"></div> </div>

<div class="bottom-text">
  <div class="bt-title">一燈即無量</div>
  <div class="bt-count">累計有 <span id="total-warmth">0</span> 份善意發光</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// --- 可愛精靈與氣泡產生邏輯 ---
const spriteColors = ["#D1E4EE", "#E8F0E1", "#E1D5E7", "#FDF5D3"];

function generateSpriteSVG(color) {
    return `
    <svg viewBox="35 15 130 140" width="100%" height="100%" overflow="visible">
        <path d="M 60 140 C 40 140, 45 90, 70 70 C 90 50, 110 50, 130 70 C 155 90, 160 140, 140 140 C 120 140, 130 150, 100 150 C 70 150, 80 140, 60 140 Z" fill="${color}" opacity="0.9" />
        <path d="M 85 85 Q 90 88 95 85" fill="none" stroke="#8C7A6B" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 105 85 Q 110 88 115 85" fill="none" stroke="#8C7A6B" stroke-width="2.5" stroke-linecap="round"/>
        <ellipse cx="70" cy="95" rx="8" ry="4" fill="#D1A299" opacity="0.6"/>
        <ellipse cx="130" cy="95" rx="8" ry="4" fill="#D1A299" opacity="0.6"/>
    </svg>`;
}

function randomRange(min, max) { return Math.random() * (max - min) + min; }

[span_8](start_span)// 生成精靈海，嚴格上限 30 個[span_8](end_span)
function spawnSprites(count) {
    const sea = document.getElementById('sprite-sea');
    const limitedCount = Math.min(count, 30); 
    sea.innerHTML = ''; 
    for (let i = 0; i < limitedCount; i++) {
        const node = document.createElement('div');
        node.className = 'sprite-node';
        node.innerHTML = generateSpriteSVG(spriteColors[Math.floor(Math.random() * spriteColors.length)]);
        const size = randomRange(70, 160);
        node.style.width = size + 'px'; node.style.height = size + 'px';
        node.style.left = randomRange(-10, 85) + 'vw';
        node.style.top = randomRange(5, 75) + 'vh';
        const durY = randomRange(6, 15) + 's'; const durX = randomRange(8, 18) + 's'; 
        const durS = randomRange(5, 12) + 's'; const delay = randomRange(0, -20) + 's';
        node.style.animationDuration = `${durY}, ${durX}, ${durS}`;
        node.style.animationDelay = `${delay}, ${delay}, ${delay}`;
        sea.appendChild(node);
    }
}

// 生成晶透氣泡海
function spawnCrystalBubbles(count) {
    const sea = document.getElementById('bubble-sea');
    sea.innerHTML = '';
    for (let i = 0; i < count; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'crystal-light';
        const size = randomRange(5, 45); 
        bubble.style.width = size + 'px'; bubble.style.height = size + 'px';
        bubble.style.left = randomRange(0, 100) + 'vw';
        const durUp = randomRange(12, 30) + 's';
        const durWiggle = randomRange(7, 20) + 's';
        const delay = randomRange(0, -30) + 's';
        bubble.style.animationDuration = `${durUp}, ${durWiggle}, ${durUp}`;
        bubble.style.animationDelay = `${delay}, ${delay}, ${delay}`;
        sea.appendChild(bubble);
    }
}

// --- Firebase 連線保護與一次性抓取 ---
const fbCfg = {
  apiKey: "AIzaSyDMIkS0XPIR98U8LkOjdio5ygh20eMfTr0", 
  authDomain: "pure-land-light.firebaseapp.com",
  databaseURL: "https://pure-land-light-default-rtdb.firebaseio.com",
  projectId: "pure-land-light"
};
if (!firebase.apps.length) firebase.initializeApp(fbCfg);
const db = firebase.database();
const statsRef = db.ref('lights_v1_stats/total_warmth');

let currentDisplayNum = 0;

function fetchOnce() {
    firebase.database().goOnline();
    statsRef.once('value').then(snap => {
        const total = snap.val() || 0;
        updateVisuals(total);
        const loader = document.getElementById('loading');
        if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 800);
        }
        setTimeout(() => firebase.database().goOffline(), 1000); // 抓完就斷開連線
    }).catch(() => firebase.database().goOffline());
}

fetchOnce();

function animN(id, from, to, dur) {
  const el = document.getElementById(id);
  if (!el || to === 0) { if(el) el.textContent = '0'; return; }
  const step = (to - from) / (dur / 16); 
  let cur = from;
  const t = setInterval(() => {
    cur = Math.min(cur + step, to); 
    el.textContent = Math.round(cur);
    if (cur >= to) clearInterval(t);
  }, 16);
}

function updateVisuals(total) {
  animN('total-warmth', currentDisplayNum, total, 1500);
  currentDisplayNum = total;

  let spriteCount = 10, bubbleCount = 12;
  if (total > 50) { spriteCount = 20; bubbleCount = 25; }
  if (total > 150) { spriteCount = 30; bubbleCount = 40; [span_9](start_span)} // 封頂 30 個精靈[span_9](end_span)
  
  spawnSprites(spriteCount);
  spawnCrystalBubbles(bubbleCount);
}
</script>
</body>
</html>
