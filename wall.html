<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>無量的光 · 守護之光</title>
<style>
:root {
  /* 極致清透背景 */
  --bg-gradient: linear-gradient(135deg, #FFFFFF 0%, #F9F9F9 100%);
  --glass-bg: rgba(255, 255, 255, 0.85);
  --glass-border: rgba(255, 255, 255, 0.98);
  --text-main: #58504A; 
  --text-light: #968E86;
  --accent-gold: #D4AF37; 
  --shadow-soft: 0 10px 40px rgba(160, 155, 150, 0.08);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0; padding: 0; width: 100%; height: 100dvh;
  background: var(--bg-gradient); color: var(--text-main);
  font-family: -apple-system, "PingFang TC", sans-serif;
  overflow: hidden; display: flex; flex-direction: column; align-items: center;
}

.top-nav { width: 100%; padding: max(15px, env(safe-area-inset-top)) 20px 10px; display: flex; justify-content: space-between; z-index: 100; position: absolute; top: 0;}
.nav-btn { display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 50%; background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); color: var(--text-main); box-shadow: var(--shadow-soft); cursor: pointer; transition: 0.2s; }
.nav-btn:active { transform: scale(0.92); }

/* 底部計數看板 */
.bottom-text {
  position: absolute; bottom: max(40px, env(safe-area-inset-bottom)); text-align: center; z-index: 100; background: rgba(255,255,255,0.9); padding: 18px 35px; border-radius: 35px; backdrop-filter: blur(25px); border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); animation: fadeUp 1.5s ease-out;
}
.bt-title { font-size: 0.85rem; letter-spacing: 5px; color: var(--text-light); margin-bottom: 8px; font-weight: 300;}
.bt-count { font-size: 1.3rem; font-weight: 300; letter-spacing: 2px; color: var(--text-main); display: flex; align-items: center; justify-content: center; gap: 10px;}
.bt-count span { font-weight: 400; color: var(--accent-gold); font-size: 2.2rem; text-shadow: 0 0 25px rgba(212,175,55,0.2);}

@keyframes fadeUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

/* 視覺容器 */
#visual-sea { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

/* 晶透氣泡層 */
#bubble-sea { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
.crystal-light {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9) 0%, rgba(212,175,55,0.1) 60%, transparent 100%);
  border: 0.5px solid rgba(255,255,255,0.2);
  animation: riseUp var(--d) linear infinite, wiggleX var(--w) ease-in-out infinite alternate, softFade var(--d) linear infinite;
  will-change: transform, opacity;
}

@keyframes riseUp { 0% { transform: translateY(110vh); } 100% { transform: translateY(-15vh); } }
@keyframes wiggleX { 0% { margin-left: -40px; } 100% { margin-left: 40px; } }
@keyframes softFade { 0%, 100% { opacity: 0; } 15%, 85% { opacity: 0.8; } }

/* 精靈層 */
#sprite-sea { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; }
.sprite-node {
  position: absolute; will-change: transform, opacity;
  animation: deepFloatY var(--dy) ease-in-out infinite alternate, 
             deepFloatX var(--dx) ease-in-out infinite alternate, 
             pulseBreathe var(--ds) ease-in-out infinite alternate;
}

@keyframes deepFloatY { 0% { transform: translateY(-80px); } 100% { transform: translateY(80px); } }
@keyframes deepFloatX { 0% { margin-left: -50px; } 100% { margin-left: 50px; } }
@keyframes pulseBreathe { 0% { transform: scale(0.65); opacity: 0.4; } 100% { transform: scale(1.4); opacity: 1; } }

#loading { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 0.9rem; letter-spacing: 5px; color: var(--text-light); z-index: 2000; background: var(--bg-gradient); transition: opacity 0.8s; }

/* 精靈大王專用 */
.king-treasure-wrap { position: absolute; width: 100%; height: 100%; animation: kingRotate 20s linear infinite; }
@keyframes kingRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">感受清透光芒中...</div>

<div class="top-nav">
  <div class="nav-btn" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="1.8"><polyline points="15 18 9 12 15 6"/></svg>
  </div>
</div>

<div id="visual-sea">
    <div id="bubble-sea"></div>
    <div id="sprite-sea"></div>
</div>

<div class="bottom-text">
  <div class="bt-title">一燈即無量</div>
  <div class="bt-count">累計有 <span id="total-warmth">0</span> 份善意發光</div>
</div>

<svg style="width:0;height:0;position:absolute;">
    <defs>
        <linearGradient id="facet-cyan" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.9"/><stop offset="100%" stop-color="#00838f" stop-opacity="0.5"/></linearGradient>
        <linearGradient id="rainbow-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="25%" stop-color="#e0f7fa" stop-opacity="0.7"/><stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6"/><stop offset="75%" stop-color="#fce4ec" stop-opacity="0.7"/><stop offset="100%" stop-color="#9c27b0" stop-opacity="0.4"/></linearGradient>
        <linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9" /><stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6" /><stop offset="100%" stop-color="#d4af37" stop-opacity="0.2" /></linearGradient>
    </defs>
</svg>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const spriteColors = ["#D1E4EE", "#E8F0E1", "#E1D5E7", "#FDF5D3"];
let currentDisplayNum = 0;

// 寶物 SVG
const treasures = {
    sword: `<g transform="scale(0.4) translate(-50,-75)"><polygon points="50,10 56,40 50,105 44,40" fill="#fff" opacity="0.8"/><circle cx="50" cy="105" r="4" fill="#D4AF37"/></g>`,
    vase: `<g transform="scale(0.4) translate(-50,-75)"><path d="M40,20 H60 V40 H40 Z M40,40 L25,90 H75 L60,40 Z" fill="#D4AF37" opacity="0.7"/></g>`,
    jewel: `<g transform="scale(0.4) translate(-50,-75)"><polygon points="50,10 80,40 50,55 20,40" fill="#fff" opacity="0.9"/></g>`,
    net: `<circle cx="0" cy="0" r="120" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-dasharray="5,5" opacity="0.3"/>`
};

function hideLoader() {
    const loader = document.getElementById('loading');
    if (loader && loader.style.display !== 'none') {
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none'; }, 800);
    }
}

// ✨ 強制防卡死超時鎖
setTimeout(() => {
    if (currentDisplayNum === 0) {
        console.warn("Loading too long, triggering default view");
        updateVisuals(0); 
        hideLoader();
    }
}, 3500);

function getKingSVG(total) {
    let bodyFill = "url(#pure-glass)";
    let treasureContent = "";
    if (total >= 100000) {
        bodyFill = "url(#rainbow-glass)";
        treasureContent = `${treasures.net}<g class="king-treasure-wrap"><g transform="translate(140, 0)">${treasures.jewel}</g><g transform="translate(-140, 0)">${treasures.vase}</g><g transform="translate(0, 140)">${treasures.sword}</g></g>`;
    } else if (total >= 10000) {
        bodyFill = "url(#rainbow-glass)";
        treasureContent = `<g class="king-treasure-wrap"><g transform="translate(130, 0)">${treasures.jewel}</g></g>`;
    } else if (total >= 1000) {
        treasureContent = `<g class="king-treasure-wrap"><g transform="translate(120, 0)">${treasures.sword}</g><g transform="translate(-120, 0)">${treasures.vase}</g></g>`;
    } else if (total >= 500) {
        treasureContent = `<g class="king-treasure-wrap"><g transform="translate(110, 0)">${treasures.sword}</g></g>`;
    }
    return `<svg viewBox="-150 -150 300 300" width="100%" height="100%" overflow="visible">${treasureContent}<path d="M -40 40 C -70 40, -65 -10, -40 -30 C -20 -50, 20 -50, 40 -30 C 65 -10, 70 40, 40 40 C 20 40, 30 55, 0 55 C -30 55, -20 40, -40 40 Z" fill="${bodyFill}" /><circle cx="-15" cy="-15" r="4" fill="#8C7A6B" opacity="0.8"/><circle cx="15" cy="-15" r="4" fill="#8C7A6B" opacity="0.8"/><ellipse cx="-25" cy="-5" rx="8" ry="4" fill="#D1A299" opacity="0.6"/><ellipse cx="25" cy="-5" rx="8" ry="4" fill="#D1A299" opacity="0.6"/></svg>`;
}

function spawnSprites(count) {
    const sea = document.getElementById('sprite-sea');
    const limitedCount = Math.min(count, 25);
    sea.innerHTML = ''; 
    for (let i = 0; i < limitedCount; i++) {
        const node = document.createElement('div');
        node.className = 'sprite-node';
        node.innerHTML = `<svg viewBox="35 15 130 140" width="100%" height="100%"><path d="M 60 140 C 40 140, 45 90, 70 70 C 90 50, 110 50, 130 70 C 155 90, 160 140, 140 140 C 120 140, 130 150, 100 150 C 70 150, 80 140, 60 140 Z" fill="${spriteColors[i%4]}" opacity="0.8"/></svg>`;
        const size = Math.random() * 60 + 70;
        node.style.cssText = `width:${size}px; height:${size}px; left:${Math.random()*80}vw; top:${Math.random()*60+10}vh; --dy:${Math.random()*10+8}s; --dx:${Math.random()*12+10}s; --ds:${Math.random()*6+5}s; animation-delay:-${Math.random()*20}s;`;
        sea.appendChild(node);
    }
}

function spawnBubbles(count) {
    const sea = document.getElementById('bubble-sea');
    sea.innerHTML = '';
    for (let i = 0; i < count; i++) {
        const b = document.createElement('div');
        b.className = 'crystal-light';
        const size = Math.random() * 45 + 10;
        b.style.cssText = `width:${size}px; height:${size}px; left:${Math.random()*100}vw; --d:${Math.random()*15+15}s; --w:${Math.random()*10+10}s; animation-delay:-${Math.random()*30}s;`;
        sea.appendChild(b);
    }
}

function spawnKing(total) {
    if (total < 500) return;
    const sea = document.getElementById('sprite-sea');
    const king = document.createElement('div');
    king.className = 'sprite-node';
    king.style.cssText = `width:260px; height:260px; left:50%; top:45%; transform:translate(-50%,-50%); z-index:100; --dy:12s; --dx:15s; --ds:8s;`;
    king.innerHTML = getKingSVG(total);
    sea.appendChild(king);
}

function animN(id, from, to, dur) {
    const el = document.getElementById(id);
    if (!el) return;
    if (to === 0) { el.textContent = '0'; return; }
    const step = (to - from) / (dur / 16); 
    let cur = from;
    const t = setInterval(() => {
        cur = Math.min(cur + step, to); 
        el.textContent = Math.round(cur).toLocaleString();
        if (cur >= to) clearInterval(t);
    }, 16);
}

function updateVisuals(total) {
    animN('total-warmth', currentDisplayNum, total, 1500);
    currentDisplayNum = total;
    spawnSprites(Math.min(10 + total/10, 25));
    spawnBubbles(Math.min(15 + total/5, 40));
    spawnKing(total);
}

// Firebase 邏輯
const fbCfg = {
  apiKey: "AIzaSyDMIkS0XPIR98U8LkOjdio5ygh20eMfTr0", 
  authDomain: "pure-land-light.firebaseapp.com",
  databaseURL: "https://pure-land-light-default-rtdb.firebaseio.com",
  projectId: "pure-land-light"
};

function startFetch() {
    try {
        if (!firebase.apps.length) firebase.initializeApp(fbCfg);
        const db = firebase.database();
        const statsRef = db.ref('lights_v1_stats/total_warmth');
        
        firebase.database().goOnline();
        statsRef.once('value').then(snap => {
            const total = 10000;
            updateVisuals(total);
            hideLoader();
            setTimeout(() => firebase.database().goOffline(), 1000);
        }).catch(e => {
            console.error(e);
            hideLoader();
        });
    } catch(err) {
        console.error(err);
        hideLoader();
    }
}

// 併行啟動驗證與數據抓取
firebase.auth().signInAnonymously().finally(() => startFetch());
</script>
</body>
</html>
