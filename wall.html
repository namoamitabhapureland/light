<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>無量的光 · 守護之光</title>
<style>
:root {
  --bg-gradient: linear-gradient(135deg, #FDFDFD, #F5F2EF);
  --glass-bg: rgba(255, 255, 255, 0.65);
  --glass-border: rgba(255, 255, 255, 0.9);
  --text-main: #58504A; 
  --text-light: #968E86;
  --shadow-soft: 0 10px 40px rgba(160, 155, 150, 0.12);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0; width: 100%; height: 100dvh;
  background: var(--bg-gradient); color: var(--text-main);
  font-family: -apple-system, "PingFang TC", sans-serif;
  overflow: hidden; display: flex; flex-direction: column; align-items: center;
}

/* 頂部返回導航 */
.top-nav { width: 100%; padding: max(15px, env(safe-area-inset-top)) 20px 10px; display: flex; justify-content: space-between; z-index: 10; position: absolute; top: 0;}
.nav-btn { display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 50%; background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); color: var(--text-main); box-shadow: var(--shadow-soft); cursor: pointer; transition: 0.2s; }
.nav-btn:active { transform: scale(0.92); }
.nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;}

/* 核心守護精靈與光暈區 */
.guardian-container {
  flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
  position: relative; width: 100%;
}

/* 背景光暈 (會隨數據變色、變大) */
.aura {
  position: absolute; width: 250px; height: 250px; border-radius: 50%;
  background: radial-gradient(circle, rgba(138,172,189,0.4) 0%, transparent 70%);
  transition: all 2s ease-in-out;
  animation: breatheAura 5s infinite alternate ease-in-out;
  z-index: 1;
}
@keyframes breatheAura {
  0% { transform: scale(0.9); opacity: 0.7; }
  100% { transform: scale(1.2); opacity: 1; }
}

/* 漂浮的小精靈 */
.sprite-wrapper {
  z-index: 2; width: 180px; height: 180px;
  animation: floatSprite 4s infinite ease-in-out;
  filter: drop-shadow(0 15px 25px rgba(203,163,122,0.15));
}
@keyframes floatSprite {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

/* 底部靜謐文字 */
.bottom-text {
  position: absolute; bottom: max(40px, env(safe-area-inset-bottom));
  text-align: center; z-index: 10;
  animation: fadeUp 1.5s ease-out;
}
.bt-title { font-size: 0.8rem; letter-spacing: 4px; color: var(--text-light); margin-bottom: 12px; font-weight: 300;}
.bt-count { font-size: 1.5rem; font-weight: 300; letter-spacing: 2px; color: var(--text-main); display: flex; align-items: center; justify-content: center; gap: 8px;}
.bt-count span { font-weight: 400; color: #CBA37A; font-size: 2rem; text-shadow: 0 0 15px rgba(203,163,122,0.3);}

@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* 讀取中的遮罩 */
#loading { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 0.85rem; letter-spacing: 3px; color: var(--text-light); z-index: 20; background: var(--bg-gradient); transition: opacity 0.8s; }
</style>
</head>
<body>

<div id="loading">感受光芒中...</div>

<div class="top-nav">
  <div class="nav-btn" onclick="history.back() || (window.location.href='index.html')">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </div>
</div>

<div class="guardian-container">
  <div class="aura" id="aura"></div>
  
  <div class="sprite-wrapper">
    <svg viewBox="35 15 130 140" style="width:100%; height:100%;" overflow="visible">
        <path d="M 75 55 L 80 25 L 90 40 L 100 20 L 110 40 L 120 25 L 125 55 Z" fill="rgba(212,175,55,0.4)" stroke="#D4AF37" stroke-width="2.5" stroke-linejoin="round"/>
        <circle cx="80" cy="25" r="3" fill="#D4AF37"/>
        <circle cx="100" cy="20" r="3.5" fill="#D4AF37"/>
        <circle cx="120" cy="25" r="3" fill="#D4AF37"/>
        <circle cx="100" cy="38" r="2" fill="#D4AF37"/>
        
        <path d="M 60 140 C 40 140, 45 90, 70 70 C 90 50, 110 50, 130 70 C 155 90, 160 140, 140 140 C 120 140, 130 150, 100 150 C 70 150, 80 140, 60 140 Z" fill="#FDF5D3" />
        
        <path d="M 80 85 Q 85 88 90 85" fill="none" stroke="#8C7A6B" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 110 85 Q 115 88 120 85" fill="none" stroke="#8C7A6B" stroke-width="2.5" stroke-linecap="round"/>
        
        <ellipse cx="70" cy="95" rx="8" ry="4" fill="#D1A299" opacity="0.6"/>
        <ellipse cx="130" cy="95" rx="8" ry="4" fill="#D1A299" opacity="0.6"/>
    </svg>
  </div>
</div>

<div class="bottom-text">
  <div class="bt-title">一燈即無量</div>
  <div class="bt-count">此刻，有 <span id="total-warmth">0</span> 份善意發光</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// --- Firebase 連線 ---
const fbCfg = {
  apiKey: "AIzaSyDMIkS0XPIR98U8LkOjdio5ygh20eMfTr0", 
  authDomain: "pure-land-light.firebaseapp.com",
  databaseURL: "https://pure-land-light-default-rtdb.firebaseio.com",
  projectId: "pure-land-light"
};
if (!firebase.apps.length) firebase.initializeApp(fbCfg);
const db = firebase.database();
const lightsRef = db.ref('lights_v1');

// 讀取全站溫暖總數 (發文 + 點燈 + 回覆)
lightsRef.on('value', snap => {
  const data = snap.val() || {};
  let total = 0;
  
  Object.values(data).forEach(p => {
    total += 1; // 1篇發文算1份善意
    total += (p.lights || 0); // 點燈數
    if (p.resps) {
      total += Object.keys(p.resps).length; // 回覆數
    }
  });

  updateVisuals(total);
  
  // 隱藏讀取畫面
  const loader = document.getElementById('loading');
  loader.style.opacity = '0';
  setTimeout(() => loader.style.display = 'none', 800);
});

// 數字跳動動畫
function animN(id, from, to, dur) {
  const el = document.getElementById(id);
  if (!el || to === 0) { if(el) el.textContent = '0'; return; }
  const step = (to - from) / (dur / 16); 
  let cur = from;
  const t = setInterval(() => {
    cur = Math.min(cur + step, to); 
    el.textContent = Math.round(cur);
    if (cur >= to) clearInterval(t);
  }, 16);
}

let currentDisplayNum = 0;

// 根據溫暖總數，改變光暈顏色與大小
function updateVisuals(total) {
  animN('total-warmth', currentDisplayNum, total, 1500);
  currentDisplayNum = total;

  const aura = document.getElementById('aura');
  
  if (total <= 50) {
    // 微光青
    aura.style.background = 'radial-gradient(circle, rgba(138,172,189,0.3) 0%, transparent 65%)';
    aura.style.width = '250px'; aura.style.height = '250px';
  } else if (total <= 150) {
    // 琉璃紫
    aura.style.background = 'radial-gradient(circle, rgba(207,164,164,0.35) 0%, transparent 70%)';
    aura.style.width = '320px'; aura.style.height = '320px';
  } else {
    // 無量金
    aura.style.background = 'radial-gradient(circle, rgba(212,175,55,0.25) 0%, rgba(203,163,122,0.15) 40%, transparent 75%)';
    aura.style.width = '400px'; aura.style.height = '400px';
  }
}
</script>
</body>
</html>
