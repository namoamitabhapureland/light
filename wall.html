<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>無量的光 · 守護之光</title>
<style>
:root {
  /* 極致淨白清透背景 */
  --bg-gradient: linear-gradient(135deg, #FFFFFF 0%, #F9F8F7 100%);
  --glass-bg: rgba(255, 255, 255, 0.8);
  --glass-border: rgba(255, 255, 255, 0.98);
  --text-main: #58504A; 
  --text-light: #968E86;
  --accent-gold: #D4AF37; 
  --shadow-soft: 0 10px 40px rgba(160, 155, 150, 0.08);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0; width: 100%; height: 100dvh;
  background: var(--bg-gradient); color: var(--text-main);
  font-family: -apple-system, "PingFang TC", sans-serif;
  overflow: hidden; display: flex; flex-direction: column; align-items: center;
}

.top-nav { width: 100%; padding: max(15px, env(safe-area-inset-top)) 20px 10px; display: flex; justify-content: space-between; z-index: 1000; position: absolute; top: 0;}
.nav-btn { display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 50%; background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); color: var(--text-main); box-shadow: var(--shadow-soft); cursor: pointer; transition: 0.2s; }

/* 底部看板：毛玻璃效果 */
.bottom-text {
  position: absolute; bottom: max(40px, env(safe-area-inset-bottom)); text-align: center; z-index: 1000; background: rgba(255,255,255,0.9); padding: 20px 35px; border-radius: 40px; backdrop-filter: blur(25px); border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); animation: fadeUp 1.2s ease-out;
}
.bt-title { font-size: 0.85rem; letter-spacing: 5px; color: var(--text-light); margin-bottom: 8px; font-weight: 300;}
.bt-count { font-size: 1.3rem; font-weight: 300; letter-spacing: 2px; color: var(--text-main); display: flex; align-items: center; justify-content: center; gap: 10px;}
.bt-count span { font-weight: 400; color: var(--accent-gold); font-size: 2.2rem; text-shadow: 0 0 25px rgba(212,175,55,0.2);}

@keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

/* 視覺容器 */
#visual-sea { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
#bubble-sea { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
.crystal-light {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9) 0%, rgba(212,175,55,0.1) 60%, transparent 100%);
  border: 0.5px solid rgba(255,255,255,0.2);
  animation: riseUp var(--d) linear infinite, wiggleX var(--w) ease-in-out infinite alternate, softFade var(--d) linear infinite;
  will-change: transform, opacity;
}

@keyframes riseUp { 0% { transform: translateY(110vh); } 100% { transform: translateY(-15vh); } }
@keyframes wiggleX { 0% { margin-left: -45px; } 100% { margin-left: 45px; } }
@keyframes softFade { 0%, 100% { opacity: 0; } 15%, 85% { opacity: 0.8; } }

#sprite-sea { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; }
.sprite-node {
  position: absolute; will-change: transform, opacity;
  animation: deepFloatY var(--dy) ease-in-out infinite alternate, 
             deepFloatX var(--dx) ease-in-out infinite alternate, 
             pulseBreathe var(--ds) ease-in-out infinite alternate;
}

/* 加強精靈動作幅度 */
@keyframes deepFloatY { 0% { transform: translateY(-80px); } 100% { transform: translateY(80px); } }
@keyframes deepFloatX { 0% { margin-left: -50px; } 100% { margin-left: 50px; } }
@keyframes pulseBreathe { 0% { transform: scale(0.65); opacity: 0.45; } 100% { transform: scale(1.4); opacity: 1; } }

/* 寶物專用旋轉 */
.king-treasure-wrap { position: absolute; width: 100%; height: 100%; animation: kingRotate 25s linear infinite; }
@keyframes kingRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

#loading { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 0.95rem; letter-spacing: 6px; color: var(--text-light); z-index: 5000; background: #FFF; transition: opacity 0.6s; }
</style>
</head>
<body>

<div id="loading">感受無量光芒中...</div>

<div class="top-nav">
  <div class="nav-btn" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="1.8"><polyline points="15 18 9 12 15 6"/></svg>
  </div>
</div>

<div id="visual-sea">
    <div id="bubble-sea"></div>
    <div id="sprite-sea"></div>
</div>

<div class="bottom-text">
  <div class="bt-title">一燈即無量</div>
  <div class="bt-count">累計有 <span id="total-warmth">0</span> 份善意發光</div>
</div>

<svg style="width:0;height:0;position:absolute;">
    <defs>
        <linearGradient id="facet-cyan" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E0F7FA" stop-opacity="0.95"/><stop offset="100%" stop-color="#00838F" stop-opacity="0.6"/></linearGradient>
        <linearGradient id="facet-gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFF8E1" stop-opacity="0.95"/><stop offset="100%" stop-color="#D4AF37" stop-opacity="0.7"/></linearGradient>
        <linearGradient id="facet-rose" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFF0F5" stop-opacity="0.95"/><stop offset="100%" stop-color="#C2185B" stop-opacity="0.6"/></linearGradient>
        <linearGradient id="rainbow-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="25%" stop-color="#E0F7FA" stop-opacity="0.7"/><stop offset="50%" stop-color="#FFFDE7" stop-opacity="0.6"/><stop offset="75%" stop-color="#FCE4EC" stop-opacity="0.7"/><stop offset="100%" stop-color="#9c27b0" stop-opacity="0.4"/></linearGradient>
        <linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9" /><stop offset="50%" stop-color="#FFFDE7" stop-opacity="0.6" /><stop offset="100%" stop-color="#D4AF37" stop-opacity="0.2" /></linearGradient>
        <filter id="宝物光暈" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
    </defs>
</svg>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const spriteColors = ["#D1E4EE", "#E8F0E1", "#E1D5E7", "#FDF5D3"];
let currentDisplayNum = 0;

// ✨ 採用多寶閣美學的彩色寶物
const treasures = {
    sword: `<g transform="translate(0,-60) scale(0.65)"><polygon points="50,10 56,40 50,105 44,40" fill="#fff" filter="url(#宝物光暈)"/><polygon points="50,10 56,40 50,105" fill="url(#facet-cyan)" opacity="0.8"/><polygon points="50,10 44,40 50,105" fill="#f3e5ab" opacity="0.6"/><circle cx="50" cy="105" r="5" fill="#fff" filter="drop-shadow(0 0 10px #D4AF37)"/></g>`,
    vase: `<g transform="translate(0,-60) scale(0.65)"><polygon points="40,40 60,40 75,90 25,90" fill="url(#facet-gold)" filter="url(#宝物光暈)" stroke="#fff" stroke-width="1.5"/><polygon points="25,90 75,90 60,120 40,120" fill="#f3e5ab" opacity="0.8"/></g>`,
    jewel: `<g transform="translate(0,-60) scale(0.65)"><polygon points="50,10 80,40 50,55 20,40" fill="url(#facet-rose)" filter="url(#宝物光暈)" stroke="#fff" stroke-width="1.5"/><polygon points="20,40 50,55 50,100" fill="#f3e5ab" opacity="0.8"/></g>`,
    net: `<circle cx="0" cy="0" r="150" fill="none" stroke="url(#rainbow-glass)" stroke-width="0.8" stroke-dasharray="10 6" opacity="0.35"><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="45s" repeatCount="indefinite"/></circle>`
};

function hideLoader() {
    const loader = document.getElementById('loading');
    if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none'; }, 600);
    }
}

function getKingSVG(total) {
    let bodyFill = "url(#pure-glass)";
    let treasureContent = "";
    
    if (total >= 100000) {
        bodyFill = "url(#rainbow-glass)";
        treasureContent = `${treasures.net}<g class="king-treasure-wrap"><g transform="translate(170, 0)">${treasures.jewel}</g><g transform="translate(-170, 0)">${treasures.vase}</g><g transform="translate(0, 170)">${treasures.sword}</g></g>`;
    } else if (total >= 10000) {
        bodyFill = "url(#rainbow-glass)";
        treasureContent = `<g class="king-treasure-wrap"><g transform="translate(150, 0)">${treasures.jewel}</g></g>`;
    } else if (total >= 1000) {
        treasureContent = `<g class="king-treasure-wrap"><g transform="translate(140, 0)">${treasures.sword}</g><g transform="translate(-140, 0)">${treasures.vase}</g></g>`;
    } else if (total >= 500) {
        treasureContent = `<g class="king-treasure-wrap"><g transform="translate(130, 0)">${treasures.sword}</g></g>`;
    }

    return `
    <svg viewBox="-220 -220 440 440" width="100%" height="100%" overflow="visible">
        ${treasureContent}
        <path d="M -40 40 C -70 40, -65 -10, -40 -30 C -20 -50, 20 -50, 40 -30 C 65 -10, 70 40, 40 40 C 20 40, 30 55, 0 55 C -30 55, -20 40, -40 40 Z" fill="${bodyFill}" opacity="0.95" />
        <path d="M -22 -18 Q -15 -21 -8 -18" fill="none" stroke="#58504A" stroke-width="4.5" stroke-linecap="round"/>
        <path d="M 8 -18 Q 15 -21 22 -18" fill="none" stroke="#58504A" stroke-width="4.5" stroke-linecap="round"/>
        <ellipse cx="-28" cy="2" rx="10" ry="5" fill="#D1A299" opacity="0.6"/>
        <ellipse cx="28" cy="2" rx="10" ry="5" fill="#D1A299" opacity="0.6"/>
    </svg>`;
}

function generateSpriteSVG(color) {
    return `
    <svg viewBox="35 15 130 140" width="100%" height="100%" overflow="visible">
        <path d="M 60 140 C 40 140, 45 90, 70 70 C 90 50, 110 50, 130 70 C 155 90, 160 140, 140 140 C 120 140, 130 150, 100 150 C 70 150, 80 140, 60 140 Z" fill="${color}" opacity="0.9" />
        <path d="M 85 85 Q 90 88 95 85" fill="none" stroke="#8C7A6B" stroke-width="2.8" stroke-linecap="round"/>
        <path d="M 105 85 Q 110 88 115 85" fill="none" stroke="#8C7A6B" stroke-width="2.8" stroke-linecap="round"/>
        <ellipse cx="70" cy="95" rx="8" ry="4" fill="#D1A299" opacity="0.6"/>
        <ellipse cx="130" cy="95" rx="8" ry="4" fill="#D1A299" opacity="0.6"/>
    </svg>`;
}

function spawnSprites(count) {
    const sea = document.getElementById('sprite-sea');
    const limitedCount = Math.min(count, 25);
    sea.innerHTML = ''; 
    for (let i = 0; i < limitedCount; i++) {
        const node = document.createElement('div');
        node.className = 'sprite-node';
        node.innerHTML = generateSpriteSVG(spriteColors[i%4]);
        const size = Math.random() * 60 + 70;
        node.style.cssText = `width:${size}px; height:${size}px; left:${Math.random()*82}vw; top:${Math.random()*65+10}vh; --dy:${Math.random()*10+8}s; --dx:${Math.random()*12+10}s; --ds:${Math.random()*6+5}s; animation-delay:-${Math.random()*20}s;`;
        sea.appendChild(node);
    }
}

function spawnKing(total) {
    if (total < 500) return;
    const sea = document.getElementById('sprite-sea');
    const king = document.createElement('div');
    king.className = 'sprite-node';
    // ✨ 大精靈王尺寸：特別大 (320px)
    king.style.cssText = `width:320px; height:320px; left:50%; top:45%; transform:translate(-50%,-50%); z-index:100; --dy:12s; --dx:15s; --ds:10s;`;
    king.innerHTML = getKingSVG(total);
    sea.appendChild(king);
}

function animN(id, from, to, dur) {
    const el = document.getElementById(id);
    if (!el) return;
    if (to === 0) { el.textContent = '0'; return; }
    const step = (to - from) / (dur / 16); 
    let cur = from;
    const t = setInterval(() => {
        cur = Math.min(cur + step, to); 
        el.textContent = Math.round(cur).toLocaleString();
        if (cur >= to) clearInterval(t);
    }, 16);
}

function updateVisuals(total) {
    animN('total-warmth', currentDisplayNum, total, 1500);
    currentDisplayNum = total;
    spawnSprites(Math.min(10 + total/15, 25));
    spawnKing(total);
    // 氣泡生成
    const bSea = document.getElementById('bubble-sea'); bSea.innerHTML = '';
    for(let i=0; i<35; i++){
        const b = document.createElement('div'); b.className = 'crystal-light';
        const s = Math.random()*45+10;
        b.style.cssText = `width:${s}px; height:${s}px; left:${Math.random()*100}vw; --d:${Math.random()*15+15}s; --w:${Math.random()*10+10}s; animation-delay:-${Math.random()*30}s;`;
        bSea.appendChild(b);
    }
}

// ✨ 強效防卡死：不論網路如何，2.5秒內一定關閉 Loading
setTimeout(() => {
    if (document.getElementById('loading').style.display !== 'none') {
        updateVisuals(100000); // 測試用數值
        hideLoader();
    }
}, 2500);

const fbCfg = {
  apiKey: "AIzaSyDMIkS0XPIR98U8LkOjdio5ygh20eMfTr0", 
  authDomain: "pure-land-light.firebaseapp.com",
  databaseURL: "https://pure-land-light-default-rtdb.firebaseio.com",
  projectId: "pure-land-light"
};

function fetchOnce() {
    try {
        if (!firebase.apps.length) firebase.initializeApp(fbCfg);
        const db = firebase.database();
        const statsRef = db.ref('lights_v1_stats/total_warmth');
        firebase.database().goOnline();
        statsRef.once('value').then(snap => {
            // ✨ 測試模式：暫時設為 100,000 以觀察彩色大王與寶物
            const total = 100000; 
            // 💡 若要恢復真實數據，請將上一行註解，並取消下方註解：
            // const total = snap.val() || 0; 
            
            updateVisuals(total);
            hideLoader();
            setTimeout(() => firebase.database().goOffline(), 1000);
        }).catch(() => hideLoader());
    } catch(e) { hideLoader(); }
}

firebase.auth().signInAnonymously().finally(() => fetchOnce());
</script>
</body>
</html>
