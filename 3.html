<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0a0a0c; display: flex; flex-direction: column; align-items: center; padding: 20px; color: white; font-family: sans-serif; }
        .planet-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 600px;
            margin-top: 20px;
        }
        .planet-card {
            border: 1px solid #333;
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            background: #151518;
        }
        .icon { width: 60px; height: 60px; margin: 0 auto; }
    </style>
</head>
<body>
    <h2>九星連珠視覺示範</h2>
    <div class="planet-grid" id="container"></div>

    <script>
        // 模擬你的 getManiSVG 函數 (這裡用圓形代表星球)
        function getManiSVG(tier) {
            const colors = ["#4A90E2", "#F5A623", "#7ED321", "#D0021B", "#BD10E0", "#50E3C2", "#9013FE", "#4A4A4A", "#F8E71C"];
            return `<div style="width:100%; height:100%; border-radius:50%; background:${colors[tier-1]}; box-shadow: 0 0 15px ${colors[tier-1]}"></div>`;
        }

        const container = document.getElementById('container');
        for (let i = 1; i <= 9; i++) {
            const card = document.createElement('div');
            card.className = 'planet-card';
            card.innerHTML = `
                <div class="icon">${getManiSVG(i)}</div>
                <p>第 ${i} 階</p>
            `;
            container.appendChild(card);
        }
    </script>
</body>
</html>
