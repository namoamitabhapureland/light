
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無量的光 · 專屬圖示下載器</title>
<style>
  body {
    background: linear-gradient(135deg, #FDFDFD, #F5F2EF);
    font-family: -apple-system, "PingFang TC", sans-serif;
    text-align: center;
    padding: 40px 20px;
    color: #58504A;
  }
  h2 { letter-spacing: 4px; font-weight: 300; }
  p { color: #968E86; letter-spacing: 1px; font-size: 0.9rem; margin-bottom: 40px; }
  .grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    max-width: 900px;
    margin: 0 auto;
  }
  .card {
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.9);
    padding: 30px;
    border-radius: 24px;
    box-shadow: 0 10px 40px rgba(160, 155, 150, 0.12);
    width: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .icon-preview {
    width: 120px;
    height: 120px;
    margin-bottom: 15px;
    filter: drop-shadow(0 10px 15px rgba(203,163,122,0.15));
  }
  .card h3 {
    font-size: 1rem;
    letter-spacing: 2px;
    margin: 10px 0 20px;
    color: #58504A;
  }
  button {
    background: #CBA37A;
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 0.85rem;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(203, 163, 122, 0.25);
    transition: 0.2s;
  }
  button:active { transform: scale(0.95); }
</style>
</head>
<body>

  <h2>無量的光 · 專屬圖示下載器</h2>
  <p>點擊按鈕，即可將純代碼繪製的精靈下載為 512x512 高清透明 PNG</p>

  <div class="grid" id="grid"></div>

<script>
// 這就是我們剛才寫的共用 SVG 產生器！
// 加上了 xmlns 屬性，這樣 Canvas 才能正確讀取並轉換成圖片
function getSpriteSVG(tier) {
    const config = {
        1: { body: "#D1E4EE", crown: "" }, 
        2: { body: "#E8F0E1", crown: `<path d="M 85 55 L 90 40 L 100 48 L 110 40 L 115 55 Z" fill="none" stroke="#8AACBD" stroke-width="2.5" stroke-linejoin="round"/><circle cx="90" cy="40" r="2" fill="#8AACBD"/><circle cx="100" cy="48" r="2" fill="#8AACBD"/><circle cx="110" cy="40" r="2" fill="#8AACBD"/>` }, 
        3: { body: "#E1D5E7", crown: `<path d="M 80 55 L 85 35 L 100 45 L 115 35 L 120 55 Z" fill="rgba(179,157,219,0.3)" stroke="#B39DDB" stroke-width="2.5" stroke-linejoin="round"/><circle cx="85" cy="35" r="2.5" fill="#B39DDB"/><circle cx="100" cy="45" r="2.5" fill="#B39DDB"/><circle cx="115" cy="35" r="2.5" fill="#B39DDB"/>` }, 
        4: { body: "#FDF5D3", crown: `<path d="M 75 55 L 80 25 L 90 40 L 100 20 L 110 40 L 120 25 L 125 55 Z" fill="rgba(212,175,55,0.4)" stroke="#D4AF37" stroke-width="2.5" stroke-linejoin="round"/><circle cx="80" cy="25" r="3" fill="#D4AF37"/><circle cx="100" cy="20" r="3.5" fill="#D4AF37"/><circle cx="120" cy="25" r="3" fill="#D4AF37"/><circle cx="100" cy="38" r="2" fill="#D4AF37"/>` } 
    };
    const c = config[tier];
    
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="35 15 130 140" width="512" height="512">
        ${c.crown}
        <path d="M 60 140 C 40 140, 45 90, 70 70 C 90 50, 110 50, 130 70 C 155 90, 160 140, 140 140 C 120 140, 130 150, 100 150 C 70 150, 80 140, 60 140 Z" fill="${c.body}" />
        <circle cx="85" cy="85" r="4.5" fill="#8C7A6B" opacity="0.8"/>
        <circle cx="115" cy="85" r="4.5" fill="#8C7A6B" opacity="0.8"/>
        <ellipse cx="70" cy="95" rx="8" ry="4" fill="#D1A299" opacity="0.6"/>
        <ellipse cx="130" cy="95" rx="8" ry="4" fill="#D1A299" opacity="0.6"/>
    </svg>`;
}

const titles = ["初心精靈", "微光青冠", "琉璃紫冠", "無量金冠"];
const grid = document.getElementById('grid');

// 動態產生四個下載卡片
for (let i = 1; i <= 4; i++) {
    const div = document.createElement('div');
    div.className = 'card';
    
    // 預覽用的 SVG (縮小版)
    const previewSvg = getSpriteSVG(i).replace('width="512" height="512"', 'width="100%" height="100%"');
    
    div.innerHTML = `
        <div class="icon-preview">${previewSvg}</div>
        <h3>${titles[i-1]}</h3>
        <button onclick="downloadPNG(${i}, '${titles[i-1]}')">下載 PNG</button>
    `;
    grid.appendChild(div);
}

// 將 SVG 轉換為 PNG 並觸發下載的函數
function downloadPNG(tier, name) {
    const svgString = getSpriteSVG(tier);
    
    // 建立畫布
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');
    
    // 建立圖片並載入 SVG 資料
    const img = new Image();
    const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    
    img.onload = function() {
        // 將圖片畫到 Canvas 上
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        
        // 將 Canvas 轉成 PNG 的 Base64 連結
        const pngUrl = canvas.toDataURL('image/png');
        
        // 觸發自動下載
        const a = document.createElement('a');
        a.download = `無量的光_圖示_${name}.png`;
        a.href = pngUrl;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    };
    img.src = url;
}
</script>
</body>
</html>
