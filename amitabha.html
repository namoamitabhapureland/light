<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <link rel="manifest" href="manifest.json">
            <meta name="theme-color" content="#010103">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>彌陀淨土 ‧ 莊嚴琉璃金身與星空法界</title>
    <style>
        :root {
            --bg-deep: #010103; 
            --gold-light: #f3e5ab; 
            --gold-solid: #d4af37; 
            --cyan: #8ba89c; 
        }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; outline: none; }

html { 
    background-color: var(--bg-deep); 
    width: 100%; 
    height: 100%; 
}

body { 
    background: radial-gradient(circle at 50% 50%, #16110a 0%, var(--bg-deep) 100%); 
    font-family: "PingFang TC", "Microsoft JhengHei", serif;
    overflow: hidden; touch-action: none; width: 100vw; height: 100dvh;
    display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff;
    transition: background 2s ease;
}
        /* 背景畫布 */
        canvas { position: absolute; inset: 0; }
        #starCanvas { z-index: 1; pointer-events: none; transition: filter 2s ease; }
        #waterCanvas { z-index: 2; mix-blend-mode: screen; opacity: 0.6; pointer-events: none; transition: opacity 2s ease; }
        
        /* ================= 頂部導航與資訊列 (徹底修復擠壓跑版問題) ================= */
        /* 1. 左上導航：移除 max-width，強制同行不換行，微調間距完美適配手機 */
        .nav-top { position: absolute; top: max(20px, env(safe-area-inset-top)); left: 15px; z-index: 1000; display: flex; flex-wrap: nowrap; gap: 6px; }
        
        .nav-btn { 
            color: var(--gold-light); display: flex; align-items: center; gap: 6px; 
            cursor: pointer; background: rgba(0,0,0,0.3); padding: 6px 12px; 
            border-radius: 20px; border: 1px solid rgba(212,175,55,0.2); 
            backdrop-filter: blur(5px); font-size: 0.75rem; letter-spacing: 1px; 
            transition: 0.4s; opacity: 0.7; white-space: nowrap; flex-shrink: 0; 
        }
        .nav-btn:hover { opacity: 1; border-color: var(--gold-solid); }

        /* 2. 華藏月相專屬：高清 SVG 參數與流光底層化 (確保不被遮擋、不變形) */
        .lunar-icon { width: 26px; height: 26px; min-width: 26px; flex-shrink: 0; animation: slowSpin 20s linear infinite; filter: drop-shadow(0 0 6px rgba(243,229,171,0.6)); display: block; }
        @keyframes slowSpin { 100% { transform: rotate(360deg); } }

        .lunar-sweep-btn { position: relative; overflow: hidden; isolation: isolate; }
        .lunar-sweep-btn::after {
            content: ''; position: absolute; top: -50%; left: -150%; width: 50%; height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(243,229,171,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(30deg); animation: sweep-light 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            z-index: -1; pointer-events: none;
        }
        @keyframes sweep-light { 0% { left: -100%; } 15% { left: 200%; } 100% { left: 200%; } }

        /* 3. 右上資訊列：移除 max-width，保護修持天數不被切斷 */
        .info-top { position: absolute; top: max(20px, env(safe-area-inset-top)); right: 15px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        .info-row { display: flex; gap: 8px; align-items: center; }
        
        .streak-text { font-size: clamp(0.65rem, 2vw, 0.75rem); color: var(--gold-light); letter-spacing: 1px; opacity: 0.9; text-shadow: 0 0 5px rgba(212,175,55,0.5); white-space: nowrap; font-family: "PingFang TC", "Helvetica Neue", monospace; font-variant-numeric: tabular-nums; flex-shrink: 0; }
        .info-icon { cursor: pointer; opacity: 0.8; display: flex; align-items: center; transition: 0.3s; filter: drop-shadow(0 0 5px rgba(212,175,55,0.5)); flex-shrink: 0; }
        .info-icon:hover { opacity: 1; filter: drop-shadow(0 0 10px var(--gold-solid)); }
        /* ======================================================================= */

                          
                        
               /* 佛尊主體層 */
        #buddha-scene {
            position: absolute; inset: 0; z-index: 10;
            margin: 0 auto; /* 🌟 加上這一行，讓 iPad 和大螢幕完美置中 */
            display: flex; justify-content: center; align-items: center;
            transform-origin: 50% 80%; 
            transition: transform 4s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
            width: 100%; max-width: 650px; 
        }
        #buddha-scene.bowing {
            transform: scale(1.35) translateY(5%);
        }


                /* 萬丈金光爆發層 */
        #burst-container {
            position: absolute; inset: 0; 
            display: flex; justify-content: center; align-items: center;
            z-index: 5; pointer-events: none;
        }

        .screen-flash {
            position: absolute; inset: 0; 
            background: radial-gradient(circle at 50% 50%, #fff 0%, #ffdf00 40%, transparent 80%);
            opacity: 1; pointer-events: none; z-index: 100; mix-blend-mode: screen;
            animation: flash-fade 2.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }
        @keyframes flash-fade { 0% { opacity: 1; transform: scale(0.8); } 100% { opacity: 0; transform: scale(1.5); } }
               .gold-ray {
            position: absolute; width: 3px; height: 100vh;
            background: linear-gradient(to top, transparent, #FFD700, #FFFFFF, #FFD700, transparent);
            box-shadow: 0 0 20px #FFD700, 0 0 10px #FFFFFF;
            opacity: 0; transform-origin: center;
        }
        @keyframes ray-burst { 0% { transform: scaleY(0.1) rotate(var(--rot)) translateY(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: scaleY(2) rotate(var(--rot)) translateY(-100vh); opacity: 0; } }

        /* 佛尊優雅凌空飄浮層 */
        .buddha-breathe {
            width: 100%; height: auto;
            animation: floating 8s ease-in-out infinite alternate;
            position: relative; 
        }
        @keyframes floating {
            0% { transform: translateY(0px); filter: drop-shadow(0 5px 15px rgba(243,229,171,0.2)); }
            100% { transform: translateY(-30px); filter: drop-shadow(0 35px 50px rgba(243,229,171,0.6)); }
        }

        /* 光相呼吸與恆常發光 */
        .halo-pulse { transform-origin: 500px 245px; animation: halo-anim 4s infinite alternate ease-in-out; }
        @keyframes halo-anim { 0% { transform: scale(1); opacity: 0.6; stroke-width: 1.5; filter: drop-shadow(0 0 15px rgba(255,215,0,0.4)); } 100% { transform: scale(1.02); opacity: 1; stroke-width: 3.0; filter: drop-shadow(0 0 35px rgba(255,215,0,0.8)); } }
        
        /* ✨ 新增：頂光背後的彩色能量圈 (6秒不同步呼吸) */
        .aura-pulse { transform-origin: 500px 245px; animation: aura-breathe 6s infinite alternate ease-in-out; }
        @keyframes aura-breathe { 
            0% { transform: scale(0.96); opacity: 0.6; } 
            100% { transform: scale(1.07); opacity: 1; } 
        }



        /* 燃香點燈狀態 */
        body.incense-on #starCanvas { filter: brightness(2) drop-shadow(0 0 5px #fff); }
        body.incense-on #waterCanvas { opacity: 0.9; }
        body.incense-on #censer-group { opacity: 1; transform: translateY(0); }

        #censer-group { opacity: 0; transform: translateY(20px); transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1); }
        .incense-glow { animation: glow-pulse 1.5s infinite alternate ease-in-out; }
        @keyframes glow-pulse { 0% { r: 3.5px; opacity: 0.8; filter: drop-shadow(0 0 6px #ff4500); } 100% { r: 5px; opacity: 1; filter: drop-shadow(0 0 15px #ffaa00); } }

        /* 雙層法界煙霧特效 */
        #smoke-container { position: absolute; inset: 0; pointer-events: none; z-index: 15; overflow: hidden; }
        .smoke-fine { position: absolute; width: 8px; height: 60px; background: linear-gradient(to top, rgba(200, 220, 240, 0.4), transparent); border-radius: 4px; filter: blur(4px); opacity: 0; animation: smoke-rise-fine 4s cubic-bezier(0.4, 0.1, 0.4, 1) forwards; }
        @keyframes smoke-rise-fine { 0% { transform: translateY(0) scaleX(1); opacity: 0; } 20% { opacity: 0.7; } 100% { transform: translateY(-40vh) scaleX(2) translateX(var(--drift)); opacity: 0; } }
        .smoke-diffused { position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, rgba(180, 200, 220, 0.15) 0%, transparent 70%); border-radius: 50%; filter: blur(12px); opacity: 0; animation: smoke-rise-diffused 7s cubic-bezier(0.2, 0.1, 0.8, 1) forwards; }
        @keyframes smoke-rise-diffused { 0% { transform: translateY(0) scale(1) translateX(0); opacity: 0; } 30% { opacity: 0.6; } 100% { transform: translateY(-60vh) scale(6) translateX(var(--drift)); opacity: 0; } }

        /* ✨ 底部控制區 (法語浮現 + 玻璃金框按鈕 + 常駐小字) */
        .ritual-container { position: absolute; bottom: max(30px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; width: 100%; z-index: 100; }
        
        #blessing-text { height: 25px; margin-bottom: 20px; color: var(--gold-light); font-size: 1.1rem; letter-spacing: 8px; text-shadow: 0 0 20px rgba(243,229,171,0.9), 0 0 10px #fff; opacity: 0; pointer-events: none; white-space: nowrap; }
        @keyframes float-blessing { 0% { opacity: 0; transform: translateY(15px); filter: brightness(1.5); } 20% { opacity: 1; transform: translateY(0); filter: brightness(1.5); } 80% { opacity: 1; transform: translateY(-5px); filter: brightness(1); } 100% { opacity: 0; transform: translateY(-15px); filter: brightness(1); } }

        .ritual-panel { display: flex; gap: 40px; }
        
               /* ✨ 玻璃透明纖維淡金色框 (文字與邊框提亮) */
        .ritual-btn { color: var(--gold-light); font-size: 1rem; letter-spacing: 6px; cursor: pointer; transition: all 0.4s; padding: 12px 24px; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.5); border-radius: 25px; backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold; text-shadow: 0 0 8px rgba(243,229,171,0.6); }
        .ritual-btn:hover, .ritual-btn.active { color: #fff; text-shadow: 0 0 15px var(--gold-light); border-color: rgba(212,175,55,0.9); background: rgba(212,175,55,0.2); box-shadow: 0 0 20px rgba(212,175,55,0.4); }

        /* ✨ 常駐微小提示 (提亮為淡白色) */
        .chant-hint { margin-top: 18px; font-size: 0.8rem; color: rgba(255,255,255,0.8); letter-spacing: 4px; pointer-events: none; text-shadow: 0 0 5px rgba(255,255,255,0.3); }

        /* ✨ 說明與獎勵模態框：修復動畫與圖層衝突版 */
.modal-overlay { 
    position: fixed; 
    inset: 0; 
    background: rgba(0,0,0,0.88); 
    backdrop-filter: blur(12px); 
    z-index: 10000; 
    display: none; 
    justify-content: center; 
    align-items: center; 
    opacity: 0; 
    transition: opacity 0.5s ease; 
    pointer-events: none; 
}

/* 當加上 .show 時，強制賦予最高顯示權限與點擊權限 */
.modal-overlay.show { 
    display: flex !important; 
    opacity: 1 !important; 
    pointer-events: auto !important; 
}

/* ✨ 說明與獎勵模態框：修復動畫與圖層衝突版 */
.modal-box { 
    width: 85%; 
    max-width: 340px; 
    max-height: 80vh; /* 🛑 限制最大高度為螢幕的 80%，防止超出 */
    overflow-y: auto; /* 🛑 開啟垂直滾動 */
    background: linear-gradient(135deg, #151515, #050505); 
    border: 1px solid var(--gold-solid); 
    border-radius: 20px; 
    padding: 35px 25px; 
    text-align: center; 
    box-shadow: 0 0 50px rgba(212,175,55,0.3); 
    transform: scale(0.9); 
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
    
    /* 自定義隱藏式極細金色滾動條 */
    scrollbar-width: thin;
    scrollbar-color: var(--gold-solid) transparent;
}

/* Webkit 核心瀏覽器 (如 Chrome, Safari, iOS) 專用極細滾動條 */
.modal-box::-webkit-scrollbar { width: 3px; }
.modal-box::-webkit-scrollbar-thumb { background: var(--gold-solid); border-radius: 10px; }
.modal-box::-webkit-scrollbar-track { background: transparent; }


/* 彈框顯示時，內容物優雅放大 */
.modal-overlay.show .modal-box { 
    transform: scale(1); 
}

.m-title { 
    color: var(--gold-light); 
    font-size: 1.2rem; 
    letter-spacing: 5px; 
    margin-bottom: 15px; 
    text-shadow: 0 0 15px rgba(212,175,55,0.5); 
    font-weight: bold;
}

.m-divider { 
    width: 40px; 
    height: 1px; 
    background: var(--gold-solid); 
    margin: 0 auto 20px; 
    opacity: 0.5; 
}

.m-text { 
    font-size: 0.95rem; 
    line-height: 1.8; 
    margin-bottom: 30px; 
    letter-spacing: 2px; 
    color: #e0e0e0; 
    text-align: center; 
}

.m-btn-prime { 
    background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(212,175,55,0.05)); 
    border: 1px solid var(--gold-solid); 
    color: var(--gold-light); 
    padding: 12px; 
    border-radius: 20px; 
    font-size: 0.95rem; 
    cursor: pointer; 
    transition: all 0.3s; 
    letter-spacing: 3px; 
    width: 100%; 
    box-shadow: 0 0 15px rgba(212,175,55,0.1); 
}

.m-btn-prime:hover { 
    background: rgba(212,175,55,0.2); 
}

/* 🕯️ 燭火微動態 */
.candle-flicker {
    transform-origin: center bottom;
    animation: flicker-anim 3s ease-in-out infinite alternate;
}
@keyframes flicker-anim {
    0% { transform: scale(0.95) rotate(-1.5deg); opacity: 0.85; }
    50% { transform: scale(1.02) rotate(1deg); opacity: 1; }
    100% { transform: scale(0.98) rotate(0deg); opacity: 0.9; }
}


   /* 曼陀羅靜態呼吸感：心光中心極大化 */
@keyframes mandala-divine-glow {
    0% { opacity: 0.4; filter: drop-shadow(0 0 10px rgba(255,215,0,0.4)); }
    100% { opacity: 0.9; filter: drop-shadow(0 0 35px rgba(255,215,0,0.8)); }
}

.mandala-static-container {
    /* 核心定位：佛尊胸前中心點 */
    transform-origin: 500px 460px;
}

.mandala-glow-effect {
    animation: mandala-divine-glow 8s ease-in-out infinite alternate;
}

        /* ================= ✨ 大乘五供與金粉專屬樣式 ================= */
        /* 1. 主畫面：蓮花座下的五供（放大1.2倍，下沉-120px完美對齊） */
        .altar {
            position: absolute; bottom: 140px; left: 0; width: 100%; z-index: 25; 
            display: none; opacity: 0; transition: opacity 3s ease-in-out; 
            align-items: flex-end; justify-content: center; gap: 15px; padding: 0 20px; pointer-events: none; 
        }
        .altar .vessel-container { position: relative; display: flex; justify-content: center; align-items: flex-end; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.15)); }
        .altar .water-cup { width: 75px; height: 110px; z-index: 5; }
        .altar .fruit-plate { width: 110px; height: 160px; z-index: 10; }
        .altar .center-vase { 
            width: 280px; height: 420px; z-index: 20; margin: 0 -10px -120px -10px; 
            transform: scale(1.2); transform-origin: center bottom; filter: drop-shadow(0 0 45px rgba(212, 175, 55, 0.35)); 
        }

        /* 2. 第二彈框：十日圓滿觀相法界（維持物理佈局） */
        #offerings-modal .modal-box {
            width: 95%; max-width: 500px; max-height: 90vh;
            background: linear-gradient(135deg, #0a0a0f, #020205); 
            border: 1px solid var(--gold-solid); box-shadow: 0 0 60px rgba(212,175,55,0.25);
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px 30px 20px;
        }
        .modal-altar-table {
            display: flex; align-items: flex-end; justify-content: center; gap: 15px; width: 100%; height: 380px; margin-bottom: 25px; pointer-events: none;
        }
        .modal-altar-table .vessel-container { position: relative; display: flex; justify-content: center; align-items: flex-end; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.15)); }
        .modal-altar-table .water-cup { width: 75px; height: 110px; z-index: 5; }
        .modal-altar-table .fruit-plate { width: 110px; height: 160px; z-index: 10; }
        .modal-altar-table .center-vase { 
            width: 280px; height: 420px; z-index: 20; margin: 0 -10px -120px -10px; 
            transform: scale(1.2); transform-origin: center bottom; filter: drop-shadow(0 0 45px rgba(212, 175, 55, 0.35)); 
        }

        @keyframes powder-fall {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 0.9; }
            100% { transform: translateY(100vh) translateX(var(--drift)) scale(0.4); opacity: 0; }
        }
        .svg-content { width: 100%; height: 100%; overflow: visible; }
        /* ========================================================== */
     
        /* ✨ 寶幡專屬動態 (搖曳、呼吸、琉璃光) */
        .banner-breath { animation: b-pulse 6s ease-in-out infinite alternate; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3)); }
        @keyframes b-pulse { 0% { filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3)); } 100% { filter: drop-shadow(0 0 35px rgba(255, 215, 0, 0.7)); } }
        .sway-base { transform-origin: 150px 20px; animation: gentle-sway 8s ease-in-out infinite alternate; }
        @keyframes gentle-sway { 0% { transform: rotate(-2.5deg); } 100% { transform: rotate(2.5deg); } }
        .ribbon-left { transform-origin: top center; animation: flutter 5s ease-in-out infinite alternate; }
        .ribbon-right { transform-origin: top center; animation: flutter 6s ease-in-out infinite alternate-reverse; }
        .ribbon-inner { transform-origin: top center; animation: flutter-y 7s ease-in-out infinite alternate; }
        @keyframes flutter { 0% { transform: skewX(-2deg) scaleY(0.98); } 100% { transform: skewX(2deg) scaleY(1.02); } }
        @keyframes flutter-y { 0% { transform: scaleY(0.97); } 100% { transform: scaleY(1.03); } }
        .glow-core { animation: core-pulse 4s ease-in-out infinite alternate; }
        @keyframes core-pulse { 0% { opacity: 0.7; filter: drop-shadow(0 0 8px #d4af37); } 100% { opacity: 1; filter: drop-shadow(0 0 18px #FFF); } }
        .glow-glass { animation: glass-pulse 5s ease-in-out infinite alternate; }
        @keyframes glass-pulse { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        .glow-chakra { animation: chakra-pulse 5s ease-in-out infinite alternate; }
        @keyframes chakra-pulse { 0% { opacity: 0.6; stroke-width: 0.8; filter: drop-shadow(0 0 5px #fff); } 100% { opacity: 1; stroke-width: 1.5; filter: drop-shadow(0 0 12px #f3e5ab); } }

        /* 預設情況下：張開的眼睛隱藏，閉著的眼睛顯示 */
.buddha-eye-open {
    display: none;
}
.buddha-eye-closed {
    display: block;
}

/* 當點擊頂禮，#buddha-scene 帶有 bowing 類別時：自動對調顯示狀態 */
.bowing .buddha-eye-open {
    display: block;
}
.bowing .buddha-eye-closed {
    display: none;
}

/* ==================== 佛尊動態手勢：絕對互斥秒切控制 ==================== */
/* 常態下：只看見合十，接引印強制徹底切除 */
.buddha-hands-closed {
    display: block !important;
}
.buddha-hands-open {
    display: none !important;
}

/* 頂禮 bowing 時：合十強制切除，接引印一毫秒內精準呈現 */
.bowing .buddha-hands-closed {
    display: none !important;
}
.bowing .buddha-hands-open {
    display: block !important;
}
        
/* ✨ 卍字隨手印切換的優雅過渡：無耗能，精準鎖定系統的 .bowing 類別 */
.buddha-swastika {
    transform-origin: 500px 460px; /* 鎖定卍字的幾何中心點 */
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
}

/* 當外層 #buddha-scene 被賦予 .bowing 狀態（接引手化現）時，卍字同步放大、亮起 */
#buddha-scene.bowing .buddha-swastika {
    transform: scale(1.6);
    opacity: 1.4 !important; /* 強制提升至最亮 */
}


    </style>
</head>
<body>
        <div class="nav-top">
        <div class="nav-btn" onclick="returnToMainHall()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> 返回道場
        </div>
        
        <div class="nav-btn lunar-sweep-btn" onclick="location.href='lunar.html'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="lunar-icon">
                <defs>
                    <radialGradient id="iconGlowBeauty" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
                        <stop offset="30%" stop-color="#f3e5ab" stop-opacity="0.9"/>
                        <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
                    </radialGradient>
                </defs>
                
                <circle cx="32" cy="32" r="30" stroke="rgba(212,175,55,0.6)" stroke-width="2.5" fill="rgba(212,175,55,0.03)"/>

    const canvas = document.getElementById('starCanvas'); 
    const ctx = canvas.getContext('2d'); 
    let width, height, stars = [], warpSpeed = 0.5, starScale = 1; 

    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; } 
    window.addEventListener('resize', resize); resize(); 

    const STAR_COLORS = ['#8ba89c', '#ffffff', '#f3e5ab', '#ff9a9e', '#b2dfdb', '#C9A0DC', '#ffeb3b']; 
    for (let i = 0; i < 250; i++) { 
        stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)], s: Math.random() * 2.5 + 0.5 }); 
    } 

    function renderStars() { 
        ctx.fillStyle = 'rgba(1, 1, 3, 0.4)'; 
        ctx.fillRect(0, 0, width, height); 
        ctx.globalCompositeOperation = 'screen'; 
        stars.forEach(s => { 
            s.z -= warpSpeed; 
            if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; } 
            let sc = 400 / (400 + s.z); 
            let drawY = (height / 2) + s.y * sc; 
            if (drawY > height * 0.75) return; 
            ctx.beginPath(); 
            ctx.arc((width / 2) + s.x * sc, drawY, s.s * sc * starScale, 0, Math.PI * 2); 
            ctx.fillStyle = s.color; 
            ctx.globalAlpha = Math.min(1, sc * 2.5); 
            ctx.fill(); 
            ctx.globalAlpha = 1; 
        }); 
        ctx.globalCompositeOperation = 'source-over'; 
        requestAnimationFrame(renderStars); 
    } 
    renderStars();

    const wCvs = document.getElementById('waterCanvas'), wCtx = wCvs.getContext('2d'); 
    let ww, wh, wTime=0; 
    function resW() { ww=wCvs.width=window.innerWidth; wh=wCvs.height=window.innerHeight; } 
    window.addEventListener('resize', resW); resW(); 
    const waterThemes = [ { h: 195, s: 80, l: 65 }, { h: 340, s: 80, l: 70 }, { h: 45,  s: 90, l: 65 } ]; 
    
    function drawW() { 
        wCtx.clearRect(0,0,ww,wh); wTime += 0.005; 
        for (let i = 0; i < 3; i++) { 
            wCtx.beginPath(); let shift = i * 2; 
            let grad = wCtx.createLinearGradient(0, wh*0.5, 0, wh); 
            let t = waterThemes[i]; 
            grad.addColorStop(0, `hsla(${t.h}, ${t.s}%, ${t.l}%, 0.1)`); 
            grad.addColorStop(0.5, `hsla(${t.h}, ${t.s}%, ${t.l}%, 0.3)`); 
            grad.addColorStop(1, `hsla(${t.h}, ${t.s}%, ${t.l}%, 0.6)`); 
            wCtx.fillStyle = grad; 
            for (let x = 0; x <= ww; x += 5) { 
                let y = Math.sin(x * 0.005 + wTime + shift) * 40 + Math.sin(x * 0.01 - wTime * 2) * 20 + (wh * 0.7) + Math.cos(wTime + i) * 30; 
                if (x === 0) wCtx.moveTo(x, y); else wCtx.lineTo(x, y); 
            } 
            wCtx.lineTo(ww, wh); wCtx.lineTo(0, wh); wCtx.fill(); 
        } 
        requestAnimationFrame(drawW); 
    } 
    drawW();

        document.getElementById('stick-right').setAttribute('y1', '1020');
        document.getElementById('glow-left').setAttribute('r', '0');
        document.getElementById('glow-center').setAttribute('r', '0');
        document.getElementById('glow-right').setAttribute('r', '0');

        const beamGroup = document.getElementById('orb-layer');
        if(!beamGroup) return;
        beamGroup.style.opacity = '1';

        const targetX = 500, targetY = 460;
        const curves = [
            { x: 475, y: 1010, cpX: 300, cpY: 600, id: 'left' },  
            { x: 500, y: 1010, cpX: 500, cpY: 650, id: 'center' }, 
            { x: 525, y: 1010, cpX: 700, cpY: 600, id: 'right' }  
        ];

        function getQBezier(t, p0, p1, p2) { return (1-t)*(1-t)*p0 + 2*(1-t)*t*p1 + t*t*p2; }

        let animStart = Date.now();
        const duration = 1200; 

        function animateBeams() {
            let elapsed = Date.now() - animStart;
            let progress = Math.min(elapsed / duration, 1); 
            
            curves.forEach((p) => {
                let headT = progress;
                let tailT = Math.max(0, progress - 0.2); 
                
                let headX = getQBezier(headT, p.x, p.cpX, targetX);
                let headY = getQBezier(headT, p.y, p.cpY, targetY);
                let tailX = getQBezier(tailT, p.x, p.cpX, targetX);
                let tailY = getQBezier(tailT, p.y, p.cpY, targetY);
                
                let d = `M ${tailX} ${tailY}`;
                for(let t = tailT; t <= headT; t += 0.05) {
                    d += ` L ${getQBezier(t, p.x, p.cpX, targetX)} ${getQBezier(t, p.y, p.cpY, targetY)}`;
                }
                d += ` L ${headX} ${headY}`;
                
                let glowEl = document.getElementById(`beam-${p.id}-glow`);
                let coreEl = document.getElementById(`beam-${p.id}-core`);
                
                if (glowEl && coreEl) {
                    glowEl.setAttribute('d', d);
                    coreEl.setAttribute('d', d);
                    
                    glowEl.setAttribute('stroke-width', 15 * (1 - progress * 0.4));
                    coreEl.setAttribute('stroke-width', 6 * (1 - progress * 0.4));
                    
                    let opacityGlow = (1 - Math.pow(progress, 3)) * 0.3; 
                    let opacityCore = (1 - Math.pow(progress, 2.5)) * 0.9; 
                    
                    glowEl.style.opacity = opacityGlow;
                    coreEl.style.opacity = opacityCore;
                }
            });

            if (progress < 1) {
                requestAnimationFrame(animateBeams);
            } else {
                beamGroup.style.opacity = '0';
                curves.forEach((p) => {
                    document.getElementById(`beam-${p.id}-glow`).setAttribute('d', '');
                    document.getElementById(`beam-${p.id}-core`).setAttribute('d', '');
                });

                document.body.classList.remove('incense-on');
                const btn = document.getElementById('btn-incense');
                btn.classList.remove('active');
                
                setTimeout(restoreIncensePosition, 1500);
            }
        }
        animateBeams();
    }

    function resetIncense() {
        cancelAnimationFrame(incenseTimer);
        clearTimeout(smokeTimer);
        clearTimeout(ashTimer);
        document.body.classList.remove('incense-on');
        const btn = document.getElementById('btn-incense');
        btn.classList.remove('active');
        setTimeout(restoreIncensePosition, 1500);
    }

    function restoreIncensePosition() {
        if(!document.body.classList.contains('incense-on')) {
            document.getElementById('stick-center').setAttribute('y1', '875');
            document.getElementById('glow-center').setAttribute('cy', '875');
            document.getElementById('glow-center').setAttribute('r', '4');
            document.getElementById('stick-left').setAttribute('x1', '475');
            document.getElementById('stick-left').setAttribute('y1', '890');
            document.getElementById('glow-left').setAttribute('cx', '475');
            document.getElementById('glow-left').setAttribute('cy', '890');
            document.getElementById('glow-left').setAttribute('r', '4');
            document.getElementById('stick-right').setAttribute('x1', '525');
            document.getElementById('stick-right').setAttribute('y1', '890');
            document.getElementById('glow-right').setAttribute('cx', '525');
            document.getElementById('glow-right').setAttribute('cy', '890');
            document.getElementById('glow-right').setAttribute('r', '4');
            ['left', 'right'].forEach(side => {
    document.getElementById(`candle-body-${side}`).setAttribute('y', '970');
    document.getElementById(`candle-body-${side}`).setAttribute('height', '60');
    document.getElementById(`candle-wick-${side}`).setAttribute('y1', '965');
    document.getElementById(`candle-wick-${side}`).setAttribute('y2', '975');
    
    // ✨ 修改這裡為 flame-move
    document.getElementById(`flame-move-${side}`).style.transform = `translateY(0px)`;
});


        }
    }
    function createDualSmoke() {
        if (!document.body.classList.contains('incense-on') || incenseProgress >= 1) return;
        const container = document.getElementById('smoke-container');
        
        const glows = [
            document.getElementById('glow-left'),
            document.getElementById('glow-center'),
            document.getElementById('glow-right')
        ];

        glows.forEach(glow => {
            if (Math.random() > 0.4) return; 
            const rect = glow.getBoundingClientRect(); 
            
            const puff = document.createElement('div');
            puff.className = 'smoke-fine';
            puff.style.setProperty('--drift', `${(Math.random() - 0.5) * 40}px`);
            puff.style.left = `${rect.left + rect.width / 2 - 4}px`; 
            puff.style.top = `${rect.top - 60}px`; 
            container.appendChild(puff);
            setTimeout(() => { if(puff.parentNode) puff.remove() }, 4000);
        });

        if (Math.random() > 0.6) {
            const centerRect = glows[1].getBoundingClientRect();
            const fog = document.createElement('div');
            fog.className = 'smoke-diffused';
            fog.style.setProperty('--drift', `${(Math.random() - 0.5) * 150}px`);
            fog.style.left = `${centerRect.left + (Math.random() - 0.5) * 30 - 15}px`;
            fog.style.top = `${centerRect.top - 40}px`;
            container.appendChild(fog);
            setTimeout(() => { if(fog.parentNode) fog.remove() }, 7000);
        }
        
        smokeTimer = setTimeout(createDualSmoke, 300 + Math.random() * 200);
    }

    function createAshDrop() {
        if (!document.body.classList.contains('incense-on') || incenseProgress >= 1) return;
        
        const layer = document.getElementById('ash-layer');
        const glows = ['glow-left', 'glow-center', 'glow-right'];
        const activeGlow = document.getElementById(glows[Math.floor(Math.random() * glows.length)]);
        
        const cx = parseFloat(activeGlow.getAttribute('cx'));
        const cy = parseFloat(activeGlow.getAttribute('cy'));
        
        const ash = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        ash.setAttribute('cx', cx);
        ash.setAttribute('cy', cy);
        ash.setAttribute('r', '1.5');
        ash.setAttribute('fill', '#e0e0e0');
        ash.style.transition = 'all 1.5s cubic-bezier(0.5, 0, 1, 1)';
        layer.appendChild(ash);
        
        setTimeout(() => {
            ash.setAttribute('cy', cy + 30 + Math.random() * 20); 
            ash.setAttribute('cx', cx + (Math.random() - 0.5) * 10); 
            ash.style.opacity = '0';
        }, 50);

        setTimeout(() => { if(ash.parentNode) ash.remove() }, 1600);
        
        ashTimer = setTimeout(createAshDrop, 500 + Math.random() * 1000);
    }

    function returnToMainHall() {
        window.location.href = 'index.html?screen=3';
    }

    // 初始化啟動
    handleStreak();

</script>
