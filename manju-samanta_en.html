        /* 萬丈白毫願力淡綠光爆發層 */
    #burst-container { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 5; pointer-events: none; }
    
    .screen-flash {
        position: absolute; inset: 0; 
        background: radial-gradient(circle at 50% 45%, #ffffff 0%, #b9f6ca 45%, #69f0ae 70%, transparent 90%);
        opacity: 1; pointer-events: none; z-index: 100; mix-blend-mode: screen;
        animation: flash-fade 2s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
    }
    @keyframes flash-fade { 0% { opacity: 1; transform: scale(0.8); } 100% { opacity: 0; transform: scale(1.5); } }

    .gold-ray {
        position: absolute; width: 3px; height: 200vh;
        background: linear-gradient(to top, transparent, #69f0ae, #ffffff, #FF9224, transparent);
        box-shadow: 0 0 15px #FF9224, 0 0 5px #ffffff; opacity: 0; transform-origin: center center; will-change: transform, opacity;
    }
    @keyframes ray-burst { 
        0% { transform: scaleY(0.05) rotate(var(--rot)); opacity: 0; } 
        15% { opacity: 1; transform: scaleY(0.6) rotate(var(--rot)); } 
        100% { transform: scaleY(2.5) rotate(var(--rot)); opacity: 0; } 
    }

    .space-particle {
        position: absolute; width: 80px; height: 40px; background: #ffffff; border-radius: 70%;
        box-shadow: 0 0 12px #ffffff, 0 0 25px #69f0ae; opacity: 0; pointer-events: none; will-change: transform, opacity;
    }
    @keyframes particle-explode {
        0% { transform: translate(0, 0) scale(0.7); opacity: 1; }
        100% { transform: translate(var(--tx), var(--ty)) scale(2.5); opacity: 0; }
    }

        #buddha-scene {
            position: absolute;
            inset: 0;
            z-index: 10;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: 50% 70%;
            transition: transform 3.5s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
            width: 100%;
            max-width: 1000px;
        }

 /* --------------------------------------------------
   預設狀態：兩尊都正常顯示，只控制動態 Transition
   -------------------------------------------------- */
#bow-anim-left,
#bow-anim-right {
    transition: transform 1.2s ease-in-out, 
                opacity 0.4s ease-in-out 1.3s;
}

/* --------------------------------------------------
   頂禮左尊（普賢）：文殊瞬間消失，普賢移至中央並放大
   -------------------------------------------------- */
body.bow-left #bow-anim-left {
    /* 移至中央的同時放大 1.25 倍（放大倍數可自由微調，如 1.2 或 1.3） */
    transform: translate(110px, 0px) scale(1.25) !important;
    opacity: 1 !important;
    transition: transform 1.2s ease-in-out !important;
}
body.bow-left #bow-anim-right {
    opacity: 0 !important;
    pointer-events: none;
    transition: opacity 0s !important; /* 文殊瞬間隱藏 */
}

/* --------------------------------------------------
   頂禮右尊（文殊）：普賢瞬間消失，文殊移至中央並放大
   -------------------------------------------------- */
body.bow-right #bow-anim-right {
    /* 移至中央的同時放大 1.25 倍 */
    transform: translate(-350px, 0px) scale(1.25) !important;
    opacity: 1 !important;
    transition: transform 1.2s ease-in-out !important;
}
body.bow-right #bow-anim-left {
    opacity: 0 !important;
    pointer-events: none;
    transition: opacity 0s !important; /* 普賢瞬間隱藏 */
}


        .buddha-breathe {
            width: 100%;
            height: auto;
            animation: floating 2s ease-in-out infinite alternate;
            position: relative;
        }

        @keyframes floating {
            0% { transform: translateY(-8px); filter: drop-shadow(0 5px 15px rgba(246,211,101,0.15)); }
            100% { transform: translateY(-20px); filter: drop-shadow(0 25px 40px rgba(246,211,101,0.35)); }
        }

        .halo-pulse {
            transform-origin: 500px 300px;
            animation: halo-anim 4s infinite alternate ease-in-out;
        }

        @keyframes halo-anim {
            0% { transform: scale(1); opacity: 0.65; }
            100% { transform: scale(1.1); opacity: 0.95; }
        }



      

/* 外層：負責濾鏡轉場，並鎖定變形中心點 */
.weapon-highlight {
    transition: filter 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    /* 確保縮放是以武器自己為中心，而不是整個 SVG 畫布的左上角 */
    transform-origin: center;
    transform-box: fill-box;
}

/* 武器激活狀態：觸發循環呼吸動畫 */
.weapon-active {
    filter: drop-shadow(0 0 30px #f6d365) drop-shadow(0 0 10px #ffffff) brightness(1.3) !important;
    animation: weaponBreath 2s ease-in-out infinite alternate !important;
}

/* 莊嚴呼吸律動動畫：改用獨立的 scale 與 rotate，保護原本的座標不跑掉 */
@keyframes weaponBreath {
    0% {
        scale: 0.99; /* 依照你測試的數值 */
        rotate: 0deg;
        filter: drop-shadow(0 0 25px #f6d365) drop-shadow(0 0 8px #ffffff) brightness(2);
    }
    100% {
        scale: 1.05; 
        rotate: 1deg; 
        filter: drop-shadow(0 0 100px #f6d365) drop-shadow(0 0 18px #a8ffb2) brightness(3);
    }
}




        #smoke-container { position: absolute; inset: 0; pointer-events: none; z-index: 15; overflow: hidden; }
        
        .smoke-fine { 
            position: absolute; 
            width: 6px; 
            height: 50px; 
            background: linear-gradient(to top, rgba(240, 230, 210, 0.25), transparent); 
            border-radius: 3px; 
            filter: blur(4px); 
            opacity: 0; 
            animation: smoke-rise-fine 4.5s cubic-bezier(0.4, 0.1, 0.4, 1) forwards; 
        }
        
        @keyframes smoke-rise-fine { 
            0% { transform: translateY(0) scaleX(1); opacity: 0; } 
            20% { opacity: 0.5; } 
            100% { transform: translateY(-45vh) scaleX(2.5) translateX(var(--drift)); opacity: 0; } 
        }

        .candle-flicker { transform-origin: center bottom; animation: flicker-anim 2.5s ease-in-out infinite alternate; }
        @keyframes flicker-anim { 0% { transform: scale(0.93) rotate(-1.2deg); opacity: 0.8; } 100% { transform: scale(1.04) rotate(1.2deg); opacity: 1; } }


        
        #blessing-text { 
            height: 30px; 
            margin-bottom: 20px; 
            color: var(--gold-light); 
            font-size: 0.7rem; 
            letter-spacing: 4px; 
            text-shadow: 0 0 20px rgba(246,211,101,0.9), 0 0 10px #fff; 
            opacity: 0; 
            pointer-events: none; 
            white-space: nowrap; 
        }
        
        
        @keyframes float-blessing { 
            0% { opacity: 0; transform: translateY(15px); } 
            20% { opacity: 1; transform: translateY(0); } 
            80% { opacity: 1; transform: translateY(-5px); } 
            100% { opacity: 0; transform: translateY(-15px); }

       .ritual-container { 
    position: absolute; 
    bottom: max(10px, env(safe-area-inset-bottom)); /* 移至螢幕可放的最低位置 */
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    width: 100%; 
    z-index: 100; 
    padding: 0 10px; /* 避免極窄螢幕貼邊 */
    box-sizing: border-box;
}

/* 按鈕並排面板 */
.ritual-panel { 
    width: 100%;
    max-width: 480px; /* 限制最大寬度，保持平板與大螢幕的美感 */
    display: flex; 
    justify-content: center;
}

.btn-group-row { 
    display: flex; 
    gap: 8px; /* 縮小按鈕間距以容納三個按鈕 */
    width: 100%;
    justify-content: center;
    align-items: stretch; /* 讓長度折行的按鈕高度一致 */
}

/* 扁平精致按鈕設計 */
.ritual-btn { 
    flex: 1; /* 三個按鈕均分寬度 */
    min-width: 0; /* 允許 Flex 子項目縮小 */
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    
    color: var(--gold-light); 
    font-size: 0.85rem; /* 中日文微縮，保持一行放得下 */
    line-height: 1.2;
    letter-spacing: 2px; /* 降低字距避免擠壓 */
    
    cursor: pointer; 
    transition: all 0.4s; 
    padding: 10px 6px; /* 內距縮減，讓英文折行時按鈕優雅變高 */
    background: rgba(255,255,255,0.03); 
    border: 1px solid rgba(212,175,55,0.35); 
    border-radius: 20px; 
    backdrop-filter: blur(8px); 
    font-weight: bold; 
    text-shadow: 0 0 8px rgba(243,229,171,0.4); 
    
    word-break: break-word; /* 英文長單字折行支援 */
    hyphens: auto;
}

.ritual-btn:hover, .ritual-btn.active { 
    color: #fff; 
    text-shadow: 0 0 15px var(--gold-light); 
    border-color: rgba(212,175,55,0.85); 
    background: rgba(212,175,55,0.15); 
    box-shadow: 0 0 20px rgba(212,175,55,0.25); 
}

/* 底部提示文字 */
.chant-hint { 
    margin-top: 8px; 
    font-size: 0.75rem; 
    color: rgba(255,255,255,0.6); 
    letter-spacing: 2px; 
    pointer-events: none; 
    text-align: center;
}

/* 針對英文版的微調（可在 <html> 或 <body> 加上 lang="en"） */
:lang(en) .ritual-btn {
    font-size: 0.75rem;
    letter-spacing: 0.5px;
    padding: 8px 4px;
}
        /* 預設隱藏時：停留在較低的位置 */
#censer-group { 
    opacity: 0; 
    transform: translateY(20px); 
    transition: all 1.2s cubic-bezier(0.25, 1, 0.5, 1); 
}

/* 顯示時：整體往上抬升（例如 -80px），避開文字重疊 */
body.incense-on #censer-group { 
    opacity: 1; 
    transform: translate(20px, -150px) scale(0.95); 
}

.incense-glow { 
    animation: glow-pulse 1.5s infinite alternate ease-in-out; 
}

@keyframes glow-pulse { 
    0% { r: 3px; opacity: 0.7; filter: drop-shadow(0 0 4px #ff4500); } 
    100% { r: 4.5px; opacity: 1; filter: drop-shadow(0 0 12px #ffaa00); } 
}

<script>
    function speakWords(text) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 0.85;
        msg.pitch = 0.9;
        window.speechSynthesis.speak(msg);
    }

    function showBlessing(text) {
        const el = document.getElementById('blessing-text');
        if(!el) return;
        el.innerText = text;
        el.style.animation = 'none';
        void el.offsetWidth;
        el.style.animation = 'float-blessing 3.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards';
    }

    function toggleAction(type) {
        const btn = document.getElementById(`btn-${type}`);
        if (!btn || btn.classList.contains('active')) return;

        btn.classList.add('active');
        document.getElementById('buddha-scene').classList.add('bowing');
        
        triggerGoldenBurst();

        if (type === 'samantabhadra') {
            document.body.classList.add('bow-left');
            document.body.classList.remove('bow-right');

            const weapon = document.getElementById('samantabhadra-weapon');
            if(weapon) weapon.classList.add('weapon-active');
            
            speakWords("Vast as the ocean of vows, ten vows endless");
            showBlessing("Samantabhadra's Vows ‧ Bodhi in Practice");
        } else if (type === 'manjusri') {
            document.body.classList.add('bow-right');
            document.body.classList.remove('bow-left');

            const weapon = document.getElementById('manjusri-weapon');
            if(weapon) weapon.classList.add('weapon-active');

            speakWords("Prajna wisdom severs all ignorance");
            showBlessing("Manjusri's Wisdom ‧ Severing Afflictions");
        }

        setTimeout(() => {
            document.getElementById('buddha-scene').classList.remove('bowing');
            btn.classList.remove('active');
            
            document.body.classList.remove('bow-left', 'bow-right');

            const w1 = document.getElementById('samantabhadra-weapon');
            const w2 = document.getElementById('manjusri-weapon');
            if(w1) w1.classList.remove('weapon-active');
            if(w2) w2.classList.remove('weapon-active');
        }, 3200);
    }

    // 萬丈淡綠光粒子特效
    function triggerGoldenBurst() {
        const container = document.getElementById('burst-container');
        if(!container) return;
        container.innerHTML = '';
        
        const flash = document.createElement('div');
        flash.className = 'screen-flash';
        container.appendChild(flash);
        
        for(let i=0; i<48; i++) {
            const angle = i * 7.5;
            const ray = document.createElement('div');
            ray.className = 'gold-ray';
            ray.style.setProperty('--rot', `${angle}deg`);
            ray.style.animation = `ray-burst 2.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards`;
            container.appendChild(ray);
            
            const particle = document.createElement('div');
            particle.className = 'space-particle';
            const distance = 70 + Math.random() * 50; 
            const rad = (angle * Math.PI) / 180;
            const tx = Math.cos(rad) * distance + "vw";
            const ty = Math.sin(rad) * distance + "vh";
            particle.style.setProperty('--tx', tx);
            particle.style.setProperty('--ty', ty);
            particle.style.animation = `particle-explode ${1.4 + Math.random() * 1}s cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;
            container.appendChild(particle);
        }
    }

    // 燃香與蠟燭物理計時器
    let incenseTimer, smokeTimer, incenseProgress = 0;

    function toggleIncense() {
        const btn = document.getElementById('btn-incense');
        const isActive = document.body.classList.contains('incense-on');
        
        if (!isActive) {
            document.body.classList.add('incense-on');
            btn.classList.add('active');
            
            speakWords("Wisdom and Practice United, Rebirth in Pure Land"); 
            showBlessing("Wisdom & Practice ‧ Rebirth in Pure Land");
            
            incenseProgress = 0;
            createThreeSmoke();
            
            let startTime = Date.now();
            function burn() {
                let elapsed = (Date.now() - startTime) / 1000;
                incenseProgress = Math.min(elapsed / 60, 1);
                
                document.getElementById('stick-center')?.setAttribute('y1', 1125 + (145 * incenseProgress));
                document.getElementById('glow-center')?.setAttribute('cy', 1125 + (145 * incenseProgress));
                
                document.getElementById('stick-left')?.setAttribute('y1', 1140 + (130 * incenseProgress));
                document.getElementById('glow-left')?.setAttribute('cy', 1140 + (130 * incenseProgress));
                
                document.getElementById('stick-right')?.setAttribute('y1', 1140 + (130 * incenseProgress));
                document.getElementById('glow-right')?.setAttribute('cy', 1140 + (130 * incenseProgress));
                
                let meltAmount = 55 * incenseProgress;
                ['left', 'right'].forEach(side => {
                    const candleBody = document.getElementById(`candle-body-${side}`);
                    const candleWick = document.getElementById(`candle-wick-${side}`);
                    const flameMove = document.getElementById(`flame-move-${side}`);
                    
                    if(candleBody) {
                        candleBody.setAttribute('y', 1220 + meltAmount);
                        candleBody.setAttribute('height', 55 - meltAmount);
                    }
                    if(candleWick) {
                        candleWick.setAttribute('y1', 1215 + meltAmount);
                        candleWick.setAttribute('y2', 1220 + meltAmount);
                    }
                    if(flameMove) {
                        flameMove.style.transform = `translateY(${meltAmount}px)`;
                    }
                });
                
                if (incenseProgress < 1 && document.body.classList.contains('incense-on')) {
                    incenseTimer = requestAnimationFrame(burn);
                } else if (incenseProgress >= 1 && document.body.classList.contains('incense-on')) {
                    resetIncense();
                }
            }
            incenseTimer = requestAnimationFrame(burn);
        } else {
            resetIncense();
        }
    }

    function resetIncense() {
        cancelAnimationFrame(incenseTimer);
        clearTimeout(smokeTimer);
        document.body.classList.remove('incense-on');
        document.getElementById('btn-incense')?.classList.remove('active');
        setTimeout(restoreIncensePosition, 1200);
    }

    function restoreIncensePosition() {
        if(!document.body.classList.contains('incense-on')) {
            document.getElementById('stick-center')?.setAttribute('y1', '1125');
            document.getElementById('glow-center')?.setAttribute('cy', '1125');
            document.getElementById('stick-left')?.setAttribute('y1', '1140');
            document.getElementById('glow-left')?.setAttribute('cy', '1140');
            document.getElementById('stick-right')?.setAttribute('y1', '1140');
            document.getElementById('glow-right')?.setAttribute('cy', '1140');
            
            ['left', 'right'].forEach(side => {
                const candleBody = document.getElementById(`candle-body-${side}`);
                const candleWick = document.getElementById(`candle-wick-${side}`);
                const flameMove = document.getElementById(`flame-move-${side}`);
                
                if(candleBody) {
                    candleBody.setAttribute('y', '1220');
                    candleBody.setAttribute('height', '55');
                }
                if(candleWick) {
                    candleWick.setAttribute('y1', '1215');
                    candleWick.setAttribute('y2', '1220');
                }
                if(flameMove) {
                    flameMove.style.transform = `translateY(0px)`;
                }
            });
        }
    }

    function createThreeSmoke() {
        if (!document.body.classList.contains('incense-on') || incenseProgress >= 1) return;
        const container = document.getElementById('smoke-container');
        if (!container) return;
        
        const targets = ['glow-left', 'glow-center', 'glow-right'];
        
        targets.forEach(id => {
            const glow = document.getElementById(id);
            if (!glow) return;
            const rect = glow.getBoundingClientRect(); 
            
            const puff = document.createElement('div');
            puff.className = 'smoke-fine';
            puff.style.setProperty('--drift', `${(Math.random() - 0.5) * 60}px`);
            puff.style.left = `${rect.left + rect.width / 2 - 3}px`; 
            puff.style.top = `${rect.top - 40}px`; 
            
            container.appendChild(puff);
            setTimeout(() => puff.remove(), 4500);
        });
        
        smokeTimer = setTimeout(createThreeSmoke, 450);
    }

    function openM(id) { 
        document.getElementById(id).classList.add('show'); 
    }
    function closeM(id) { 
        document.getElementById(id).classList.remove('show'); 
    }

    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [];

    const starColors = [
        'rgba(246, 211, 101, ',
        'rgba(255, 236, 179, ',
        'rgba(180, 230, 200, ',
        'rgba(255, 255, 255, ',
        'rgba(220, 180, 100, '
    ];

    function initCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        stars = [];
        
        for(let i = 0; i < 160; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 1.8 + 0.3,
                vx: (Math.random() - 0.5) * 0.15,
                vy: (Math.random() - 0.5) * 0.15 - 0.05,
                color: starColors[Math.floor(Math.random() * starColors.length)],
                alpha: Math.random(),
                pulseSpeed: Math.random() * 0.02 + 0.005,
                pulseDir: Math.random() > 0.5 ? 1 : -1
            });
        }
    }

    function drawStars() {
        ctx.clearRect(0, 0, width, height);
        
        stars.forEach(s => {
            s.x += s.vx;
            s.y += s.vy;
            
            if(s.x < 0) s.x = width;
            if(s.x > width) s.x = 0;
            if(s.y < 0) s.y = height;
            if(s.y > height) s.y = 0;
            
            s.alpha += s.pulseSpeed * s.pulseDir;
            if(s.alpha >= 0.85) {
                s.alpha = 0.85;
                s.pulseDir = -1;
            } else if(s.alpha <= 0.15) {
                s.alpha = 0.15;
                s.pulseDir = 1;
            }
            
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `${s.color}${s.alpha})`;
            
            if(s.r > 1.4) {
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(246, 211, 101, 0.6)';
            } else {
                ctx.shadowBlur = 0;
            }
            
            ctx.fill();
        });
        
        requestAnimationFrame(drawStars);
    }

    window.addEventListener('resize', initCanvas);
    initCanvas();
    drawStars();
</script>
