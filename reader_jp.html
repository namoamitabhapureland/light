<!DOCTYPE html>
<html lang="ja-JP">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest_jp.json">
    <title>妙依の園 ． デジタル法宝</title>
    <style>
        :root {
            --bg-deep: #020205;
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --text-main: #e0e0e0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.25);
            --glow-gold: rgba(212, 175, 55, 0.4);
        }

        body {
            margin: 0; background: var(--bg-deep); color: var(--text-main);
            font-family: "Hiragino Mincho ProN", "Yu Mincho", "PingFang TC", "Microsoft JhengHei", serif;
            -webkit-tap-highlight-color: transparent; overflow-x: hidden;
        }

        .top-nav-bar {
            padding: 20px 6%;
            display: flex;
            justify-content: flex-start;
        }

        .glass-btn {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--cyan); padding: 8px 22px; border-radius: 30px;
            font-size: 0.9rem; letter-spacing: 2px; cursor: pointer;
            backdrop-filter: blur(10px); transition: all 0.4s ease;
            display: flex; align-items: center; gap: 8px; text-decoration: none;
        }
        .glass-btn:hover {
            border-color: var(--solid-gold); color: var(--gold);
            box-shadow: 0 0 15px var(--glow-gold); transform: translateY(-2px);
        }
        .glass-btn.active {
            background: rgba(212, 175, 55, 0.15); border-color: var(--solid-gold);
            color: var(--gold); box-shadow: 0 0 20px var(--glow-gold);
        }

        #list-view {
            padding: 0 6% 40px; max-width: 900px; margin: 0 auto;
            min-height: 100vh;
        }

        .page-title {
            text-align: center; color: var(--solid-gold); font-size: 1.8rem;
            letter-spacing: 5px; margin-bottom: 40px; font-weight: normal;
            text-shadow: 0 0 15px var(--glow-gold);
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }

        .title-icon { width: 28px; height: 28px; stroke: var(--solid-gold); fill: none; stroke-width: 1.5; }

        .cat-nav {
            display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .article-card {
            background: rgba(10, 15, 20, 0.4); border: 1px solid rgba(139, 168, 156, 0.2);
            border-radius: 16px; padding: 30px; margin-bottom: 25px;
            cursor: pointer; transition: all 0.4s ease; backdrop-filter: blur(5px);
        }
        .article-card:hover {
            border-color: var(--solid-gold); background: rgba(20, 20, 25, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 15px rgba(212,175,55,0.05);
        }
        .card-meta { color: var(--cyan); font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 15px; display: flex; justify-content: space-between;}
        .card-title { color: var(--gold); font-size: 1.4rem; font-weight: bold; margin: 0 0 15px 0; letter-spacing: 1px; }
        .card-desc { color: #888; font-size: 0.95rem; line-height: 1.8; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        #reader-view {
            display: none; position: fixed; inset: 0; background: var(--bg-deep);
            z-index: 1000; overflow-y: auto; padding-bottom: 100px;
        }

        .reader-header {
            position: sticky; top: 0; background: rgba(2, 2, 5, 0.9);
            backdrop-filter: blur(15px); padding: 15px 6%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border); z-index: 1100;
        }

        .article-container { max-width: 760px; margin: 50px auto 0; padding: 0 6%; }
        .article-main-title { color: var(--gold); font-size: 1.8rem; text-align: center; margin-bottom: 20px; letter-spacing: 2px; text-shadow: 0 0 20px rgba(212,175,55,0.3); }
        .article-status { text-align: center; color: var(--cyan); font-size: 0.9rem; margin-bottom: 50px; letter-spacing: 1px; }
        .humble-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(139,168,156,0.3); padding: 20px; border-radius: 12px; color: #aaa; font-size: 0.9rem; line-height: 1.8; margin-bottom: 60px; text-align: justify; }

        .chapter-box { margin-bottom: 50px; }
        .chapter-title { 
            color: var(--cyan); font-size: 1.3rem; font-weight: bold; letter-spacing: 2px;
            display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
            border-bottom: 1px solid rgba(139,168,156,0.2); padding-bottom: 10px;
        }
        .chapter-content { color: var(--text-main); font-size: 1.05rem; line-height: 2.2; text-align: justify; letter-spacing: 0.5px; }
        
        .icon { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0;}

        .tree-wrapper { width: 100%; overflow-x: auto; padding: 20px 0; margin-bottom: 40px; margin-top: 10px; }

        .dharma-tree { display: block; width: max-content; margin: 0 auto; min-width: 1020px; padding: 0 20px; }

        .dharma-tree ul { padding-top: 25px; position: relative; display: flex; justify-content: center; }
        .dharma-tree li { text-align: center; list-style-type: none; position: relative; padding: 25px 4px 0 4px; }
        .dharma-tree li::before, .dharma-tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 1px solid var(--glass-border); width: 50%; height: 25px; }
        .dharma-tree li::after { right: auto; left: 50%; border-left: 1px solid var(--glass-border); }
        .dharma-tree li:only-child::after, .dharma-tree li:only-child::before { display: none; }
        .dharma-tree li:only-child { padding-top: 0; }
        .dharma-tree li:first-child::before, .dharma-tree li:last-child::after { border: 0 none; }
        .dharma-tree li:last-child::before { border-right: 1px solid var(--glass-border); }
        .dharma-tree ul ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 1px solid var(--glass-border); width: 0; height: 25px; }

        .tree-node { border: 1px solid var(--glass-border); padding: 15px 10px; background: rgba(255,255,255,0.01); display: inline-block; min-width: 155px; border-radius: 12px; backdrop-filter: blur(5px); transition: all 0.4s ease; text-align: center; }
        .tree-node:hover { border-color: var(--solid-gold); box-shadow: 0 0 15px var(--glow-gold); transform: translateY(-2px); }
        .tree-node.root { border: 1px solid var(--solid-gold); background: rgba(212,175,55,0.05); box-shadow: 0 0 10px rgba(212,175,55,0.1); }
        .tree-node.pure { border: 1px solid var(--cyan); background: rgba(139,168,156,0.03); }
        .tree-node.future { border: 1px dashed rgba(139,168,156,0.4); background: transparent; }

        .t-tag { display: inline-block; font-size: 0.7rem; border: 1px solid rgba(139,168,156,0.3); padding: 1px 6px; margin-bottom: 8px; color: var(--cyan); border-radius: 4px; background: rgba(10,15,20,0.6); letter-spacing: 1px; }
        .t-title { display: block; font-size: 1.05rem; font-weight: bold; color: var(--gold); margin-bottom: 3px; letter-spacing: 1px; }
        .t-sans { display: block; font-size: 0.75rem; color: #888; font-family: "Times New Roman", serif; font-style: italic; }
        .t-desc { display: block; font-size: 0.75rem; color: #aaa; margin-top: 5px; line-height: 1.3; }
  
    </style>
</head>
<body>

    <div id="list-view">
        <div class="top-nav-bar">
            <a href="index_jp.html?screen=3" class="glass-btn">
                <svg class="icon" viewBox="0 0 24 24"><path d="M19 12H5"></path><polyline points="12 19 5 12 12 5"></polyline></svg>
                道場へ戻る
            </a>
        </div>

        <h1 class="page-title">
            <svg class="title-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
             探微 ． 手記
        </h1>
        <div class="cat-nav" id="cat-nav"></div>
        <div id="article-list"></div>
    </div>

    <div id="reader-view">
        <div class="reader-header">
            <button class="glass-btn" onclick="closeReader()">
                <svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                目次へ戻る
            </button>
            <button class="glass-btn" onclick="toggleSpeech()" id="tts-btn">
                <svg class="icon" id="tts-icon" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                <span id="tts-text">聴く</span>
            </button>
        </div>
        <div class="article-container" id="article-body"></div>
    </div>

    <script src="articles.js"></script>
    <script>
        const chapterIcons = [
            `<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"></circle></svg>`, 
            `<svg class="icon" viewBox="0 0 24 24"><polygon points="12 2 22 12 12 22 2 12"></polygon></svg>`, 
            `<svg class="icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16"></rect></svg>`, 
            `<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="4"></circle></svg>`, 
            `<svg class="icon" viewBox="0 0 24 24"><polygon points="12 2 15 9 22 9 16 14 18 21 12 17 6 21 8 14 2 9 9 9"></polygon></svg>`, 
            `<svg class="icon" viewBox="0 0 24 24"><polygon points="12 2 22 8 22 16 12 22 2 16 2 8"></polygon></svg>`, 
            `<svg class="icon" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>`, 
            `<svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>`, 
            `<svg class="icon" viewBox="0 0 24 24"><path d="M2 12h20M12 2v20"></path></svg>`, 
            `<svg class="icon" viewBox="0 0 24 24"><path d="M12 2L2 22h20z"></path></svg>` 
        ];

        const currentLang = document.documentElement.lang.includes('en') ? 'en' : 'ja';
        let filteredData = [];
        let isPlaying = false;

        function initApp() {
            filteredData = rawArticles.filter(a => !a.lang || a.lang === currentLang);
            const params = new URLSearchParams(window.location.search);
            const targetId = params.get('id');

            renderCategories();
            
            if (targetId) {
                openReader(targetId);
            } else {
                renderList('すべて');
            }
        }

        function renderCategories() {
            const cats = ['すべて', ...new Set(filteredData.map(a => a.category || "未分類"))];
            const nav = document.getElementById('cat-nav');
            
            nav.innerHTML = cats.map(c => 
                `<button class="glass-btn" id="btn-${c}" onclick="renderList('${c}')">${c}</button>`
            ).join('');
        }

        function renderList(targetCat) {
            document.querySelectorAll('.cat-nav .glass-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${targetCat}`);
            if(activeBtn) activeBtn.classList.add('active');

            const container = document.getElementById('article-list');
            const dataToShow = targetCat === 'すべて' ? filteredData : filteredData.filter(a => (a.category || '未分類') === targetCat);
            
            container.innerHTML = dataToShow.map(a => `
                
                <div class="article-card" onclick="openReader('${a.id}')">
                    <div class="card-meta">
                        <span>${a.category || '未分類'}</span>
                        <span>${a.id.substring(0, 10)}</span>
                    </div>

                    <h2 class="card-title">${a.title}</h2>
<div class="card-desc">${a.content.replace(/<[^>]+>/g, '').replace(/\[.*?\]/g, '').substring(0, 100)}...</div>

                </div>
            `).join('');
        }

                function openReader(id) {
            const article = filteredData.find(a => a.id === id);
            if (!article) return renderList('すべて');

            document.getElementById('list-view').style.display = 'none';
            document.getElementById('reader-view').style.display = 'block';
            window.scrollTo(0, 0);

            // 最初の '[' の前にある HTML べクターデザインブロックを抽出
            const firstBracketIndex = article.content.indexOf('[');
            let introHtml = "";
            if (firstBracketIndex > 0) {
                introHtml = article.content.substring(0, firstBracketIndex).trim();
            } else if (firstBracketIndex === -1) {
                introHtml = article.content.trim();
            }

            const sectionRegex = /\[(.*?)\](.*?)(?=\[|$)/gs;
            let sectionsHtml = ""; 
            let match; 
            let iconIndex = 0; 

            while ((match = sectionRegex.exec(article.content.trim())) !== null) {
                let currentIcon = chapterIcons[iconIndex % 10]; 
                
                sectionsHtml += `
                    <div class="chapter-box">
                        <div class="chapter-title">${currentIcon} ${match[1].trim()}</div>
                        <div class="chapter-content">${match[2].trim().replace(/\n/g, '<br>')}</div>
                    </div>
                `;
                iconIndex++;
            }

            document.getElementById('article-body').innerHTML = `
                <h1 class="article-main-title">${article.title}</h1>
                <div class="article-status">${article.status}</div>
                <div class="humble-box">${article.humble}</div>
                ${introHtml}
                ${sectionsHtml}
            `;

            window.history.pushState({ id: id }, '', `?id=${id}`);
            document.title = article.title;
        }


        function closeReader() {
            if (isPlaying) toggleSpeech(); 
            document.getElementById('reader-view').style.display = 'none';
            document.getElementById('list-view').style.display = 'block';
            window.history.pushState({}, '', window.location.pathname);
            document.title = "妙依の園 ． デジタル法宝";
        }

        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.id) openReader(e.state.id);
            else closeReader();
        });

        function toggleSpeech() {
            if (!window.speechSynthesis) return alert("お使いのブラウザは音声機能に対応していません");
            const btnText = document.getElementById('tts-text');
            const btnIcon = document.getElementById('tts-icon');

            if (isPlaying) {
                window.speechSynthesis.cancel();
                isPlaying = false;
                btnText.innerText = currentLang === 'en' ? "Listen" : "聴く";
                btnIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>';
            } else {
                const text = document.getElementById('article-body').innerText;
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = currentLang === 'en' ? 'en-US' : 'ja-JP';
                utter.rate = 0.95;

                utter.onend = () => {
                    isPlaying = false;
                    btnText.innerText = currentLang === 'en' ? "Listen" : "聴く";
                    btnIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>';
                };

                window.speechSynthesis.speak(utter);
                isPlaying = true;
                btnText.innerText = currentLang === 'en' ? "Stop" : "停止";
                btnIcon.innerHTML = '<rect x="6" y="6" width="12" height="12"></rect>';
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
